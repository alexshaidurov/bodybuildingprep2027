// КАРБ-ЦИКЛ AI v1.0
// Автоматический расчёт и корректировка КБЖУ по фазе и результатам
// ══════════════════════════════════════════════════════════════

function buildCarbCyclePrompt() {
  var phase = (S.settings.phases||[]).find(function(p){return p.current;});
  var phaseName = phase ? phase.name : ({recomp:'Рекомпозиция',mass:'Массонабор',cut:'Сушка',peak:'Пик-неделя'}[S.settings.manualPhase]||S.settings.manualPhase||'не указана');
  var daysToComp = S.settings.compDate
    ? Math.max(0,Math.round((new Date(S.settings.compDate)-new Date())/86400000)) : null;

  // Weight dynamics
  var weights = (S.weights||[]).slice(-21);
  var wLast = weights.length ? Number(weights[weights.length-1].value) : null;
  var wFirst = weights.length > 7 ? Number(weights[weights.length-8].value) : null;
  var weeklyDelta = (wLast && wFirst) ? (wLast - wFirst).toFixed(2) : null;

  // Training days per week
  var woDays = (S.settings.woDays||[]).length;
  var trainDayGroups = S.settings.woDayGroups || {};
  var splitDesc = Object.keys(trainDayGroups).map(function(d){
    var groups = trainDayGroups[d];
    return groups && groups.length ? (['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][d]+': '+groups.join('+')) : null;
  }).filter(Boolean).join(', ');

  // Current goals
  var cur = S.settings.goals || {};
  var trainGoal = cur.train || {};
  var restGoal = cur.rest || {};

  // Bloodwork flags
  var bwFlags = [];
  var byName = {};
  ((S.pharma&&S.pharma.bloodwork)||[]).forEach(function(e){
    if(!byName[e.name]||e.date>byName[e.name].date) byName[e.name]=e;
  });
  Object.values(byName).forEach(function(e){
    if(e.flag==='high'||e.flag==='low') bwFlags.push(e.name+'='+e.value+(e.unit?' '+e.unit:'')+(e.flag==='high'?' ↑':' ↓'));
  });

  return 'Ты спортивный нутрициолог IFBB-уровня. Рассчитай ТОЧНЫЙ протокол карб-цикла. Отвечай ТОЛЬКО JSON без пояснений.\n\n'
    + 'ДАННЫЕ АТЛЕТА:\n'
    + 'Фаза: ' + phaseName + (daysToComp!==null?', до старта '+daysToComp+' дн':'')+'\n'
    + 'Текущий вес: ' + (wLast||'?') + ' кг\n'
    + (weeklyDelta!==null?'Динамика за неделю: '+(weeklyDelta>=0?'+':'')+weeklyDelta+' кг\n':'')
    + 'Тренировок в неделю: ' + woDays + '\n'
    + (splitDesc?'Сплит: '+splitDesc+'\n':'')
    + (bwFlags.length?'Биомаркеры: '+bwFlags.join(', ')+'\n':'')
    + 'Текущие цели тренировочный: '+trainGoal.kcal+'ккал П'+trainGoal.p+'г Ж'+trainGoal.f+'г У'+trainGoal.c+'г\n'
    + 'Текущие цели отдых: '+restGoal.kcal+'ккал П'+restGoal.p+'г Ж'+restGoal.f+'г У'+restGoal.c+'г\n\n'
    + 'ПРАВИЛА расчёта по фазе:\n'
    + '- Реком: умеренный дефицит/-5% ккал, высокий белок 2.2г/кг, У цикл 40-60%\n'
    + '- Масса: профицит +10-15%, белок 2.0г/кг, У высокие в тренировочный\n'
    + '- Сушка: дефицит -20-25%, белок 2.5г/кг, У низкие в отдых, средние в тренировочный\n'
    + '- Пик: контроль воды/натрия, У цикл по Peak Week протоколу\n\n'
    + 'ВЕРНИ ТОЛЬКО JSON:\n'
    + '{"train":{"kcal":3000,"p":220,"f":75,"c":320,"water":4.0,"sodium":4000,"carbType":"high"},'
    + '"rest":{"kcal":2600,"p":215,"f":90,"c":180,"water":3.5,"sodium":3500,"carbType":"low"},'
    + '"reasoning":"Краткое обоснование 2-3 предложения",'
    + '"adjustmentTip":"Совет по корректировке через 2 недели"}';
}

async function runCarbCycleAi(autoApply) {
  var btn = document.getElementById('carbCycleAiBtn');
  var out = document.getElementById('carbCycleAiOutput');
  if (!out) return;
  out.innerHTML = '<div class="sub" style="padding:8px 0">AI рассчитывает карб-цикл...</div>';
  if (btn) btn.disabled = true;

  try {
    var raw = await callAiProvider(buildCarbCyclePrompt(), getAiUserContext('wellbeingAiCtx'));
    var text = raw.trim().replace(/^```json\s*/,'').replace(/\s*```\s*$/,'');
    var data = JSON.parse(text);

    if (!data.train || !data.rest) throw new Error('Неверный формат ответа');

    // Store AI recommendation
    if (!S.settings.carbCycleAi) S.settings.carbCycleAi = {};
    S.settings.carbCycleAi.lastCalc = today();
    S.settings.carbCycleAi.recommendation = data;

    // Render preview
    out.innerHTML = carbCyclePreviewHTML(data, autoApply);

    if (autoApply) {
      applyCarbCycle(data);
    }

    save();
  } catch(e) {
    out.innerHTML = '<div class="errCard">✗ ' + escapeHtml(e.message||String(e)) + '</div>';
  } finally {
    if (btn) btn.disabled = false;
  }
}

function carbCyclePreviewHTML(data, applied) {
  function row(label, train, rest, unit) {
    return '<div class="ccRow">'
      + '<div class="ccRowLabel">' + label + '</div>'
      + '<div class="ccRowVal train">' + train + '<span class="ccUnit">' + unit + '</span></div>'
      + '<div class="ccRowVal rest">' + rest + '<span class="ccUnit">' + unit + '</span></div>'
      + '</div>';
  }
  var t = data.train, r = data.rest;
  var html = '<div class="ccPreview">'
    + '<div class="ccHeader">'
    +   '<div class="ccHeaderCell train">💪 Тренировочный</div>'
    +   '<div class="ccHeaderCell rest">😴 День отдыха</div>'
    + '</div>'
    + row('Калории', t.kcal, r.kcal, ' ккал')
    + row('Белок', t.p, r.p, 'г')
    + row('Жиры', t.f, r.f, 'г')
    + row('Углеводы', t.c, r.c, 'г')
    + row('Вода', t.water, r.water, 'л')
    + row('Натрий', t.sodium, r.sodium, 'мг')
    + '</div>';

  if (data.reasoning) {
    html += '<div class="ccReasoning">' + escapeHtml(data.reasoning) + '</div>';
  }
  if (data.adjustmentTip) {
    html += '<div class="ccAdjTip">💡 ' + escapeHtml(data.adjustmentTip) + '</div>';
  }

  if (!applied) {
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">'
      + '<button class="btn btn-p" onclick="applyCarbCycleFromCache()">✓ Применить</button>'
      + '<button class="btn btn-g" onclick="runCarbCycleAi(false)">↺ Пересчитать</button>'
      + '</div>';
  } else {
    html += '<div class="ccApplied">✓ Применено — цели питания обновлены</div>';
  }
  return html;
}

function applyCarbCycle(data) {
  if (!data || !data.train || !data.rest) return;
  if (!S.settings.goals) S.settings.goals = {};
  S.settings.goals.train = {
    kcal: data.train.kcal, p: data.train.p, f: data.train.f,
    c: data.train.c, water: data.train.water,
    sodium: data.train.sodium || 4000, carbType: data.train.carbType || 'high'
  };
  S.settings.goals.rest = {
    kcal: data.rest.kcal, p: data.rest.p, f: data.rest.f,
    c: data.rest.c, water: data.rest.water,
    sodium: data.rest.sodium || 3500, carbType: data.rest.carbType || 'low'
  };
  // Mark as applied
  if (!S.settings.carbCycleAi) S.settings.carbCycleAi = {};
  S.settings.carbCycleAi.applied = today();
  save();
  toast('✓ Карб-цикл применён — цели питания обновлены');
  // Update output div directly without re-render
  var out = document.getElementById('carbCycleAiOutput');
  if (out) out.innerHTML = carbCyclePreviewHTML(data, true);
  // Also refresh nutrition panel
  R.nutrition && R.nutrition();
  // Update settings input fields directly (avoid full re-render)
  var t = S.settings.goals.train, r = S.settings.goals.rest;
  var fields = {
    trainK: t.kcal, trainP: t.p, trainF: t.f, trainC: t.c,
    trainW: t.water, trainS: t.sodium,
    restK: r.kcal, restP: r.p, restF: r.f, restC: r.c,
    restW: r.water, restS: r.sodium
  };
  Object.keys(fields).forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = fields[id];
  });
}

window.clearCarbCycleAi = function() {
  if (!S.settings.carbCycleAi) return;
  S.settings.carbCycleAi = {lastCalc:'', recommendation:null, applied:null};
  // Also clear goals
  save();
  var out = document.getElementById('carbCycleAiOutput');
  if (out) out.innerHTML = '<div class="sub" style="padding:8px 0">Расчёт очищен.</div>';
  toast('Расчёт AI карб-цикла очищен');
};

window.applyCarbCycleFromCache = function() {
  var rec = S.settings.carbCycleAi && S.settings.carbCycleAi.recommendation;
  if (!rec) return;
  applyCarbCycle(rec);
  var out = document.getElementById('carbCycleAiOutput');
  if (out) out.innerHTML = carbCyclePreviewHTML(rec, true);
};

// Auto-suggest recalculation if conditions changed significantly
function carbCycleNeedsRecalc() {
  var cc = S.settings.carbCycleAi;
  if (!cc || !cc.lastCalc) return true;
  var daysSinceCalc = Math.round((new Date() - new Date(cc.lastCalc)) / 86400000);
  if (daysSinceCalc >= 14) return true; // 2 weeks

  // Check if weight changed significantly (>1kg)
  var weights = (S.weights||[]).slice(-14);
  if (weights.length >= 7) {
    var wOld = Number(weights[0].value);
    var wNew = Number(weights[weights.length-1].value);
    if (Math.abs(wNew - wOld) >= 1.5) return true;
  }
  return false;
}

var INJ_SITES = [
  {id:'lDelt', label:'Левая дельта',    side:'L', muscle:'delt'},
  {id:'rDelt', label:'Правая дельта',   side:'R', muscle:'delt'},
  {id:'lGlute',label:'Левая ягодица',   side:'L', muscle:'glute'},
  {id:'rGlute',label:'Правая ягодица',  side:'R', muscle:'glute'},
  {id:'lQuad', label:'Левое бедро',     side:'L', muscle:'quad'},
  {id:'rQuad', label:'Правое бедро',    side:'R', muscle:'quad'},
  {id:'lLat',  label:'Левая трапеция',  side:'L', muscle:'trap'},
  {id:'rLat',  label:'Правая трапеция', side:'R', muscle:'trap'},
];

function injGetLogs() {
  return (S.pharma && S.pharma.injLog) || [];
}

function injDaysSince(siteId) {
  var logs = injGetLogs().filter(function(l){ return l.site === siteId; });
  if (!logs.length) return null;
  var last = logs.reduce(function(a,b){ return a.ts > b.ts ? a : b; });
  var diff = (Date.now() - new Date(last.ts)) / 86400000;
  return Math.floor(diff);
}

function injSiteStatus(siteId) {
  var days = injDaysSince(siteId);
  if (days === null) return 'free';
  if (days < 3) return 'recent';
  if (days < 5) return 'ok';
  return 'free';
}

function injSiteColor(status) {
  return status === 'free' ? '#28d97a' : status === 'ok' ? '#ffb020' : '#ff4444';
}

function injSiteIcon(status) {
  return status === 'free' ? '●' : status === 'ok' ? '●' : '●';
}

function renderInjLog() {
  var root = document.getElementById('injLogRoot');
  if (!root) return;

  var logs = injGetLogs().slice().sort(function(a,b){ return b.ts > a.ts ? 1 : -1; }).slice(0,20);

  var sitesHTML = INJ_SITES.map(function(s) {
    var status = injSiteStatus(s.id);
    var days = injDaysSince(s.id);
    var color = injSiteColor(status);
    return '<button class="injSiteBtn" data-site="' + s.id + '" onclick="injSelectSite(\'' + s.id + '\')"'
      + ' style="border-color:' + color + '44;color:' + (status === 'free' ? '#f2f4ff' : color) + '">'
      + '<span style="color:' + color + ';font-size:8px">&#9679;</span> '
      + s.label
      + '<span class="injSiteDays">' + (days !== null ? days + 'д' : 'свободна') + '</span>'
      + '</button>';
  }).join('');

  var logsHTML = logs.length
    ? logs.map(function(l) {
        var site = INJ_SITES.find(function(s){ return s.id === l.site; });
        var d = new Date(l.ts);
        var dateStr = d.getDate() + '.' + (d.getMonth()+1<10?'0':'') + (d.getMonth()+1);
        var timeStr = (d.getHours()<10?'0':'') + d.getHours() + ':' + (d.getMinutes()<10?'0':'') + d.getMinutes();
        return '<div class="injLogEntry">'
          + '<div class="injLogLeft">'
          + '<div class="injLogName">' + escapeHtml(l.drug||'') + '</div>'
          + '<div class="injLogSite">' + (site ? site.label : l.site) + '</div>'
          + '</div>'
          + '<div class="injLogRight">'
          + '<div class="injLogDose">' + escapeHtml(l.dose||'') + '</div>'
          + '<div class="injLogDate">' + dateStr + ' ' + timeStr + '</div>'
          + '</div>'
          + '<button class="nutrWaterDel btn-red" onclick="injDeleteLog(\'' + l.id + '\')">✕</button>'
          + '</div>';
      }).join('')
    : '<div class="sub">Инъекций пока нет. Добавь первую.</div>';

  root.innerHTML = '<div class="card">'
    + '<div class="ctitle" style="margin-bottom:10px">Выбери место инъекции</div>'
    + '<div class="injSiteGrid">' + sitesHTML + '</div>'
    + '<div id="injFormArea"></div>'
    + '</div>'
    + '<div class="card"><div class="ctitle">Журнал инъекций</div>'
    + '<div class="injLogList">' + logsHTML + '</div>'
    + '</div>'
    + '<div id="pkChartBlock"></div>';

  // Render PK concentration chart only here on injlog tab
  setTimeout(function() {
    var pkEl = document.getElementById('pkChartBlock');
    if (!pkEl) return;
    pkEl.innerHTML = buildPkCard();
    var injLog = (S.pharma && S.pharma.injLog) || [];
    var byDrug = {};
    injLog.forEach(function(log) {
      var name = log.drug || log.name || 'Неизвестно';
      if (!byDrug[name]) byDrug[name] = { name: name, logs: [] };
      byDrug[name].logs.push(log);
    });
    // If no injection logs but active protocol has IM drugs, show them
    if (!Object.keys(byDrug).length) {
      var activeProto = (S.pharma && S.pharma.pharma && S.pharma.pharma.protocols || []).find(function(p){ return p.active; });
      if (activeProto) {
        (activeProto.items || []).forEach(function(item) {
          var baseItem = (S.pharma.pharma.items || []).find(function(b){ return b.id === item.itemId; });
          var name = baseItem ? baseItem.name : (item.name || 'Препарат');
          if (!byDrug[name]) byDrug[name] = { name: name, logs: [] };
          (item.intakes || []).forEach(function(intake) {
            byDrug[name].logs.push({ dateTime: new Date().toISOString(), dose: parseFloat(intake.amount) || 100 });
          });
        });
      }
    }
    renderPkChart('pkConcentrationCanvas', Object.values(byDrug));
  }, 100);
}

window.injSelectSite = function(siteId) {

    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px"><button class="btn btn-p" onclick="injSave(\'' + siteId + '\')">✓ Записать</button><button class="btn btn-g" onclick="injCancel()">Отмена</button></div>'
    + '</div>';

window.injCancel = function() {
  var area = document.getElementById('injFormArea');
  if (area) area.innerHTML = '';
  document.querySelectorAll('.injSiteBtn').forEach(function(b){
    b.classList.remove('injSiteSelected');
  });

window.injDrugChange = function() {
  var sel = document.getElementById('injDrugSel');
  var opt = sel && sel.options[sel.selectedIndex];
  var dose = opt && opt.getAttribute('data-dose');
  var doseInput = document.getElementById('injDoseInput');
  if (doseInput && dose) doseInput.value = dose;
};

window.injSave = function(siteId) {
  var drug = (document.getElementById('injDrugSel') || {}).value || '';
  var dose = (document.getElementById('injDoseInput') || {}).value || '';
  var note = (document.getElementById('injNoteInput') || {}).value || '';
  if (!drug) { toast('Выбери препарат'); return; }

  if (!S.pharma.injLog) S.pharma.injLog = [];
  S.pharma.injLog.push({
    id: id(), site: siteId, drug: drug, dose: dose, note: note,
    ts: new Date().toISOString()
  });
  // Also add to pharma.logs
  S.pharma.logs = S.pharma.logs || [];
  S.pharma.logs.push({
    date: today(), type: 'pharma', name: drug, dose: dose,
    site: siteId, ts: new Date().toISOString()
  });
  save();
  toast('✓ Инъекция записана — ' + drug);
  renderInjLog();
};

window.injDeleteLog = function(logId) {
  if (!S.pharma.injLog) return;
  S.pharma.injLog = S.pharma.injLog.filter(function(l){ return l.id !== logId; });
  save();
  renderInjLog();
};

// ТАЙМЕР ОТДЫХА v1.0
// Автозапуск после выполненного подхода, настраиваемое время
// ══════════════════════════════════════════════════════════════

var _restTimer = null;
var _restTarget = 0;
var _restStart = 0;
var _restDuration = 90; // default seconds

function restTimerStart(seconds) {
  clearInterval(_restTimer);
  _restDuration = seconds || _restDuration;
  _restStart = Date.now();
  _restTarget = _restStart + _restDuration * 1000;
  updateRestTimerUI();
  _restTimer = setInterval(updateRestTimerUI, 500);
}

function restTimerStop() {
  clearInterval(_restTimer);
  _restTimer = null;
  var el = document.getElementById('restTimerBox');
  if (el) el.classList.remove('rtVisible');
}

function updateRestTimerUI() {
  var remaining = Math.max(0, Math.round((_restTarget - Date.now()) / 1000));
  var el = document.getElementById('restTimerBox');
  if (!el) { clearInterval(_restTimer); return; }

  el.classList.add('rtVisible');

  var mins = Math.floor(remaining / 60);
  var secs = remaining % 60;
  var timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;
  var pct = Math.max(0, Math.min(100, (1 - remaining / _restDuration) * 100));

  var color = remaining <= 10 ? '#28d97a' : remaining <= 30 ? '#ffb020' : '#4d8fff';

  el.innerHTML = '<div class="rtInner">'
    + '<div class="rtLeft">'
    +   '<div class="rtLabel">ОТДЫХ</div>'
    +   '<div class="rtTime" style="color:' + color + '">' + timeStr + '</div>'
    + '</div>'
    + '<div class="rtBar"><div class="rtBarFill" style="width:' + pct + '%;background:' + color + '"></div></div>'
    + '<div class="rtBtns">'
    +   '<button class="rtBtn" onclick="restTimerStart(60)">1м</button>'
    +   '<button class="rtBtn" onclick="restTimerStart(90)">1.5м</button>'
    +   '<button class="rtBtn" onclick="restTimerStart(120)">2м</button>'
    +   '<button class="rtBtn" onclick="restTimerStart(180)">3м</button>'
    +   '<button class="rtBtnStop" onclick="restTimerStop()">✕</button>'
    + '</div>'
    + '</div>';

  if (remaining <= 0) {
    clearInterval(_restTimer);
    _restTimer = null;
    // Play beep
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.15, 0.3].forEach(function(delay) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.2);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.25);
      });
    } catch(e) {}
    // Haptic feedback on timer completion
    haptic([50, 80, 50, 80, 200]);
    // Flash green
    el.style.borderColor = '#28d97a';
    setTimeout(function() {
      if (el) el.style.borderColor = '';
    }, 2000);
  }
}

function buildBpTrend() {
  var records = (S.pharma && S.pharma.health) || [];
  if (records.length < 2) return null;

  // Sort by date
  var sorted = records.slice().sort(function(a,b){ return (a.date||a.ts||'') > (b.date||b.ts||'') ? 1 : -1; });
  var last14 = sorted.slice(-14);

  // Check alert: systolic > 140 for 3+ consecutive days
  var highDays = 0, maxStreak = 0;
  sorted.slice(-7).forEach(function(r) {
    var sys = r.sys || r.systolic || 0;
    if (sys > 140) { highDays++; maxStreak = Math.max(maxStreak, highDays); }
    else { highDays = 0; }
  });

  return { records: last14, streak: maxStreak };
}

function renderBpTrend(container) {
  if (!container) return;
  var trend = buildBpTrend();

  if (!trend) {
    container.innerHTML = '<div class="sub" style="padding:10px 0">Нет данных для тренда. Добавь минимум 2 замера.</div>';
    return;
  }

  var records = trend.records;
  var streak = trend.streak;

  // Alert
  var alertHTML = streak >= 3
    ? '<div class="bpAlert">⚠️ Систолическое > 140 мм рт.ст. ' + streak + ' дня подряд — рекомендуется консультация</div>'
    : '';

  // Mini chart using SVG sparkline
  var sysVals = records.map(function(r){ return r.sys || r.systolic || 0; }).filter(Boolean);
  var diaVals = records.map(function(r){ return r.dia || r.diastolic || 0; }).filter(Boolean);

  var sparkHTML = '';
  if (sysVals.length >= 2) {
    var W = 300, H = 60, pad = 6;
    var minV = Math.min.apply(null, diaVals.concat(sysVals)) - 5;
    var maxV = Math.max.apply(null, sysVals) + 5;
    var range = maxV - minV || 1;
    var n = sysVals.length;

    function pts(vals) {
      return vals.map(function(v, i) {
        return (pad + (i/(n-1))*(W-pad*2)).toFixed(1) + ',' + (H - pad - ((v-minV)/range)*(H-pad*2)).toFixed(1);
      }).join(' L');
    }

    // Reference line 140
    var ref140y = (H - pad - ((140-minV)/range)*(H-pad*2)).toFixed(1);
    var ref90y  = (H - pad - ((90-minV)/range)*(H-pad*2)).toFixed(1);

    sparkHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:64px;display:block;margin-bottom:6px">'
      + '<line x1="' + pad + '" y1="' + ref140y + '" x2="' + (W-pad) + '" y2="' + ref140y + '" stroke="rgba(255,68,68,.3)" stroke-width="1" stroke-dasharray="3,3"/>'
      + '<line x1="' + pad + '" y1="' + ref90y  + '" x2="' + (W-pad) + '" y2="' + ref90y  + '" stroke="rgba(255,176,32,.2)" stroke-width="1" stroke-dasharray="3,3"/>'
      + '<polyline points="M ' + pts(sysVals) + '" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
      + '<polyline points="M ' + pts(diaVals) + '" fill="none" stroke="#4d8fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
      + '<text x="' + (W-pad) + '" y="' + ref140y + '" font-size="8" fill="rgba(255,68,68,.6)" text-anchor="end" dy="-2">140</text>'
      + '<text x="' + (W-pad) + '" y="' + ref90y  + '" font-size="8" fill="rgba(255,176,32,.5)" text-anchor="end" dy="-2">90</text>'
      + '</svg>'
      + '<div style="display:flex;gap:12px;font-size:10px;color:rgba(200,205,230,.50);margin-bottom:8px">'
      + '<span style="color:#ff6b6b">— Систолическое</span>'
      + '<span style="color:#4d8fff">— Диастолическое</span>'
      + '</div>';
  }

  // Last 5 records table
  var tableRows = records.slice(-5).reverse().map(function(r) {
    var sys = r.sys || r.systolic || '—';
    var dia = r.dia || r.diastolic || '—';
    var pulse = r.pulse || '—';
    var d = new Date(r.date || r.ts);
    var dateStr = isNaN(d) ? (r.date||'') : d.getDate() + '.' + (d.getMonth()+1<10?'0':'') + (d.getMonth()+1);
    var sysColor = sys > 140 ? '#ff6b6b' : sys > 130 ? '#ffb020' : '#28d97a';
    return '<div class="bpTableRow">'
      + '<span class="bpDate">' + dateStr + '</span>'
      + '<span class="bpSys" style="color:' + sysColor + '">' + sys + '</span>'
      + '<span class="bpSlash">/</span>'
      + '<span class="bpDia">' + dia + '</span>'
      + '<span class="bpPulse">♥ ' + pulse + '</span>'
      + '</div>';
  }).join('');

  container.innerHTML = alertHTML
    + '<div class="bpChartWrap">' + sparkHTML + '</div>'
    + '<div class="bpTable">' + tableRows + '</div>';
}

function buildTrainerReport() {
  var now = new Date();
  var weekAgo = new Date(now - 7 * 86400000);
  var weekAgoStr = weekAgo.toISOString().slice(0,10);

  // Weight
  var weights = (S.weights||[]).filter(function(w){ return w.date >= weekAgoStr; });
  var wLast = weights.length ? Number(weights[weights.length-1].value).toFixed(1) : '—';
  var wFirst = weights.length > 1 ? Number(weights[0].value).toFixed(1) : wLast;
  var wDelta = weights.length > 1 ? (Number(weights[weights.length-1].value) - Number(weights[0].value)).toFixed(2) : '0';

  // Measurements
  var mArr = (S.progress && S.progress.measurements) || [];
  var mLast = mArr.length ? mArr[mArr.length-1] : null;

  // Training sessions
  var sessions = (S.training && S.training.sessions || S.training && S.training.history || [])
    .filter(function(s){ return s.date >= weekAgoStr; });

  // BP
  var bpArr = ((S.pharma && S.pharma.health) || []).filter(function(r){ return (r.date||r.ts||'') >= weekAgoStr; });
  var bpLast = bpArr.length ? bpArr[bpArr.length-1] : null;

  // Wellbeing avg
  var wbDays = Object.entries(S.wellbeing||{}).filter(function(e){ return e[0] >= weekAgoStr; });
  var wbAvg = null;
  if (wbDays.length) {
    var total = 0, count = 0;
    wbDays.forEach(function(e) {
      var d = e[1];
      ['energy','mood','libido','joints','sleep'].forEach(function(k){
        if(d[k]){ total += d[k]; count++; }
      });
    });
    wbAvg = count ? (total/count).toFixed(1) : null;
  }

  // Pharma compliance
  var pharmaItems = [];
  try { pharmaItems = S.pharma.pharma.items || []; } catch(e){}
  var pharmaLogs = ((S.pharma && S.pharma.logs) || []).filter(function(l){ return l.date >= weekAgoStr; });

  // Phase
  var phase = (S.settings.phases||[]).find(function(p){ return p.current; });
  var phaseName = phase ? phase.name : ({recomp:'Рекомпозиция',mass:'Массонабор',cut:'Сушка',peak:'Пик-неделя'}[S.settings.manualPhase]||S.settings.manualPhase||'н/д');
  var daysToComp = S.settings.compDate ? Math.max(0,Math.round((new Date(S.settings.compDate)-now)/86400000)) : null;

  // Format date
  var dateStr = now.getDate() + '.' + (now.getMonth()+1<10?'0':'') + (now.getMonth()+1) + '.' + now.getFullYear();

  var lines = [
    '📋 ЕЖЕНЕДЕЛЬНЫЙ ОТЧЁТ — ' + dateStr,
    (S.settings.compName ? '🏆 ' + S.settings.compName : '') + (daysToComp !== null ? ' | До старта: ' + daysToComp + ' дн' : ''),
    'Фаза: ' + phaseName,
    '',
    '⚖️ ВЕС',
    'Начало недели: ' + wFirst + ' кг',
    'Конец недели: ' + wLast + ' кг',
    'Изменение: ' + (wDelta >= 0 ? '+' : '') + wDelta + ' кг',
    '',
  ];

  if (mLast) {
    lines.push('📐 ЗАМЕРЫ (последние)');
    if (mLast.waist) lines.push('Талия: ' + mLast.waist + ' см');
    if (mLast.chest) lines.push('Грудь: ' + mLast.chest + ' см');
    if (mLast.hip)   lines.push('Бедро: ' + mLast.hip + ' см');
    lines.push('');
  }

  lines.push('🏋️ ТРЕНИРОВКИ');
  lines.push('Сессий за неделю: ' + sessions.length);
  sessions.forEach(function(s) {
    var exCount = s.exercises ? s.exercises.length : 0;
    var sets = s.exercises ? s.exercises.reduce(function(acc,e){ return acc + (e.sets?e.sets.length:0); }, 0) : 0;
    lines.push('• ' + (s.name||'Тренировка') + ' — ' + exCount + ' упр., ' + sets + ' подх.');
  });
  lines.push('');

  if (bpLast) {
    lines.push('🩺 ДАВЛЕНИЕ (последний замер)');
    lines.push((bpLast.sys||bpLast.systolic) + '/' + (bpLast.dia||bpLast.diastolic) + ' мм рт.ст.' + (bpLast.pulse ? ', пульс ' + bpLast.pulse : ''));
    lines.push('');
  }

  if (wbAvg) {
    lines.push('🧠 САМОЧУВСТВИЕ');
    lines.push('Средний балл за неделю: ' + wbAvg + '/5');
    lines.push('');
  }

  if (pharmaItems.length) {
    lines.push('💊 ФАРМАКОЛОГИЯ');
    pharmaItems.forEach(function(item) {
      var logsCount = pharmaLogs.filter(function(l){ return l.name === item.name; }).length;
      lines.push('• ' + item.name + (item.dose ? ' ' + item.dose : '') + (logsCount ? ' (' + logsCount + 'x за неделю)' : ''));
    });
    lines.push('');
  }

  lines.push('—');
  lines.push('Отчёт сгенерирован X-GENE Prep OS');

  return lines.filter(function(l){ return l !== undefined; }).join('\n');
}

async function callAiProvider(promptText, userExtra) {
  var cfg = S.settings.gemini || {};
  var provider = (S.settings.aiProvider || 'gemini').toLowerCase();
  var fullPrompt = userExtra ? (promptText + '\n\nДополнительный контекст от пользователя:\n' + userExtra) : promptText;

  if (!promptText || !String(promptText).trim()) {
    toast('Пожалуйста, укажи текст запроса', 3000, 'error');
    throw new Error('Запрос не может быть пустым.');
  }

  if (provider === 'claude') {
    var key = (cfg.claudeKey || '').trim();
    if (!key) {
      toast('Пожалуйста, укажи API-ключ Claude в настройках', 3000, 'error');
      throw new Error('Добавь ключ Claude API в настройках.');
    }
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: cfg.claudeModel || 'claude-sonnet-4-5',
        max_tokens: 4096,
        messages: [{ role: 'user', content: fullPrompt }]
      })
    });
    if (!resp.ok) throw new Error('Claude API ' + resp.status + ': ' + await resp.text());
    var data = await resp.json();
    return data.content && data.content[0] && data.content[0].text || '';
  }

  if (provider === 'chatgpt') {
    var key2 = (cfg.openaiKey || '').trim();
    if (!key2) {
      toast('Пожалуйста, укажи API-ключ OpenAI в настройках', 3000, 'error');
      throw new Error('Добавь ключ OpenAI API в настройках.');
    }
    var resp2 = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key2
      },
      body: JSON.stringify({
        model: cfg.openaiModel || 'gpt-4o-mini',
        max_tokens: 4096,
        messages: [{ role: 'user', content: fullPrompt }]
      })
    });
    if (!resp2.ok) throw new Error('OpenAI API ' + resp2.status + ': ' + await resp2.text());
    var data2 = await resp2.json();
    return data2.choices && data2.choices[0] && data2.choices[0].message && data2.choices[0].message.content || '';
  }

  // Default: Gemini
  return geminiGenerateContent(fullPrompt);
}

function collectWeekData() {
  var now = new Date();
  var weekAgo = new Date(now - 7 * 86400000);
  var weekAgoStr = weekAgo.toISOString().slice(0,10);
  var todayStr = now.toISOString().slice(0,10);

  // Weight
  var weights = (S.weights||[]).filter(function(w){ return w.date >= weekAgoStr; })
    .sort(function(a,b){ return a.date > b.date ? 1 : -1; });
  var wStart = weights.length ? Number(weights[0].value) : null;
  var wEnd = weights.length ? Number(weights[weights.length-1].value) : null;

  var meals = (S.meals||[]).filter(function(m){ return m.date >= weekAgoStr; });
  var mealsByDay = {};
  meals.forEach(function(m) {
    if(!mealsByDay[m.date]) mealsByDay[m.date] = {kcal:0,p:0,f:0,c:0};
    mealsByDay[m.date].kcal += Number(m.kcal)||0;
    mealsByDay[m.date].p += Number(m.p)||0;
    mealsByDay[m.date].f += Number(m.f)||0;
    mealsByDay[m.date].c += Number(m.c)||0;
  });
  var mealDays = Object.values(mealsByDay);
  var avg = function(arr, key) {
    return arr.length ? Math.round(arr.reduce(function(s,d){ return s+(d[key]||0); },0)/arr.length) : 0;
  };

  // Water avg
  var waterLogs = (S.water||[]).filter(function(w){ return w.date >= weekAgoStr; });
  var waterByDay = {};
  waterLogs.forEach(function(w){ waterByDay[w.date] = (waterByDay[w.date]||0) + (Number(w.amount)||0); });
  var waterDays = Object.values(waterByDay);
  var avgWater = waterDays.length ? (waterDays.reduce(function(s,v){ return s+v; },0)/waterDays.length).toFixed(1) : '—';

  // Training
  var sessions = ((S.training&&S.training.sessions)||[]).filter(function(s){ return s.date >= weekAgoStr; });
  var plannedDays = (S.settings.woDays||[]).length;

  // Wellbeing
  var wbEntries = Object.entries(S.wellbeing||{}).filter(function(e){ return e[0] >= weekAgoStr; });
  var wbScores = [];
  wbEntries.forEach(function(e) {
    var d = e[1];
    ['energy','mood','libido','joints','sleep'].forEach(function(k){ if(d[k]) wbScores.push(d[k]); });
  });
  var avgWb = wbScores.length ? (wbScores.reduce(function(s,v){ return s+v; },0)/wbScores.length).toFixed(1) : '—';

  // BP
  var bpArr = ((S.pharma&&S.pharma.health)||[]).filter(function(r){ return (r.date||r.ts||'') >= weekAgoStr; });
  var lastBP = bpArr.length ? ((bpArr[bpArr.length-1].sys||'—') + '/' + (bpArr[bpArr.length-1].dia||'—')) : '—';

  // Pharma
  var pharmaItems = [];
  try { pharmaItems = S.pharma.pharma.items||[]; } catch(e){}
  var pharmaList = pharmaItems.length
    ? pharmaItems.map(function(i){ return '• ' + i.name + (i.dose?' '+i.dose:'') + (i.freq?' '+i.freq:''); }).join('\n')
    : 'Не заполнено';

  var suppsItems = [];
  try { suppsItems = S.pharma.supps.items||[]; } catch(e){}
  var suppsList = suppsItems.length
    ? suppsItems.map(function(i){ return '• ' + i.name + (i.dose?' '+i.dose:''); }).join('\n')
    : 'Не заполнено';

  // Phase & comp
  var phase = S.settings.manualPhase || 'recomp';
  var phaseNames = {recomp:'Рекомпозиция',mass:'Массонабор',cut:'Сушка',peak:'Пик-неделя'};
  var daysToComp = S.settings.compDate
    ? Math.max(0, Math.round((new Date(S.settings.compDate) - now)/86400000))
    : null;

  var g = S.settings.goals || {};
  var gt = g.train || {};
  var gr = g.rest || {};

  return {
    weightStart: wStart ? wStart.toFixed(1) : '—',
    weightEnd: wEnd ? wEnd.toFixed(1) : '—',
    weightDelta: (wStart && wEnd) ? (wEnd - wStart).toFixed(2) : '—',
    sessionsCount: sessions.length,
    plannedSessions: plannedDays,
    avgKcal: avg(mealDays,'kcal'),
    avgP: avg(mealDays,'p'),
    avgF: avg(mealDays,'f'),
    avgC: avg(mealDays,'c'),
    avgWater: avgWater,
    avgWellbeing: avgWb,
    lastBP: lastBP,
    phase: phaseNames[phase]||phase,
    daysToComp: daysToComp !== null ? daysToComp : 'не указано',
    goalTrainKcal: gt.kcal||'—', goalP: gt.p||'—', goalF: gt.f||'—', goalC: gt.c||'—',
    goalRestKcal: gr.kcal||'—', goalRestP: gr.p||'—', goalRestF: gr.f||'—', goalRestC: gr.c||'—',
    pharmaList: pharmaList,
    suppsList: suppsList
  };
}

function applyWeeklyChange(change) {
  if (!change.applyKey || !change.autoApply) return false;
  var keys = change.applyKey.split('.');
  var obj = S.settings;
  for (var i = 0; i < keys.length - 1; i++) {
    if (!obj[keys[i]]) obj[keys[i]] = {};
    obj = obj[keys[i]];
  }
  var lastKey = keys[keys.length - 1];
  var oldVal = obj[lastKey];
  obj[lastKey] = change.applyValue;
  save();
  return oldVal;
}

var _weeklyReviewData = null;

async function runWeeklyReview() {
  var root = document.getElementById('weeklyReviewRoot');
  if (!root) return;

  root.innerHTML = '<div class="wrLoading"><div class="wrSpinner"></div><div class="wrLoadText">AI анализирует неделю...</div></div>';

  try {
    var weekData = collectWeekData();
    var prompt = buildWeeklyReviewPrompt(weekData);
    var userCtx = getAiUserContext('weeklyReviewCtx');
    var raw = await callAiProvider(prompt, userCtx);

    // Parse JSON
    var clean = raw.replace(/```json|```/g,'').trim();
    var result = JSON.parse(clean);
    _weeklyReviewData = result;
    renderWeeklyReviewResult(result, root);
  } catch(e) {
    root.innerHTML = '<div class="card"><div class="sub" style="color:#ff6b6b">Ошибка: ' + escapeHtml(e.message) + '</div></div>';
  }
}

function scoreColor(score) {
  if (score >= 8) return '#28d97a';
  if (score >= 6) return '#ffb020';
  return '#ff6b6b';
}

function areaIcon(area) {
  return {nutrition:'🍽',training:'🏋️',pharma:'💊',supps:'🧪',recovery:'😴'}[area] || '📋';
}

function areaLabel(area) {
  return {nutrition:'Питание',training:'Тренинг',pharma:'Фармпротокол',supps:'БАДы',recovery:'Восстановление'}[area] || area;
}

function priorityBadge(p) {
  var cfg = {high:{c:'#ff6b6b',bg:'rgba(255,107,107,.15)',t:'Важно'},
             medium:{c:'#ffb020',bg:'rgba(255,176,32,.15)',t:'Средне'},
             low:{c:'#8899aa',bg:'rgba(136,153,170,.15)',t:'Опционально'}};
  var s = cfg[p]||cfg.low;
  return '<span style="font-size:10px;font-weight:700;color:'+s.c+';background:'+s.bg+';border-radius:6px;padding:2px 7px">'+s.t+'</span>';
}

      +   '<div class="wrDiffArrow">→</div>'
      +   '<div class="wrDiffNew"><span class="wrDiffLbl">Предлагает AI</span><span class="wrDiffVal wrDiffValNew">' + escapeHtml(String(ch.proposed)) + '</span></div>'

      +   '<button class="btn wrBtnSkip" data-idx="'+idx+'" onclick="wrSkip('+idx+')">Пропустить</button>'
      + '</div>'
      + '<div class="wrEditArea" id="wrEdit_'+idx+'" style="display:none">'
      +   '<div style="font-size:11px;color:rgba(200,205,230,.5);margin-bottom:4px">Измени значение перед применением:</div>'
      +   '<div style="display:flex;gap:6px">'

  }).join('');

  root.innerHTML = ''

    +     '<div class="wrScoreLabel">Оценка недели</div>'
    +   '</div>'
    +   '<div class="wrSummaryText">' + escapeHtml(result.summary) + '</div>'
    + '</div>'
    + (changes.length
        ? '<div class="wrChangesHeader">Предложенные изменения <span class="wrChangeCount">'+changes.length+'</span></div>'
          + '<div class="wrChangesList">' + changesHTML + '</div>'
          + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">'
          +   '<button class="btn btn-p" onclick="wrAcceptAll()">✓ Принять все</button>'
          +   '<button class="btn btn-g" onclick="wrSkipAll()">Пропустить все</button>'
          + '</div>'
        : '<div class="card"><div class="sub" style="padding:8px 0">✓ AI не нашёл существенных отклонений. Продолжай в том же темпе.</div></div>'
      );
}

window.wrAccept = function(idx) {
  if (!_weeklyReviewData) return;
  var ch = _weeklyReviewData.changes[idx];
  if (!ch || !ch.applyKey) return;
  applyWeeklyChange(ch);
  var card = document.getElementById('wrCard_'+idx);
  if (card) {
    card.classList.add('wrAccepted');
    card.querySelector('.wrChangeActions').innerHTML = '<div class="wrDoneMsg">✓ Применено</div>';
  }
  R.nutrition && R.nutrition();
  toast('✓ Принято: ' + ch.label);
};

window.wrEdit = function(idx) {
  var area = document.getElementById('wrEdit_'+idx);
  if (area) area.style.display = area.style.display === 'none' ? 'block' : 'none';
};

window.wrApplyEdit = function(idx) {
  if (!_weeklyReviewData) return;
  var ch = _weeklyReviewData.changes[idx];
  var input = document.getElementById('wrEditVal_'+idx);
  if (!input || !ch) return;
  var val = input.value.trim();
  var numVal = parseFloat(val);
  ch.applyValue = isNaN(numVal) ? val : numVal;
  ch.autoApply = true;
  if (!ch.applyKey) {
    toast('Это изменение применяется вручную');
    return;
  }
  applyWeeklyChange(ch);
  var card = document.getElementById('wrCard_'+idx);
  if (card) {
    card.classList.add('wrAccepted');
    card.querySelector('.wrChangeActions').innerHTML = '<div class="wrDoneMsg">✓ Применено: ' + escapeHtml(val) + '</div>';
    document.getElementById('wrEdit_'+idx).style.display = 'none';
  }
  toast('✓ Применено: ' + ch.label + ' → ' + val);
};

window.wrSkip = function(idx) {
  var card = document.getElementById('wrCard_'+idx);
  if (card) card.classList.add('wrSkipped');
};

window.wrAcceptAll = function() {
  if (!_weeklyReviewData) return;
  _weeklyReviewData.changes.forEach(function(ch, idx) {
    if (ch.autoApply && ch.applyKey) window.wrAccept(idx);
  });
};

window.wrSkipAll = function() {
  if (!_weeklyReviewData) return;
  _weeklyReviewData.changes.forEach(function(ch, idx) { window.wrSkip(idx); });
};

function renderWeeklyReview(container) {
  if (!container) return;
  container.innerHTML = '<div class="card">'
    + '<div class="ctitle">🧠 Недельный AI-разбор</div>'
    + '<div class="sub" style="margin-bottom:10px">Анализирует вес, питание, тренировки, самочувствие и давление за 7 дней. Предлагает конкретные изменения плана.</div>'
    + '<button class="btn btn-p" style="margin-bottom:8px" onclick="runWeeklyReview()">🧠 Анализировать</button>'
    + '</div>'
    + '<div id="weeklyReviewRoot"></div>';
}

normalizeExercises(data){
 const arr=Array.isArray(data)?data:(data.exercises||data.lib||data.training?.lib||[]);
 return arr.map(x=>({
  id:x.id||id(),
  name:x.name||x.название||'',
  group:x.group||x.группа||x.muscleGroup||'Другое',
  reps:x.reps||x.повторы||'8-12',
  weight:n(x.weight||x.вес||0),
  sets:n(x.sets||x.подходы||4)||4,
  note:x.note||x.заметка||''
 })).filter(x=>x.name);
},
normalizeTemplates(data){
 const arr=Array.isArray(data)?data:(data.templates||data.training?.templates||[]);
 return arr.map(t=>({
  id:t.id||id(),
  name:t.name||t.название||'Шаблон',
  type:t.type||t.тип||'Микс',
  exercises:(t.exercises||t.упражнения||[]).map(e=>({
    exId:e.exId||e.id||(S.training?.lib||[]).find(x=>(x.name||'').toLowerCase()===(e.name||e.название||'').toLowerCase() && (x.group||'Другое')===(e.group||e.группа||'Другое'))?.id||'',
    name:e.name||e.название||'Упражнение',
    group:e.group||e.группа||'Другое',
    sets:n(e.sets||e.подходы||4)||4,
    weight:n(e.weight||e.вес||0),
    reps:e.reps||e.повторы||'8-12'
  }))
 })).filter(t=>t.name);
},
importExercises(input){
 const f=input.files?.[0]; if(!f)return;
 const r=new FileReader();
 r.onload=()=>{
  try{
   const data=JSON.parse(r.result);
   const items=T.normalizeExercises(data);
   if(!items.length){toast('В файле нет упражнений');return;}
   const existing=new Set(S.training.lib.map(x=>(x.name+'|'+x.group).toLowerCase()));
   let added=0;
   items.forEach(x=>{
    const key=(x.name+'|'+x.group).toLowerCase();
    if(!existing.has(key)){S.training.lib.push(x);existing.add(key);added++;}
   });
   save();R.training();toast('Импортировано упражнений: '+added);
  }catch(e){toast('Ошибка JSON-файла')}
  input.value='';
 };
 r.readAsText(f);
},
importTemplates(input){
 const f=input.files?.[0]; if(!f)return;
 const r=new FileReader();
 r.onload=()=>{
  try{
   const data=JSON.parse(r.result);
   const items=T.normalizeTemplates(data);
   if(!items.length){toast('В файле нет шаблонов');return;}
   S.training.templates.push(...items);
   save();S.training.screen='templates';R.training();toast('Импортировано шаблонов: '+items.length);
  }catch(e){toast('Ошибка JSON-файла')}
  input.value='';
 };
 r.readAsText(f);
},

// When user selects a compound from encyclopedia — auto-add it to base
onProtoItemChange(sel, type) {

  }

  const it=S.pharma[type].items.find(x=>x.id===r.querySelector('.ppItem').value);
  if(!it)return null;
  const note = r.querySelector('.ppNote')?.value || '';
  const intakes=Array.from(r.querySelectorAll('.ppIntakeRow')).map(ir=>({

function compressImageFile(file, cb){
 const name=(file.name||'').toLowerCase();
 const isRaw=name.endsWith('.dng') || name.endsWith('.raw') || name.endsWith('.cr2') || name.endsWith('.nef');
 if(isRaw){
  cb({error:'RAW/DNG не поддерживается. Нужен JPG/PNG/WEBP/HEIC с превью.'});
  return;
 }
 const reader=new FileReader();
 reader.onload=()=>{
  const img=new Image();
  img.onload=()=>{
   const max=1200;
   let w=img.width, h=img.height;
   if(w>h && w>max){h=Math.round(h*max/w);w=max}
   else if(h>=w && h>max){w=Math.round(w*max/h);h=max}
   const canvas=document.createElement('canvas');
   canvas.width=w; canvas.height=h;
   const ctx=canvas.getContext('2d');
   ctx.drawImage(img,0,0,w,h);
   const data=canvas.toDataURL('image/jpeg',0.78);
   cb({data,isRaw:false,name:file.name,type:'image/jpeg'});
  };
  img.onerror=()=>cb({error:'Не удалось создать превью. Загрузи JPG/PNG/WEBP.'});
  img.src=reader.result;
 };
 reader.onerror=()=>cb({error:'Не удалось прочитать файл.'});
 reader.readAsDataURL(file);
}

function drawChart(id,data){
 const c=document.getElementById(id); if(!c)return;
 // fix#5: read colors from CSS vars so chart respects the current palette
 const cs=getComputedStyle(document.documentElement);
 const colorLine=cs.getPropertyValue('--line').trim()||'rgba(80,120,200,.16)';
 const colorBlue=cs.getPropertyValue('--blue').trim()||'#5b8df5';
 const colorMut=cs.getPropertyValue('--mut').trim()||'#94a3b8';
 const ctx=c.getContext('2d'), w=c.width=c.clientWidth*2, h=c.height=150*2;
 ctx.clearRect(0,0,w,h);
 if(data.length<2){ctx.fillStyle=colorMut;ctx.font='24px sans-serif';ctx.fillText('Недостаточно данных',20,70);return}
 const vals=data.map(x=>x.val), min=Math.min(...vals), max=Math.max(...vals), pad=30;
 ctx.strokeStyle=colorLine;ctx.lineWidth=2;
 for(let i=0;i<4;i++){let y=pad+i*(h-pad*2)/3;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke()}
 ctx.strokeStyle=colorBlue;ctx.lineWidth=5;ctx.beginPath();
 data.forEach((p,i)=>{let x=pad+i*(w-pad*2)/(data.length-1), y=h-pad-((p.val-min)/(max-min||1))*(h-pad*2); if(i)ctx.lineTo(x,y);else ctx.moveTo(x,y)});ctx.stroke();
}

// ══════════════════════════════════════════════════════════════
// TASK STATUS ENGINE v2.0
// States: future | current | overdue | done | done_late
// ══════════════════════════════════════════════════════════════

var OVERDUE_GRACE_MINS = 10; // задача становится просроченной через 10 мин

function taskState(ev, nowM) {
  var t = today();
  var logKey = 'sdDone_' + t + '_' + ev.id;
  var doneAt = null;
  try { doneAt = localStorage.getItem(logKey); } catch(e){}

  if (doneAt) {
    var doneMin = parseInt(doneAt);
    // done_late: task was completed AFTER the grace window
    if (doneMin > ev.mins + OVERDUE_GRACE_MINS) return 'done_late';
    return 'done';
  }

  // Auto-detect done state from app data
  // wake: auto-done only if weight was logged today (implies user woke up and measured)
  if (ev.type === 'wake') {
    var wakeWeight = S.weights && S.weights.find(function(x){return x.date===t;});
    if (wakeWeight) return 'done';
  }
  if (ev.type === 'weight') {
    var wToday = S.weights && S.weights.find(function(x){return x.date===t;});
    if (wToday) return nowM > ev.mins + OVERDUE_GRACE_MINS ? 'done_late' : 'done';
  }
  if (ev.type === 'bp') {
    try {
      var bpFn = typeof sdBPToday === 'function' ? sdBPToday : (window.sdBPToday||null);
      var bpDone = bpFn ? bpFn() : 0;
      if (bpDone > 0) {
        var bpSub = ev.sub || '';
        if (bpSub.indexOf('Утренний') >= 0 && bpDone >= 1) return 'done';
        if (bpSub.indexOf('Вечерний') >= 0 && bpDone >= 2) return 'done';
      }
    } catch(e) {}
  }
  if (ev.type === 'pharma' || ev.type === 'supp') {
    var pDone = false;
    try {
      var logs = (S.pharma && S.pharma.logs) || [];
      pDone = logs.some(function(l){ return l.date===t && l.id===ev.itemId; });
    } catch(e){}
    if (pDone) return nowM > ev.mins + OVERDUE_GRACE_MINS ? 'done_late' : 'done';
  }
  if (ev.type === 'train') {
    var tDone = S.training && S.training.active && S.training.active.done;
    if (tDone) return 'done';
  }

  // Time-based state
  if (nowM < ev.mins) return 'future';
  if (nowM <= ev.mins + OVERDUE_GRACE_MINS) return 'current';
  return 'overdue';
}

function markTaskDone(evId, evMins) {
  var t = today();
  var logKey = 'sdDone_' + t + '_' + evId;
  try { localStorage.setItem(logKey, String(nowMins())); } catch(e){}
  // Re-render today screen
  var root = document.getElementById('todayRoot');
  if (root && typeof renderSmartDay === 'function') renderSmartDay(root);
}
window.markTaskDone = markTaskDone;

// Check if task is done via localStorage
window.isTaskDone = function(evId) {
  try { return !!localStorage.getItem('sdDone_' + today() + '_' + evId); } catch(e){ return false; }
};

// Navigate to the correct panel when task is clicked
window.navigateToTask = function(evType) {
  var tabMap = {
    'meal':   'nutrition',
    'pharma': 'pharma',
    'supp':   'pharma',
    'med':    'pharma',
    'train':  'training',
    'bp':     'health',
    'sleep':  'today',
    'wake':   'today',
    'weight': 'today'
  };
  var tab = tabMap[evType] || 'today';
  if (typeof UI !== 'undefined' && UI.tab) UI.tab(tab);
};

// Block boundaries — fixed clock times
function dayBlocks(wakeM) {
  // wakeM kept as param for signature compat but not used
  return {
    morning: { start: 5*60,  end: 12*60, label: 'Утро'   },
    day:     { start: 12*60, end: 18*60, label: 'День'   },
    evening: { start: 18*60, end: 24*60, label: 'Вечер'  },
  };
}

function blockForEvent(ev, blocks) {
  if (ev.mins < 12*60) return 'morning';
  if (ev.mins < 18*60) return 'day';
  return 'evening';
}

// TASK TIMELINE RENDERER v2.0
// Groups by Утро/День/Вечер, shows state badges
// ══════════════════════════════════════════════════════════════

function buildTaskTimeline() {
  // Clean up localStorage keys from previous days
  try {
    var t = today();
    var keysToRemove = [];
    for (var k = 0; k < localStorage.length; k++) {
      var key = localStorage.key(k);
      if (key && key.indexOf('sdDone_') === 0 && key.indexOf('sdDone_' + t + '_') !== 0) {
        keysToRemove.push(key);
      }
    }
    keysToRemove.forEach(function(k){ localStorage.removeItem(k); });
  } catch(e){}

  var tl = buildDayTimeline();
  var events = tl.events;
  var nowM = nowMins();
  var ds = S.settings.daySchedule || {};
  var isTraining = tl.isTraining;
  var slot = isTraining ? (ds.trainDay || {}) : (ds.restDay || {});
  var wakeM = timeToMins(slot.wake || '07:00');
  var blocks = dayBlocks(wakeM);

  // Assign stable id to each event (type+mins = deterministic)
  events.forEach(function(ev) {
    if (!ev.id) ev.id = ev.type + '_' + ev.mins;
  });

  // Group events into blocks
  var groups = { morning: [], day: [], evening: [] };
  events.forEach(function(ev) {
    var b = blockForEvent(ev, blocks);
    groups[b].push(ev);
  });

  return { groups: groups, blocks: blocks, nowM: nowM, events: events, isTraining: isTraining };
}

    + '</div>'
    + (showBtn
        ? '<button class="sdTaskBtn" onclick="event.stopPropagation();markTaskDone(&quot;'+safeId+'&quot;,'+ev.mins+')">✓</button>'
        : (state==='done'||state==='done_late' ? '<span class="sdTaskDoneIcon" style="color:'+sc.dot+'">✓</span>' : ''))
    + '</div>';
}

function renderTaskTimeline() {
  var tl = buildTaskTimeline();
  var groups = tl.groups;

// ── Find latest value for a marker ────────────────────────────────────
function bmFindLatest(marker) {
  var blood = (S.pharma && S.pharma.bloodwork) || [];
  var match = null;
  var matchDate = '';
  blood.forEach(function(x) {
    if (!x.name || !x.value) return;
    var nameLow = x.name.trim().toLowerCase();
    var found = marker.names.some(function(n) {
      return nameLow === n.toLowerCase() || nameLow.indexOf(n.toLowerCase()) !== -1;
    });
    if (found) {
      var d = String(x.date || '');
      if (!match || d > matchDate) { match = x; matchDate = d; }
    }
  });
  return match;
}

// ── Classify value ─────────────────────────────────────────────────────
function bmClassify(val, marker) {
  var n = parseFloat(String(val).replace(',', '.'));
  if (isNaN(n)) return 'none';
  // Critical high (above lab max * 1.3)
  if (marker.labMax && n > marker.labMax * 1.3) return 'high';
  // Warn high (between optMax and labMax*1.3)
  if (marker.optMax && n > marker.optMax) return 'warn';
  // Warn low
  if (marker.optMin !== undefined && marker.optMin > 0 && n < marker.optMin * 0.85) return 'low';
  if (marker.optMin !== undefined && marker.optMin > 0 && n < marker.optMin) return 'warn';
  return 'ok';
}

// ── Bar position ────────────────────────────────────────────────────────
function bmBarPos(val, marker) {
  var n = parseFloat(String(val).replace(',', '.'));
  if (isNaN(n)) return 50;
  var lo = marker.labMin || 0;
  var hi = marker.labMax || marker.optMax * 1.5 || n * 2;
  if (hi === lo) return 50;
  return Math.max(2, Math.min(98, Math.round((n - lo) / (hi - lo) * 100)));
}

// ── Render panel ────────────────────────────────────────────────────────
function bmRefreshPanel() {
  var root = document.getElementById('bmPanelRoot');
  if (!root) return;

  var html = '';
  BM_MARKERS.forEach(function(group) {
    html += '<div class="bmGroupTitle">' + group.group + '</div>';
    html += '<div class="bmGrid">';
    group.markers.forEach(function(marker) {
      var rec = bmFindLatest(marker);
      var cls = rec ? bmClassify(rec.value, marker) : 'none';
      var statusLabels = { ok:'норма', warn:'внимание', high:'высокий', low:'низкий', none:'нет данных' };
      var statusLabel = statusLabels[cls] || '—';
      var interpretText = rec && marker.interpret ? (marker.interpret[cls] || '') : '';
      var barHtml = '';
      if (rec) {
        var pos = bmBarPos(rec.value, marker);
        barHtml = '<div class="bmBar"><div class="bmBarDot" style="left:' + pos + '%"></div></div>';
      }
      var encoded = encodeURIComponent(JSON.stringify({key: marker.key, unit: marker.unit, ref: marker.labMin + '–' + marker.labMax}));
      html += '<div class="bmCard bm-' + cls + '" onclick="bmQuickAdd(' + encoded + ')">';
      html += '<div class="bmName">' + marker.key.toUpperCase() + '</div>';
      if (rec) {
        html += '<div class="bmVal">' + escapeHtml(String(rec.value)) + '<span class="bmUnit">' + escapeHtml(marker.unit) + '</span></div>';
        html += '<div class="bmRef">Реф: ' + marker.labMin + '–' + marker.labMax + ' ' + marker.unit + '</div>';
        html += '<div class="bmRef" style="color:rgba(180,200,255,.3)">' + (rec.date || '') + '</div>';
        html += barHtml;
        html += '<div class="bmBadge">' + statusLabel + '</div>';
        if (interpretText) html += '<div class="bmInterpret">' + interpretText + '</div>';
      } else {
        html += '<div class="bmAddHint">＋</div>';
        html += '<div class="bmRef" style="margin-top:2px">Реф: ' + marker.labMin + '–' + marker.labMax + ' ' + marker.unit + '</div>';
        html += '<div class="bmBadge">' + statusLabel + '</div>';
        if (marker.aasNote) html += '<div class="bmInterpret">' + marker.aasNote + '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  });

  root.innerHTML = html;
}

// ── Quick add: pre-fill bloodwork form ────────────────────────────────
function bmQuickAdd(encoded) {
  try {
    var data = JSON.parse(decodeURIComponent(encoded));
    // Find the marker config
    var marker = null;
    BM_MARKERS.forEach(function(g) {
      g.markers.forEach(function(m) {
        if (m.key === data.key) marker = m;
      });
    });

    // Fill the quick-add form
    var nameEl  = document.getElementById('bwName');
    var unitEl  = document.getElementById('bwUnit');
    var refEl   = document.getElementById('bwRef');
    var dateEl  = document.getElementById('bwDate');
    var valEl   = document.getElementById('bwValue');

    if (nameEl) nameEl.value = marker ? (marker.names[0].charAt(0).toUpperCase() + marker.names[0].slice(1)) : data.key;
    if (unitEl) unitEl.value = data.unit || '';
    if (refEl)  refEl.value  = data.ref  || '';
    if (dateEl && !dateEl.value) dateEl.value = today();
    if (valEl)  { valEl.value = ''; valEl.focus(); }

    // Scroll to the form
    var formCard = document.querySelector('#healthRoot .bloodworkGrid');
    if (formCard) formCard.scrollIntoView({ behavior: 'smooth', block: 'center' });

    toast('Заполни значение для ' + (nameEl ? nameEl.value : data.key));
  } catch(e) {
    console.error('bmQuickAdd error:', e);
  }
}

// ── Compact overview for Обзор tab ────────────────────────────────────
function bmRenderOverview() {
  var root = document.getElementById('bmOverviewRoot');
  if (!root) return;
  // Show top 6 most critical markers with traffic light
  var priority = ['гематокрит','лпвп','алт','эстрадиол','тестостерон общий','пролактин'];
  var html = '';
  priority.forEach(function(key) {
    var marker = null;
    BM_MARKERS.forEach(function(g){ g.markers.forEach(function(m){ if(m.key===key) marker=m; }); });
    if (!marker) return;
    var rec = bmFindLatest(marker);
    var cls = rec ? bmClassify(rec.value, marker) : 'none';
    var icons = {ok:'🟢', warn:'🟡', high:'🔴', low:'🟠', none:'⚪'};
    html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg2);border-radius:10px;border:1px solid var(--line)">'
      + '<span style="font-size:14px">' + (icons[cls]||'⚪') + '</span>'
      + '<div style="min-width:0"><div style="font-size:11px;font-weight:700;color:var(--txt)">' + marker.key.charAt(0).toUpperCase() + marker.key.slice(1) + '</div>'
      + '<div style="font-size:10px;color:var(--mut)">' + (rec ? rec.value + ' ' + marker.unit : 'нет данных') + '</div></div>'
      + '</div>';
  });
  root.innerHTML = html || '<div style="font-size:12px;color:var(--mut);grid-column:1/-1">Добавь анализы во вкладке «Анализы»</div>';
}

// ── Init on health panel render ────────────────────────────────────────
(function patchRenderHealthPanel() {
  var orig = window.renderHealthPanel;
  if (typeof orig !== 'function') {
    setTimeout(patchRenderHealthPanel, 100);
    return;
  }
  window.renderHealthPanel = function() {
    orig.apply(this, arguments);
    var tab = S._healthTab || 'overview';
    setTimeout(function() {
      if (tab === 'overview')  { if(typeof renderHealthOverview==='function') renderHealthOverview(); }
      if (tab === 'bloodwork') { bmRefreshPanel && bmRefreshPanel(); }
      if (tab === 'pressure')  { renderBpTrend && renderBpTrend(document.getElementById('bpTrendRoot')); }
      if (tab === 'wellbeing') {
        renderWellbeingSection && renderWellbeingSection(document.getElementById('wellbeingRoot'));
        renderPeakWeek && renderPeakWeek(document.getElementById('peakWeekRoot'));
      }
      bindHealthRecordActions && bindHealthRecordActions();
    }, 80);
  };
})();
</script>

  var blood  = (S.pharma && S.pharma.bloodwork) || [];

  // ── BP data ────────────────────────────────────────────────
  var sortedH = health.slice().sort(function(a,b){ return String(b.ts||b.date||'').localeCompare(String(a.ts||a.date||'')); });
  var lastH   = sortedH.find(function(x){ return x.sys && x.dia; }) || sortedH[0];
  var bpState = lastH ? classifyBloodPressure(lastH.sys, lastH.dia) : {text:'нет данных',cls:'unknown',score:50};
  var score   = healthScoreFromData(health, blood);
  var scoreCls= healthScoreClass(score);
  var avgSys  = healthAvg(health,'sys',7);
  var avgDia  = healthAvg(health,'dia',7);
  var avgPulse= healthAvg(health,'pulse',7);

  // Score color
  var scoreColor = score >= 80 ? '#2dd87a' : score >= 60 ? '#f5b428' : '#ff5252';

  // BP trend arrow
  var trend = healthBpTrend(health);
  var trendIcon = trend==='растет' ? '↑' : trend==='снижается' ? '↓' : '→';
  var trendCls  = trend==='растет' ? 'trend-up' : trend==='снижается' ? 'trend-down' : 'trend-flat';

  // ── Wellbeing data ─────────────────────────────────────────
  var WB_KEYS   = ['energy','mood','libido','joints','sleep'];
  var WB_ICONS  = {energy:'⚡', mood:'😊', libido:'🔥', joints:'🦴', sleep:'😴'};
  var WB_LABELS = {energy:'Энергия', mood:'Настроение', libido:'Либидо', joints:'Суставы', sleep:'Сон'};

  // Last 7 days wellbeing
  var wbDays = [];
  var now = new Date();
  for (var i = 6; i >= 0; i--) {
    var d = new Date(now); d.setDate(now.getDate() - i);
    var key = d.getFullYear() + '-' + (d.getMonth()<9?'0':'') + (d.getMonth()+1) + '-' + (d.getDate()<10?'0':'') + d.getDate();
    var data = (S.wellbeing && S.wellbeing[key]) || null;
    var dows = ['вс','пн','вт','ср','чт','пт','сб'];
    wbDays.push({ key: key, data: data, dow: dows[d.getDay()] });
  }

  var todayWb  = (S.wellbeing && S.wellbeing[wbDays[6].key]) || {};
  var wbTodayFilled = WB_KEYS.filter(function(k){ return todayWb[k]; }).length;

  // Average per metric over 7 days
  var wbAvgs = {};
  WB_KEYS.forEach(function(k) {
    var vals = wbDays.filter(function(d){ return d.data && d.data[k]; }).map(function(d){ return d.data[k]; });
    wbAvgs[k] = vals.length ? (vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1) : null;
  });

  // Overall avg
  var wbAllVals = [];
  wbDays.forEach(function(d) {
    if (!d.data) return;
    WB_KEYS.forEach(function(k){ if(d.data[k]) wbAllVals.push(d.data[k]); });
  });
  var wbOverallAvg = wbAllVals.length ? (wbAllVals.reduce(function(a,b){return a+b;},0)/wbAllVals.length) : 0;

  // Wellbeing trend (compare first 3 vs last 3 days with data)
  var wbWithData = wbDays.filter(function(d){ return d.data; });
  var wbTrendText = 'мало данных';
  var wbTrendIcon = '';
  if (wbWithData.length >= 4) {
    var firstHalf = wbWithData.slice(0, Math.floor(wbWithData.length/2));
    var secondHalf= wbWithData.slice(Math.floor(wbWithData.length/2));
    function avgDay(days) {
      var sum=0, cnt=0;
      days.forEach(function(d){ WB_KEYS.forEach(function(k){ if(d.data[k]){sum+=d.data[k];cnt++;} }); });
      return cnt ? sum/cnt : 0;
    }
    var diff = avgDay(secondHalf) - avgDay(firstHalf);
    wbTrendText = diff > 0.3 ? 'улучшается' : diff < -0.3 ? 'снижается' : 'стабильно';
    wbTrendIcon = diff > 0.3 ? ' ↑' : diff < -0.3 ? ' ↓' : '';
  }

  // Wellbeing color
  function wbColor(v) {
    if (!v) return 'rgba(200,205,230,.15)';
    v = parseFloat(v);
    if (v <= 2) return '#ff4444';
    if (v <= 3) return '#ffb020';
    return '#28d97a';
  }

  // ── Biomarkers ─────────────────────────────────────────────
  var bmPriority = [
    'гематокрит','лпвп','алт','эстрадиол',
    'тестостерон общий','пролактин','аст','лпнп',
    'креатинин','триглицериды'
  ];
  var bmDotColors = {ok:'#2dd87a', warn:'#f5b428', high:'#ff5252', low:'#ff9500', none:'rgba(200,205,230,.2)'};

  var bmItems = [];
  if (typeof BM_MARKERS !== 'undefined') {
    bmPriority.forEach(function(key) {
      var marker = null;
      BM_MARKERS.forEach(function(g){ g.markers.forEach(function(m){ if(m.key===key) marker=m; }); });
      if (!marker) return;
      var rec = typeof bmFindLatest === 'function' ? bmFindLatest(marker) : null;
      var cls = rec && typeof bmClassify === 'function' ? bmClassify(rec.value, marker) : 'none';
      bmItems.push({ marker: marker, rec: rec, cls: cls });
    });
  }

  // ── Alerts ─────────────────────────────────────────────────
  var alerts = [];

  // BP alert
  if (lastH) {
    var sys = Number(lastH.sys), dia = Number(lastH.dia);
    if (sys >= 160 || dia >= 100) {
      alerts.push({ level:'red',   icon:'🔴', title:'Давление критически высокое', sub: sys+'/'+dia+' мм рт.ст. — требует внимания' });
    } else if (sys >= 140 || dia >= 90) {
      alerts.push({ level:'amber', icon:'🟡', title:'Давление повышено', sub: sys+'/'+dia+' — отслеживай динамику' });
    }
  }

  // Biomarker alerts
  bmItems.forEach(function(item) {
    if (item.cls === 'high') {
      alerts.push({ level:'red', icon:'🔴', title: item.marker.key.charAt(0).toUpperCase()+item.marker.key.slice(1)+' выше нормы',
        sub: item.rec ? item.rec.value+' '+item.marker.unit+' (реф: до '+item.marker.optMax+')' : '' });
    } else if (item.cls === 'low') {
      alerts.push({ level:'amber', icon:'🟠', title: item.marker.key.charAt(0).toUpperCase()+item.marker.key.slice(1)+' ниже нормы',
        sub: item.rec ? item.rec.value+' '+item.marker.unit+' (реф: от '+item.marker.optMin+')' : '' });
    } else if (item.cls === 'warn') {
      alerts.push({ level:'amber', icon:'🟡', title: item.marker.key.charAt(0).toUpperCase()+item.marker.key.slice(1)+' — пограничное значение',
        sub: item.rec ? item.rec.value+' '+item.marker.unit : '' });
    }
  });

  // Wellbeing alert
  if (wbOverallAvg > 0 && wbOverallAvg < 2.5) {
    alerts.push({ level:'amber', icon:'😔', title:'Самочувствие низкое', sub:'Средний балл за 7 дней: '+wbOverallAvg.toFixed(1)+'/5' });
  }

  // No alerts
  if (!alerts.length) {
    alerts.push({ level:'green', icon:'✅', title:'Критических отклонений не обнаружено', sub:'Продолжай контроль показателей' });
  }
  // Limit to 4
  alerts = alerts.slice(0, 4);

  // ── Build HTML ─────────────────────────────────────────────
  var html = '<div class="hoDashboard">';

  // 1. Score card
  html += '<div class="hoScoreCard">'
    + '<div class="hoScoreRing" style="border-color:'+scoreColor+'44;background:'+scoreColor+'0a">'
    + '<div class="hoScoreNum" style="color:'+scoreColor+'">'+score+'</div>'
    + '<div class="hoScoreOf">/ 100</div>'
    + '</div>'
    + '<div class="hoScoreRight">'
    + '<div class="hoScoreTitle">Индекс здоровья</div>'
    + '<div class="hoScoreSub">Последний замер: '+(lastH ? healthRecordDateTime(lastH) : 'нет данных')+'</div>'
    + '<div class="hoScorePill '+scoreCls+'">'+bpState.text.toUpperCase()+'</div>'
    + '</div>'
    + '</div>';

  // 2. 3-col metrics
  html += '<div class="hoMetrics">'
    + '<div class="hoMetric"><div class="v">'+(lastH&&lastH.sys&&lastH.dia?lastH.sys+'/'+lastH.dia:'—')+'</div><div class="k">АД сейчас</div>'+(bpState.cls?'<div class="trend '+trendCls+'">'+trendIcon+' '+trend+'</div>':'')+'</div>'
    + '<div class="hoMetric"><div class="v">'+(lastH&&lastH.pulse?lastH.pulse:'—')+'</div><div class="k">Пульс уд/мин</div>'+(avgPulse?'<div class="trend trend-flat">ср '+avgPulse+'</div>':'')+'</div>'
    + '<div class="hoMetric"><div class="v">'+(avgSys&&avgDia?avgSys+'/'+avgDia:'—')+'</div><div class="k">АД 7 дней</div><div class="trend trend-flat">'+health.length+' замеров</div></div>'
    + '</div>';

  // 3. Wellbeing strip
  var wbBarsHtml = '<div class="hoWbBars">';
  var wbLabelsHtml = '<div class="hoWbDayLabel">';
  wbDays.forEach(function(d) {
    var total=0, cnt=0;
    if (d.data) WB_KEYS.forEach(function(k){ if(d.data[k]){total+=d.data[k];cnt++;} });
    var avg = cnt ? total/cnt : 0;
    var h = Math.max(3, Math.round(avg/5*32));
    var color = avg ? wbColor(avg) : 'rgba(255,255,255,.06)';
    var isToday = d.key === wbDays[6].key;
    wbBarsHtml += '<div class="hoWbBar" style="height:'+h+'px;background:'+color+';'+(isToday?'outline:2px solid rgba(155,109,255,.5);outline-offset:1px;':'')+'"  title="'+d.dow+'"></div>';
    wbLabelsHtml += '<div class="hoWbDayL" style="color:'+(isToday?'var(--txt)':'')+'">'+d.dow+'</div>';
  });
  wbBarsHtml += '</div>';
  wbLabelsHtml += '</div>';

  var wbMetricsHtml = '<div class="hoWbGrid">';
  WB_KEYS.forEach(function(k) {
    var val = todayWb[k] || null;
    var avg7 = wbAvgs[k];
    var color = val ? wbColor(val) : 'var(--mut)';
    wbMetricsHtml += '<div class="hoWbMetric">'
      + '<div class="hoWbIcon">'+WB_ICONS[k]+'</div>'
      + '<div class="hoWbVal" style="color:'+color+'">'+(val||'—')+'</div>'
      + '<div class="hoWbLabel">'+WB_LABELS[k].slice(0,4)+'</div>'
      + (avg7 ? '<div style="font-size:8px;color:var(--mut)">ср '+avg7+'</div>' : '')
      + '</div>';
  });
  wbMetricsHtml += '</div>';

  html += '<div class="hoWbCard">'
    + '<div class="hoWbHeader">'
    + '<div>'
    + '<div class="hoWbTitle">😌 Самочувствие</div>'
    + '<div style="font-size:10px;color:var(--mut);margin-top:2px">'
    + (wbOverallAvg > 0 ? 'Среднее 7 дней: <b style="color:'+wbColor(wbOverallAvg)+'">'+wbOverallAvg.toFixed(1)+'/5</b> · '+wbTrendText+wbTrendIcon : 'Нет данных за 7 дней')
    + '</div></div>'
    + (wbTodayFilled < 5 ? '<button onclick="document.querySelector(\'.nb[data-tab=today]\').click()" style="font-size:10px;padding:4px 10px;border-radius:99px;border:1px solid rgba(155,109,255,.3);background:rgba(155,109,255,.12);color:#9d6fff;cursor:pointer">+ Сегодня</button>' : '<span style="font-size:11px;color:#2dd87a;font-weight:700">✓ заполнено</span>')
    + '</div>'
    + wbMetricsHtml
    + wbBarsHtml
    + wbLabelsHtml
    + '</div>';

  // 4. Biomarkers compact grid
  if (bmItems.length) {
    html += '<div class="card" style="padding:12px 14px">'
      + '<div class="ctitle" style="margin-bottom:10px">🧬 Биомаркеры '
      + '<button onclick="healthSwitchTab(\'bloodwork\')" style="font-size:10px;padding:2px 8px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--mut);cursor:pointer">Все →</button>'
      + '</div>'
      + '<div class="hoBmGrid">';
    bmItems.slice(0, 8).forEach(function(item) {
      var dotColor = bmDotColors[item.cls] || bmDotColors.none;
      html += '<div class="hoBmItem bm-'+item.cls+'">'
        + '<div class="hoBmDot" style="background:'+dotColor+'"></div>'
        + '<div class="hoBmName">'+item.marker.key.charAt(0).toUpperCase()+item.marker.key.slice(1)+'</div>'
        + '<div class="hoBmVal">'+(item.rec ? item.rec.value+' <span style="font-size:9px;color:var(--mut)">'+item.marker.unit+'</span>' : '<span style="color:var(--mut);font-size:11px">—</span>')+'</div>'
        + '</div>';
    });
    html += '</div></div>';
  } else {
    html += '<div class="card" style="padding:12px 14px">'
      + '<div class="ctitle">🧬 Биомаркеры</div>'
      + '<div style="font-size:12px;color:var(--mut);padding:8px 0">Добавь анализы во вкладке '
      + '<button onclick="healthSwitchTab(\'bloodwork\')" style="color:var(--blue);background:none;border:none;cursor:pointer;font-size:12px;font-weight:700">Анализы →</button></div>'
      + '</div>';
  }

  // 5. Alerts
  if (alerts.length) {
    html += '<div class="card" style="padding:12px 14px">'
      + '<div class="ctitle" style="margin-bottom:8px">⚠️ Внимание</div>'
      + '<div class="hoAlerts">';
    alerts.forEach(function(a) {
      html += '<div class="hoAlert alert-'+a.level+'">'
        + '<div class="hoAlertIcon">'+a.icon+'</div>'
        + '<div><div class="hoAlertText">'+a.title+'</div>'
        + (a.sub ? '<div class="hoAlertSub">'+escapeHtml(a.sub)+'</div>' : '')
        + '</div></div>';
    });
    html += '</div></div>';
  }

  // 6. AI strip
  var aiCache = typeof getAiCache === 'function' ? getAiCache('health') : null;
  html += '<div class="hoAiStrip">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
    + '<div class="ctitle" style="margin:0">AI-анализ здоровья</div>'
    + '<div style="display:flex;gap:6px">'
    + '<button class="btn-sm" onclick="runHealthAiAnalysis()">Анализировать</button>'
    + '<button class="btn-sm" onclick="clearHealthAiAnalysis()">Очистить</button>'
    + '</div></div>'
    + '<div id="healthAiOutput" class="healthAiOutput" style="font-size:12px">'
    + (aiCache && aiCache.text ? escapeHtml(aiCache.text) : '<span style="color:var(--mut)">Нажми «Анализировать» — AI сопоставит давление, биомаркеры и самочувствие.</span>')
    + '</div>'
    + '</div>';

  html += '</div>'; // .hoDashboard

  root.innerHTML = html;
}
</script>





<script id="notificationsJS">
// ═══════════════════════════════════════════════════════════════
// X-GENE NOTIFICATIONS MANAGER
// ═══════════════════════════════════════════════════════════════

var XNotify = (function() {
  var _permitted = false;

  // ── Request permission ────────────────────────────────────────
  async function requestPermission() {
    if (!('Notification' in window)) return false;
    if (Notification.permission === 'granted') { _permitted = true; return true; }
    if (Notification.permission === 'denied')  return false;
    var result = await Notification.requestPermission();
    _permitted = result === 'granted';
    return _permitted;
  }

  // ── Schedule via SW ───────────────────────────────────────────
  function scheduleViaSW(payload, delayMs) {
    if (!navigator.serviceWorker || !navigator.serviceWorker.controller) return;
    navigator.serviceWorker.controller.postMessage({
      type: 'SCHEDULE_NOTIFICATION',
      payload: payload,
      delay: delayMs
    });
  }

  // ── Show immediate notification ───────────────────────────────
  async function show(title, body, options) {
    if (!_permitted) {
      var ok = await requestPermission();
      if (!ok) return;
    }
    options = options || {};
    if (window._swReg) {
      window._swReg.showNotification(title, {
        body: body,
        icon: './icon-192.png',
        badge: './icon-192.png',
        tag: options.tag || 'xgene',
        vibrate: [100, 50, 100],
        data: { url: './' }
      });
    } else {
      new Notification(title, { body: body, icon: './icon-192.png', tag: options.tag });
    }
  }

  // ── Build today's schedule from S.settings.tasks ─────────────
  function buildTodaySchedule() {
    var schedule = [];
    var tasks = (S.settings && S.settings.tasks) || [];
    var now = new Date();
    var today = now.toISOString().slice(0, 10);
    var dow = now.getDay();

    tasks.forEach(function(task) {
      if (!task.time || !task.active) return;
      // Check if task applies today
      var applies = !task.days || task.days.length === 0 || task.days.includes(dow);
      if (!applies) return;

      // Parse task time
      var parts = task.time.split(':');
      var taskDate = new Date(now);
      taskDate.setHours(parseInt(parts[0])||0, parseInt(parts[1])||0, 0, 0);

      var delayMs = taskDate - now;
      if (delayMs < -60000) return; // already passed >1 min ago

      var label = task.type === 'bp' ? '🩺 Замер давления' :
                  task.type === 'pharma' ? '💉 ' + (task.name||'Фарма') :
                  task.type === 'meal'   ? '🥩 ' + (task.name||'Приём пищи') :
                  task.type === 'train'  ? '🏋️ Тренировка' :
                  task.type === 'weight' ? '⚖️ Замер веса' :
                  task.type === 'sleep'  ? '😴 Время сна' :
                  '📋 ' + (task.name||task.type);

      schedule.push({ task: task, delayMs: Math.max(0, delayMs), label: label });
    });

    return schedule;
  }

  // ── Schedule all today's notifications ───────────────────────
  function scheduleToday() {
    if (!_permitted) return;
    var schedule = buildTodaySchedule();
    schedule.forEach(function(item) {
      var mins = Math.round(item.delayMs / 60000);
      var timeStr = item.task.time || '';
      scheduleViaSW({
        title: item.label,
        body:  'Запланировано на ' + timeStr,
        tag:   'xgene-task-' + (item.task.id || item.task.type) + '-' + timeStr
      }, item.delayMs);
    });
    if (schedule.length) {
      toast('✓ Запланировано ' + schedule.length + ' уведомлений на сегодня');
    }
    return schedule.length;
  }

  // ── One-shot reminder ─────────────────────────────────────────
  function remindIn(title, body, minutes, tag) {
    scheduleViaSW({ title: title, body: body, tag: tag || 'xgene-reminder' }, minutes * 60 * 1000);
  }

  // ── Auto-schedule daily wellbeing reminder ────────────────────
  function scheduleWellbeingReminder() {
    if (!_permitted) return;
    var now = new Date();
    var target = new Date(now);
    target.setHours(21, 0, 0, 0); // 21:00
    if (target <= now) return; // already past
    var delayMs = target - now;
    scheduleViaSW({
      title: '😌 Как прошёл день?',
      body: 'Не забудь оценить самочувствие — 1 минута, 5 параметров.',
      tag: 'xgene-wellbeing'
    }, delayMs);
  }

  // ── Permission status for UI ──────────────────────────────────
  function getStatus() {
    if (!('Notification' in window)) return 'unsupported';
    return Notification.permission;
  }

  // ── Auto-init after SW ready ──────────────────────────────────
  function autoInit() {
    var status = getStatus();
    _permitted = status === 'granted';
    if (_permitted) {
      scheduleToday();
      scheduleWellbeingReminder();
    }
  }

  // ── Schedule local notifications for today's tasks ────────────
  function scheduleTaskNotifications() {
    if (!_permitted) return 0;
    if (!navigator.serviceWorker || !navigator.serviceWorker.controller) return 0;
    var schedule = buildTodaySchedule();
    var count = 0;
    schedule.forEach(function(item) {
      if (item.delayMs < 0) return;
      scheduleViaSW({
        title: item.label,
        body: 'Запланировано на ' + (item.task.time || ''),
        tag: 'xgene-task-' + (item.task.id || item.task.type) + '-' + (item.task.time || '')
      }, item.delayMs);
      count++;
    });
    return count;
  }

  // ── Also use JS setTimeout as backup (works even without SW) ──
  var _taskTimers = [];
  function scheduleTaskTimers() {
    // Clear old timers
    _taskTimers.forEach(function(t) { clearTimeout(t); });
    _taskTimers = [];
    if (!_permitted) return 0;
    var schedule = buildTodaySchedule();
    var count = 0;
    schedule.forEach(function(item) {
      if (item.delayMs < 1000) return;
      var timer = setTimeout(function() {
        show(item.label, 'Запланировано на ' + (item.task.time || ''), {
          tag: 'xgene-task-' + (item.task.id || item.task.type)
        });
      }, item.delayMs);
      _taskTimers.push(timer);
      count++;
    });
    return count;
  }

  // Init when SW is ready
  if (navigator.serviceWorker) {
    navigator.serviceWorker.ready.then(function() {
      setTimeout(autoInit, 1000);
    });
  } else {
    // Fallback without SW
    setTimeout(function() {
      _permitted = Notification.permission === 'granted';
      if (_permitted) scheduleTaskTimers();
    }, 1000);
  }

  return {
    request:   requestPermission,
    show:      show,
    scheduleToday:   scheduleToday,
    scheduleTimers:  scheduleTaskTimers,
    remindIn:  remindIn,
    wellbeing: scheduleWellbeingReminder,
    status:    getStatus,
    isGranted: function() { return _permitted || Notification.permission === 'granted'; }
  };
})();
</script>


<script id="shareSheetJS">
// ═══════════════════════════════════════════════════════════════
// SHARE SHEET — Web Share API
// ═══════════════════════════════════════════════════════════════

function shareCanDo() {
  return !!navigator.share;
}

// ── Build daily digest text ─────────────────────────────────────
function buildDailyDigest() {
  var t = today();
  var lines = [];

  // Header
  var phaseNames = {recomp:'Рекомпозиция',mass:'Массонабор',cut:'Сушка',peak:'Пик-неделя'};
  var phase = phaseNames[S.settings && S.settings.manualPhase] || '';
  var name  = (S.settings && S.settings.name) || 'Атлет';
  var compDate = S.settings && S.settings.compDate;
  var daysLeft = compDate ? Math.max(0, Math.round((new Date(compDate) - new Date()) / 86400000)) : null;

  lines.push('📊 X-GENE Prep OS — Дневной отчёт');
  lines.push('📅 ' + new Date().toLocaleDateString('ru', {weekday:'long', day:'numeric', month:'long'}));
  lines.push('👤 ' + name + (phase ? ' · ' + phase : '') + (daysLeft !== null ? ' · ' + daysLeft + ' дн до сцены' : ''));
  lines.push('');

  // Weight
  var ws = (S.weights||[]).sort(function(a,b){return a.date.localeCompare(b.date);});
  var lastW = ws.length ? ws[ws.length-1] : null;
  if (lastW) lines.push('⚖️ Вес: ' + lastW.value + ' кг');

  // Nutrition
  var todayMeals = (S.meals||[]).filter(function(m){return m.date===t;});
  if (todayMeals.length) {
    var kcal = todayMeals.reduce(function(s,m){return s+(m.kcal||0);},0);
    var p    = Math.round(todayMeals.reduce(function(s,m){return s+(m.p||0);},0));
    var c    = Math.round(todayMeals.reduce(function(s,m){return s+(m.c||0);},0));
    var f    = Math.round(todayMeals.reduce(function(s,m){return s+(m.f||0);},0));
    var goal = (S.settings && S.settings.goals && S.settings.goals.train) || {};
    lines.push('🍽 Питание: ' + kcal + ' ккал (цель ' + (goal.kcal||'—') + ')');
    lines.push('   Б' + p + ' У' + c + ' Ж' + f);
  }

  // Water
  var todayWater = (S.water||[]).filter(function(w){return w.date===t;})
    .reduce(function(s,w){return s+(w.ml||0);},0);
  if (todayWater) lines.push('💧 Вода: ' + (todayWater/1000).toFixed(1) + ' л');

  // Training
  var sessions = ((S.training && S.training.history)||[]);
  var todaySession = sessions.find(function(s){return s.date===t;});
  if (todaySession) {
    lines.push('🏋️ Тренировка: ' + (todaySession.name||'Выполнена'));
    lines.push('   ' + (todaySession.exercises||[]).length + ' упр · ' +
      Math.round((new Date(todaySession.endTs||Date.now()) - new Date(todaySession.startTs||Date.now())) / 60000) + ' мин');
  }

  // BP
  var health = (S.pharma && S.pharma.health)||[];
  var todayBP = health.filter(function(h){return (h.date||'').slice(0,10)===t;});
  var lastBP = todayBP.length ? todayBP[todayBP.length-1] : null;
  if (lastBP && lastBP.sys) lines.push('🩺 АД: ' + lastBP.sys + '/' + lastBP.dia + ' · Пульс ' + (lastBP.pulse||'—'));

  // Wellbeing
  var wbToday = (S.wellbeing && S.wellbeing[t]) || {};
  var WB_ICONS = {energy:'⚡',mood:'😊',libido:'🔥',joints:'🦴',sleep:'😴'};
  var wbFilled = Object.keys(WB_ICONS).filter(function(k){return wbToday[k];});
  if (wbFilled.length) {
    lines.push('');
    lines.push('😌 Самочувствие:');
    wbFilled.forEach(function(k) {
      lines.push('   ' + WB_ICONS[k] + ' ' + wbToday[k] + '/5');
    });
  }

  // Tasks done
  var tasks = (S.settings && S.settings.tasks)||[];
  var doneLogs = (S.pharma && S.pharma.logs)||[];
  var donedToday = doneLogs.filter(function(l){return l.date===t;}).length;
  if (tasks.length) {
    lines.push('');
    lines.push('✅ Задач выполнено: ' + donedToday + ' из ' + tasks.length);
  }

  lines.push('');
  lines.push('— X-GENE Prep OS');

  return lines.join('\n');
}
