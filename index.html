.nb{

/* ── Semantic alert colors via vars ── */
:root {
  /* Alert / status tones — aligned to new palette */
  --color-good:   #34d27a;   /* = --green */
  --color-warn:   #fbbf24;   /* = --amber */
  --color-bad:    #f87171;   /* = --red   */
  --color-info:   #5b8df5;   /* = --blue  */
  --color-ai:     #8b5cf6;   /* = --violet */

  /* Alert backgrounds */
  --bg-good:      rgba(52,210,122,.10);
  --bg-warn:      rgba(251,191,36,.09);
  --bg-bad:       rgba(248,113,113,.10);
  --bg-info:      rgba(80,120,200,.09);
  --bg-ai:        rgba(139,92,246,.09);

  /* Alert borders */
  --bd-good:      rgba(52,210,122,.30);
  --bd-warn:      rgba(251,191,36,.30);
  --bd-bad:       rgba(248,113,113,.30);
  --bd-info:      rgba(80,120,200,.28);
  --bd-ai:        rgba(139,92,246,.28);
}

/* ── Alert boxes — use new semantic vars ── */
.alertBox          { border-color: var(--bd-warn) !important; background: var(--bg-warn) !important; }
.alertBox.bad      { border-color: var(--bd-bad)  !important; background: var(--bg-bad)  !important; }
.alertBox.good     { border-color: var(--bd-good) !important; background: var(--bg-good) !important; }

/* ── Risk colors ── */
.riskGood { color: var(--color-good) !important; }
.riskWarn { color: var(--color-warn) !important; }
.riskBad  { color: var(--color-bad)  !important; }

/* ── Delta colors ── */
.deltaUp   { color: #fca5a5 !important; }
.deltaDown { color: var(--color-good) !important; }

/* ── Primary button — unified gradient ── */
.btn-p {
  background: var(--tab-color-bg,rgba(77,143,255,.18)) !important;
  box-shadow: 0 6px 20px rgba(80,120,200,.25) !important;
}

/* ── Segment / tab active states — use vars ── */
.segmentBtn.active,
.seg button.active {
  background: linear-gradient(180deg, var(--blue), #1e3a8a) !important;
  border-color: rgba(80,120,200,.55) !important;
  color: #fff !important;
}

  background: rgba(80,120,200,.18) !important;
  border-color: rgba(80,120,200,.50) !important;
  color: #fff !important;
}

.progressbar div,
.factorBar div,
.groupSummary .bar div,

  background: linear-gradient(90deg, var(--blue), var(--green)) !important;

.phaseRow.active {
  border-color: rgba(80,120,200,.55) !important;
  background: rgba(80,120,200,.08) !important;
}

/* ── Error card — use red var ── */
.errCard {
  background: rgba(248,113,113,.08) !important;
  border-color: rgba(248,113,113,.30) !important;
  color: #fecaca !important;
}

/* ── Check done ── */
.done .check {
  background: var(--green) !important;
  border-color: var(--green) !important;
}

/* ── Item added/done states ── */

/* ── Water button color ── */

/* ═══════════════════════════════════════════════════════════════
   X-GENE Prep OS v7.1 — HIGH CONTRAST DARK THEME
   Чёрный фон, белый текст, чёткие границы, насыщенные акценты.
   ═══════════════════════════════════════════════════════════════ */

:root{
  --bg:#0a0a0f !important;
  --bg1:#13141f !important;
  --bg2:#1a1b28 !important;
  --bg3:#222336 !important;

  --line:rgba(255,255,255,.12) !important;
  --line2:rgba(255,255,255,.22) !important;

  --txt:#f2f4ff !important;
  --mut:rgba(200,205,230,.58) !important;
  --mut2:rgba(215,220,240,.80) !important;

  /* Насыщенные акценты */
  --blue:#4d8fff !important;
  --violet:#a060ff !important;
  --green:#28d97a !important;
  --amber:#ffb020 !important;
  --red:#ff4444 !important;
  --pink:#ff3d6e !important;
  --cyan:#22d4f5 !important;
  --orange:#ff7730 !important;

  --r:20px !important;
  --r2:24px !important;
  --r-input:9px;

  --nav:72px !important;
  --spring:cubic-bezier(.22,1,.36,1);

  --fs-xs:10px !important;
  --fs-sm:12px !important;
  --fs-base:13px !important;
  --fs-md:14px !important;
  --fs-lg:16px !important;
  --fs-xl:23px !important;
  --fs-2xl:30px !important;
  --fw-reg:400 !important;
  --fw-med:500 !important;
  --fw-bold:600 !important;
  --fw-black:700 !important;
}

/* ── Base ── */
*{ scrollbar-color: rgba(255,255,255,.18) transparent; }
html,body{
  background:#0a0a0f !important;
  color:var(--txt) !important;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Helvetica Neue",Arial,sans-serif !important;
  font-weight:400 !important;
  color-scheme:only dark !important;
}
body{
  background:
    radial-gradient(600px 400px at 0% 0%, rgba(60,80,180,.20), transparent 55%),
    radial-gradient(500px 400px at 100% 15%, rgba(100,50,200,.16), transparent 50%),
    #0a0a0f !important;
  background-attachment:fixed !important;
}
body::before{ content:none !important; }
body::after{ content:none !important; }

.wrap{ max-width:620px !important; padding:0 15px !important; }
.panel{
  animation:panelIn .35s var(--spring) both;
  padding-top:calc(var(--safe-t) + 14px) !important;
}
.panel.active{ display:block !important; }
@keyframes panelIn{ from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

/* ── Typography ── */
.shead{ padding:16px 2px 14px !important; align-items:flex-end !important; }
h1,h2{
  font-weight:700 !important;
  letter-spacing:-.04em !important;
  color:#ffffff !important;
}
h1{ font-size:30px !important; }
h2{ font-size:26px !important; }
.sub{ font-weight:400 !important; color:var(--mut) !important; line-height:1.45 !important; }
.ctitle{
  font-weight:600 !important;
  color:rgba(200,205,230,.55) !important;
  letter-spacing:.09em !important;
  margin-bottom:12px !important;
}

/* ══════════════════════════════
   CARDS — чёткие, разделённые
   ══════════════════════════════ */
.card,
.qaction{
  background:#141520 !important;

  visibility: hidden;

  position: relative;
}
.bmBarDot {
  position: absolute; top: 50%; width: 10px; height: 10px;
  border-radius: 50%; background: #fff;
  border: 2px solid rgba(0,0,0,.4);
  transform: translate(-50%,-50%);
  box-shadow: 0 0 8px rgba(255,255,255,.4);
}
.bmAddHint { font-size: 22px; text-align: center; opacity: .25; padding: 4px 0; }

#healthTabs { grid-template-columns: repeat(4,1fr) !important; }
#healthTabs .trainTab { font-size:11px !important; }

/* ── Health Overview Dashboard ── */
.hoDashboard { display: flex; flex-direction: column; gap: 10px; }

/* Score card */
.hoScoreCard {
  background: linear-gradient(160deg, rgba(79,142,255,.12), rgba(14,16,28,.98));
  border: 1px solid rgba(79,142,255,.22);
  border-radius: 20px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.hoScoreRing {
  width: 72px; height: 72px; flex-shrink: 0;
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border: 3px solid rgba(79,142,255,.25);
  background: rgba(79,142,255,.08);
  position: relative;
}
.hoScoreNum { font-size: 26px; font-weight: 900; letter-spacing: -.04em; line-height: 1; }
.hoScoreOf  { font-size: 9px; color: var(--mut); font-family: var(--font-mono); margin-top: 1px; }
.hoScoreRight { flex: 1; min-width: 0; }
.hoScoreTitle { font-size: 15px; font-weight: 800; letter-spacing: -.03em; }
.hoScoreSub   { font-size: 11px; color: var(--mut); margin-top: 3px; }
.hoScorePill  {
  display: inline-flex; align-items: center; gap: 4px;
  height: 22px; padding: 0 8px; border-radius: 99px;
  font-size: 10px; font-weight: 800; letter-spacing: .04em;
  font-family: var(--font-mono); margin-top: 6px;
}
.hoScorePill.good { background: rgba(45,216,122,.15); color: #2dd87a; border: 1px solid rgba(45,216,122,.3); }
.hoScorePill.warn { background: rgba(245,180,40,.15);  color: #f5b428; border: 1px solid rgba(245,180,40,.3); }
.hoScorePill.bad  { background: rgba(255,82,82,.15);   color: #ff5252; border: 1px solid rgba(255,82,82,.3); }

/* 3-col metrics */
.hoMetrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.hoMetric {
  background: var(--bg2); border: 1px solid var(--line);
  border-radius: 14px; padding: 10px 10px 8px;
  text-align: center;
}
.hoMetric .v { font-size: 18px; font-weight: 800; letter-spacing: -.03em; }
.hoMetric .k { font-size: 9px; color: var(--mut); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; }
.hoMetric .trend { font-size: 10px; margin-top: 2px; }
.trend-up   { color: #ff5252; }
.trend-down { color: #2dd87a; }
.trend-flat { color: var(--mut); }

/* Wellbeing strip */
.hoWbCard {
  background: linear-gradient(160deg, rgba(155,109,255,.08), rgba(14,16,28,.98));
  border: 1px solid rgba(155,109,255,.2);
  border-radius: 16px; padding: 14px;
}
.hoWbHeader { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.hoWbTitle  { font-size: 13px; font-weight: 700; }
.hoWbAvg    { font-size: 20px; font-weight: 900; letter-spacing: -.04em; }
.hoWbGrid   { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-bottom: 10px; }
.hoWbMetric { text-align: center; }
.hoWbIcon   { font-size: 16px; }
.hoWbVal    { font-size: 13px; font-weight: 800; margin-top: 2px; }
.hoWbLabel  { font-size: 8px; color: var(--mut); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .04em; margin-top: 1px; }
.hoWbBars   { display: flex; gap: 3px; align-items: flex-end; height: 32px; }
.hoWbBar    { flex: 1; border-radius: 3px 3px 0 0; min-height: 3px; }
.hoWbDayLabel { display: flex; gap: 3px; margin-top: 3px; }
.hoWbDayL   { flex: 1; font-size: 8px; text-align: center; color: var(--mut); font-family: var(--font-mono); }

/* Biomarkers compact */
.hoBmGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.hoBmItem {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 12px;
  background: var(--bg2); border: 1px solid var(--line);
}
.hoBmItem.bm-ok   { border-color: rgba(45,216,122,.25);  }
.hoBmItem.bm-warn { border-color: rgba(245,180,40,.25);  }
.hoBmItem.bm-high { border-color: rgba(255,82,82,.25);   }
.hoBmItem.bm-low  { border-color: rgba(255,149,0,.25);   }
.hoBmDot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.hoBmName { font-size: 10px; font-weight: 700; color: var(--mut2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hoBmVal  { font-size: 11px; font-weight: 700; color: var(--txt); white-space: nowrap; }

/* Alerts */
.hoAlerts { display: flex; flex-direction: column; gap: 6px; }
.hoAlert {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: 12px;
  border: 1px solid;
}
.hoAlert.alert-red  { background: rgba(255,82,82,.07);  border-color: rgba(255,82,82,.25);  }
.hoAlert.alert-amber{ background: rgba(245,180,40,.07); border-color: rgba(245,180,40,.25); }
.hoAlert.alert-green{ background: rgba(45,216,122,.07); border-color: rgba(45,216,122,.25); }
.hoAlertIcon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.hoAlertText { font-size: 12px; line-height: 1.45; color: var(--txt); }
.hoAlertSub  { font-size: 10px; color: var(--mut); margin-top: 2px; }

/* AI strip */
.hoAiStrip {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--line);
  border-radius: 14px; padding: 12px;
}

/* ── Progress tabs grid ── */
#progressTabs {
  display: grid !important;
  grid-template-columns: repeat(4, 1fr) !important;
  overflow: visible !important;
}
#progressTabs .trainTab {
  width: 100% !important;
  min-width: 0 !important;
  white-space: nowrap !important;
  overflow: hidden !important;
  text-overflow: ellipsis !important;
}
</style>

<script id="progressTabsJS">
// ═══════════════════════════════════════════════════════════════
// PROGRESS TABS
// ═══════════════════════════════════════════════════════════════

function progressTabsHTML(active) {
  var tabs = [
    {k:'overview', v:'Обзор'},
    {k:'measures', v:'Замеры'},
    {k:'photos',   v:'Форма'},
    {k:'reports',  v:'Отчёты'},
    {k:'imports',  v:'📥 Импорт'}
  ];
  return '<div class="shead"><div><h2>Прогресс</h2></div>'
    + '<button class="btn-sm" onclick="G.openMeasurements()">+ замеры</button></div>'
    + '<div class="trainTabs" id="progressTabs" style="margin-bottom:16px">'
    + tabs.map(function(t) {
        return '<button class="trainTab' + (active===t.k?' active':'') + '" onclick="progressSwitchTab(\'' + t.k + '\')">' + t.v + '</button>';
      }).join('')
    + '</div>';
}

function progressSwitchTab(tab) {
  S._progressTab = tab;
  var root = document.getElementById('progressScreenRoot');
  if (!root) { R.progress(); return; }
  document.querySelectorAll('#progressTabs .trainTab').forEach(function(b) {
    b.classList.toggle('active', b.textContent.trim() === {overview:'Обзор',measures:'Замеры',photos:'Форма',reports:'Отчёты','📥 Импорт':'📥 Импорт'}[tab]);
  });
  renderProgressTab(tab);
}

function renderProgressTab(tab) {
  var root = document.getElementById('progressScreenRoot');
  if (!root) return;
  if (tab === 'overview')  renderProgressOverview(root);
  else if (tab === 'measures') renderProgressMeasures(root);
  else if (tab === 'photos')   renderProgressPhotos(root);
  else if (tab === 'reports')  renderProgressReports(root);
  else if (tab === 'imports')  renderImportHub(root);
}

// ══ ОБЗОР ══════════════════════════════════════════════════════
function renderProgressOverview(root) {
  var ws = S.weights ? S.weights.slice().sort(function(a,b){return a.date.localeCompare(b.date);}) : [];
  var lastW  = ws.length ? ws[ws.length-1] : null;
  var meas   = (S.measurements||[]).slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  var lastM  = meas.length ? meas[meas.length-1] : null;
  var speed  = typeof weightSpeed === 'function' ? weightSpeed() : null;
  var comply = typeof planCompliance === 'function' ? planCompliance(7) : null;
  var ph     = typeof phase === 'function' ? phase() : '';

  // Speed color
  var speedColor = '#e4ecff';
  if (speed !== null) {
    if (ph === 'cut')  speedColor = speed < -1.2 ? '#ff5252' : speed < 0 ? '#2dd87a' : '#ffb020';
    if (ph === 'mass') speedColor = speed > 0.8  ? '#ff5252' : speed > 0 ? '#2dd87a' : '#ffb020';
    if (ph === 'recomp') speedColor = Math.abs(speed) < 0.3 ? '#2dd87a' : '#ffb020';
  }

  // Decision engine cache
  var decCache = typeof getAiCache === 'function' ? getAiCache('decision') : null;

  // Phase progress
  var daysLeft = null;
  if (S.settings && S.settings.compDate) {
    daysLeft = Math.max(0, Math.round((new Date(S.settings.compDate) - new Date()) / 86400000));
  }

  var html = '';

  // KPI row
  html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px">';
  html += '<div class="card" style="padding:12px;text-align:center"><div style="font-size:28px;font-weight:900;letter-spacing:-.04em">' + (lastW ? lastW.value : '—') + '<span style="font-size:14px;font-weight:500"> кг</span></div><div style="font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-top:3px;font-family:var(--font-mono)">Вес</div></div>';
  html += '<div class="card" style="padding:12px;text-align:center"><div style="font-size:28px;font-weight:900;letter-spacing:-.04em">' + (lastM && lastM.waist ? lastM.waist : '—') + '<span style="font-size:14px;font-weight:500"> см</span></div><div style="font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-top:3px;font-family:var(--font-mono)">Талия</div></div>';
  html += '</div>';

  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">';
  html += '<div class="card" style="padding:10px;text-align:center"><div style="font-size:20px;font-weight:800;color:' + speedColor + '">' + (speed !== null ? (speed > 0 ? '+' : '') + speed : '—') + '</div><div style="font-size:9px;color:var(--mut);font-family:var(--font-mono);text-transform:uppercase;margin-top:2px">кг/нед</div></div>';
  html += '<div class="card" style="padding:10px;text-align:center"><div style="font-size:20px;font-weight:800;color:' + (comply >= 80 ? '#2dd87a' : comply >= 60 ? '#ffb020' : '#ff5252') + '">' + (comply !== null ? comply + '%' : '—') + '</div><div style="font-size:9px;color:var(--mut);font-family:var(--font-mono);text-transform:uppercase;margin-top:2px">план 7д</div></div>';
  html += '<div class="card" style="padding:10px;text-align:center"><div style="font-size:20px;font-weight:800">' + (daysLeft !== null ? daysLeft : '—') + '</div><div style="font-size:9px;color:var(--mut);font-family:var(--font-mono);text-transform:uppercase;margin-top:2px">до сцены</div></div>';
  html += '</div>';

  // Mini weight chart
  html += '<div class="card" style="padding:14px 16px;margin-bottom:10px"><div class="ctitle" style="margin-bottom:8px">График веса</div><canvas id="progressWeightMini" height="100"></canvas></div>';

  // Decision Engine
  html += '<div class="card decisionBox" style="margin-bottom:10px">'
    + '<div class="ctitle">🎯 Decision Engine <span style="display:flex;gap:6px"><button class="btn-sm" onclick="runDecisionEngine()">Рассчитать</button><button class="btn-sm" onclick="clearDecisionEngine&&clearDecisionEngine()">Очистить</button></span></div>'
    + '<div class="sub" style="margin-bottom:8px">Управленческое решение на 7 дней: держать курс, менять питание, кардио или нагрузку.</div>'
    + '<div id="decisionEngineOutput" class="decisionOutput">' + (decCache && decCache.text ? escapeHtml(decCache.text) : 'Нажми «Рассчитать».') + '</div>'
    + '</div>';

  // Status note
  var note = '';
  if (speed === null) note = 'Недостаточно данных по весу.';
  else if (speed < -1.2) note = '⚠️ Снижение слишком быстрое — риск потери мышечной массы.';
  else if (speed < 0 && ph === 'cut') note = '✓ Скорость снижения в рабочей зоне.';
  else if (speed > 0 && ph === 'mass') note = '✓ Набор идёт по плану.';
  else if (ph === 'cut') note = '⚠️ На сушке вес не снижается — проверь план.';
  else note = 'Динамика соответствует текущей фазе.';
  if (note) html += '<div style="font-size:12px;color:var(--mut);padding:4px 2px;margin-bottom:10px">' + note + '</div>';

  root.innerHTML = html;

  // Draw mini chart
  setTimeout(function() {
    var canvas = document.getElementById('progressWeightMini');
    if (!canvas || !ws.length) return;
    var data30 = ws.slice(-30).map(function(x){ return {date:x.date, val:parseFloat(x.value)||0}; });
    if (typeof drawChart === 'function') drawChart('progressWeightMini', data30);
  }, 50);
}

// ══ ЗАМЕРЫ ═════════════════════════════════════════════════════
function renderProgressMeasures(root) {
  var meas = (S.measurements||[]).slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var lastM = meas[0], prevM = meas[1];

  function delta(cur, prev, key) {
    if (!cur || !prev || !cur[key] || !prev[key]) return '';
    var d = (parseFloat(cur[key]) - parseFloat(prev[key])).toFixed(1);
    var color = parseFloat(d) < 0 ? '#2dd87a' : '#ff5252';
    return ' <span style="font-size:10px;color:' + color + '">' + (parseFloat(d)>0?'+':'') + d + '</span>';
  }

  var ibC = typeof ibLatest === 'function' ? ibLatest() : null;
  var ibP = typeof ibPrev  === 'function' ? ibPrev()   : null;
  function ibDelta(c,p,k){ if(!c||!p||!c[k]||!p[k])return ''; var d=(parseFloat(c[k])-parseFloat(p[k])).toFixed(1); return (parseFloat(d)>0?'+':'')+d; }

  var html = '';

  // Last measurements
  html += '<div class="card"><div class="ctitle">Замеры тела <button class="btn-sm" onclick="G.openMeasurements()">+ добавить</button></div>';
  if (lastM) {
    var keys = [['Вес','weight','кг'],['Талия','waist','см'],['Грудь','chest','см'],['Плечи','shldr','см'],['Бицепс Л','al','см'],['Бицепс П','ar','см'],['Бедро Л','thl','см'],['Бедро П','thr','см']];
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">';
    keys.forEach(function(k) {
      var val = lastM[k[1]];
      if (!val) return;
      html += '<div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:9px 10px">'
        + '<div style="font-size:9px;color:var(--mut);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em">' + k[0] + '</div>'
        + '<div style="font-size:17px;font-weight:700;margin-top:2px">' + val + ' <span style="font-size:10px;font-weight:400;color:var(--mut)">' + k[2] + '</span>' + delta(lastM, prevM, k[1]) + '</div>'
        + '</div>';
    });
    html += '</div>';
    html += '<div style="font-size:11px;color:var(--mut)">Дата: ' + (typeof fmt==='function'?fmt(lastM.date):lastM.date) + '</div>';
  } else {
    html += '<div class="sub">Нет замеров. Нажми «+ добавить».</div>';
  }
  html += '</div>';

  // History
  if (meas.length > 1) {
    html += '<div class="card"><div class="ctitle">История замеров</div>';
    meas.slice(0,5).forEach(function(m) {
      html += '<div class="item"><div class="main">'
        + '<div class="name">' + (typeof fmt==='function'?fmt(m.date):m.date) + '</div>'
        + '<div class="meta">Вес: ' + (m.weight||'—') + ' · Талия: ' + (m.waist||'—') + ' · Бицепс: ' + (m.al||'—') + '/' + (m.ar||'—') + '</div>'
        + '</div></div>';
    });
    html += '</div>';
  }

  // Charts
  html += '<div class="card"><div class="ctitle">Графики</div>'

async function geminiGenerateContent(promptText) {
  const cfg = S.settings.gemini || {};
  const apiKey = (cfg.apiKey || '').trim();
  const model = (cfg.model || 'gemini-2.5-flash').trim();

  if (!apiKey) {
    toast('Пожалуйста, укажи API-ключ Gemini в настройках', 3000, 'error');
    throw new Error('Сначала добавь ключ Gemini API в настройках.');
  }
  if (!promptText || !promptText.trim()) {
    throw new Error('Запрос не может быть пустым.');
  }

  const url = 'https://generativelanguage.googleapis.com/v1beta/models/'
    + encodeURIComponent(model) + ':generateContent?key=' + encodeURIComponent(apiKey);

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 60000);

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({
        contents: [{ parts: [{ text: promptText }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 16384 }
      })
    });
    clearTimeout(timer);

    const data = await resp.json();
    if (!resp.ok) {
      const msg = (data.error && data.error.message) || ('HTTP ' + resp.status);
      throw new Error('Gemini API ' + resp.status + ': ' + msg);
    }

    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('Пустой ответ от Gemini.');
    return text;
  } catch (e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('Таймаут — запрос занял больше 60 сек.');
    throw e;
  }
}

function estOneRM(w,r){
  w=Number(w||0); r=Number(r||0);
  if(!w||!r) return 0;
  return Math.round(w*(1+r/30));
}
function trainingAnalyticsData(){
  const sessions = Array.isArray(S.training?.sessions) ? S.training.sessions : [];
  const exMap = {};
  const groupMap = {};
  let totalSets = 0, totalVolume = 0, totalWorkouts = sessions.length;

  sessions.forEach(s=>{
    (s.exercises||[]).forEach(e=>{
      const name=e.name||'Упражнение';
      const group=e.group||'Другое';
      if(!exMap[name]) exMap[name]={name,group,sets:0,volume:0,bestWeight:0,bestReps:0,best1rm:0,dates:[]};
      if(!groupMap[group]) groupMap[group]={group,sets:0,volume:0};
      (e.sets||[]).forEach(set=>{
        const w=Number(set.w||0)||0;
        const r=Number(set.r||0)||0;
        const isWork = w>0 || r>0 || set.done;
        if(!isWork) return;
        const vol=w*r;
        const orm=estOneRM(w,r);
        exMap[name].sets++;
        exMap[name].volume+=vol;
        groupMap[group].sets++;
        groupMap[group].volume+=vol;
        totalSets++;
        totalVolume+=vol;
        if(w>exMap[name].bestWeight){exMap[name].bestWeight=w;exMap[name].bestReps=r;}
        if(orm>exMap[name].best1rm) exMap[name].best1rm=orm;
      });
      if(s.date && !exMap[name].dates.includes(s.date)) exMap[name].dates.push(s.date);
    });
  });

  const exercises=Object.values(exMap).sort((a,b)=>b.best1rm-a.best1rm);
  const groups=Object.values(groupMap).sort((a,b)=>b.sets-a.sets);
  const topSets=[];
  sessions.forEach(s=>(s.exercises||[]).forEach(e=>(e.sets||[]).forEach(set=>{
    const w=Number(set.w||0)||0, r=Number(set.r||0)||0;
    if(!w&&!r&&!set.done) return;
    topSets.push({date:s.date,name:e.name||'Упражнение',group:e.group||'Другое',w,r,oneRM:estOneRM(w,r),volume:w*r});
  })));
  topSets.sort((a,b)=>b.oneRM-a.oneRM);

  return {sessions,totalWorkouts,totalSets,totalVolume,exercises,groups,topSets};
}

}

function classifyBloodPressure(sys,dia){
  sys=Number(sys||0); dia=Number(dia||0);
  if(!sys||!dia) return {text:'нет данных',cls:'warn',score:60};
  if(sys>=180||dia>=120) return {text:'кризисный уровень',cls:'bad',score:15};
  if(sys>=160||dia>=100) return {text:'очень высокое',cls:'bad',score:35};
  if(sys>=140||dia>=90) return {text:'высокое',cls:'bad',score:50};
  if(sys>=130||dia>=85) return {text:'пограничное',cls:'warn',score:68};
  if(sys<90||dia<55) return {text:'низкое',cls:'warn',score:65};
  return {text:'рабочий диапазон',cls:'good',score:88};
}
function healthAvg(list,key,days){
  const cutoff=Date.now()-(days||7)*86400000;
  const arr=(list||[]).filter(x=>{const t=new Date(x.ts||x.date||0).getTime();return t&&t>=cutoff}).map(x=>Number(x[key]||0)).filter(Boolean);
  if(!arr.length) return null;
  return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
}
function healthBpTrend(list){
  const rows=[...(list||[])].filter(x=>x.sys&&x.dia).sort((a,b)=>String(a.ts||a.date||'').localeCompare(String(b.ts||b.date||'')));
  if(rows.length<2) return 'мало данных';
  const a=rows[Math.max(0,rows.length-4)], b=rows[rows.length-1];
  const ds=Number(b.sys)-Number(a.sys), dd=Number(b.dia)-Number(a.dia);
  if(Math.abs(ds)<4 && Math.abs(dd)<3) return 'стабильно';
  if(ds>0 || dd>0) return 'растет';
  return 'снижается';
}
function healthScoreFromData(health,blood){
  const last=[...(health||[])].filter(x=>x.sys&&x.dia).slice(-1)[0];
  let bp=classifyBloodPressure(last?.sys,last?.dia);
  let score=bp.score;
  const p=Number(last?.pulse||0);
  if(p && (p>100 || p<45)) score-=10;
  if(!(health||[]).length) score=50;
  return Math.max(0,Math.min(100,Math.round(score)));
}
function healthScoreClass(score){return score>=80?'good':score>=60?'warn':'bad';}

function bloodworkKey(x){return String((x&&x.name)||'').trim().toLowerCase()+'|'+String((x&&x.unit)||'').trim().toLowerCase();}
function parseBloodworkNumber(v){
  const m=String(v||'').replace(',', '.').match(/-?\d+(?:\.\d+)?/);
  return m?Number(m[0]):null;
}
function parseBloodworkRef(ref){
  const s=String(ref||'').replace(',', '.').replace(/[–—]/g,'-').trim();
  if(!s)return null;
  let m=s.match(/(-?\d+(?:\.\d+)?)\s*-\s*(-?\d+(?:\.\d+)?)/);
  if(m)return {min:Number(m[1]),max:Number(m[2]),type:'range'};
  m=s.match(/[<≤]\s*(-?\d+(?:\.\d+)?)/);
  if(m)return {min:null,max:Number(m[1]),type:'max'};
  m=s.match(/[>≥]\s*(-?\d+(?:\.\d+)?)/);
  if(m)return {min:Number(m[1]),max:null,type:'min'};
  m=s.match(/(?:до|less than)\s*(-?\d+(?:\.\d+)?)/i);
  if(m)return {min:null,max:Number(m[1]),type:'max'};
  return null;
}
function bloodworkRefStatus(value,ref){
  const n=parseBloodworkNumber(value), r=parseBloodworkRef(ref);
  if(n===null||!r)return {cls:'unknown',text:'нет референса',pos:50};
  if(r.min!==null&&n<r.min)return {cls:'low',text:'ниже реф.',pos:10};
  if(r.max!==null&&n>r.max)return {cls:'high',text:'выше реф.',pos:90};
  let pos=50;
  if(r.min!==null&&r.max!==null&&r.max!==r.min)pos=Math.max(0,Math.min(100,Math.round((n-r.min)/(r.max-r.min)*100)));
  return {cls:'ok',text:'в реф.',pos};
}
function bloodworkTrendText(rows){
  const nums=rows.map(x=>parseBloodworkNumber(x.value)).filter(v=>v!==null);
  if(nums.length<2)return 'мало данных';
  const first=nums[0], last=nums[nums.length-1];
  const diff=last-first;
  if(Math.abs(diff)<Math.max(0.01,Math.abs(first)*0.03))return 'стабильно';
  return diff>0?'растёт':'снижается';
}
function buildBloodworkStats(blood){
  const groups={};
  (blood||[]).forEach(function(x){
    const k=bloodworkKey(x); if(!k.trim()||k==='|')return;
    (groups[k]=groups[k]||[]).push(x);
  });
  return Object.keys(groups).map(function(k){
    const rows=groups[k].slice().sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
    const latest=rows[rows.length-1]||{};
    const st=bloodworkRefStatus(latest.value,latest.ref||latest.reference);
    return {key:k,name:latest.name||rows[0].name,unit:latest.unit||rows[0].unit||'',rows,latest,status:st,trend:bloodworkTrendText(rows)};
  }).sort((a,b)=>String(b.latest.date||'').localeCompare(String(a.latest.date||''))||String(a.name).localeCompare(String(b.name)));
}
function renderBloodworkDynamics(stats){
  if(!stats||!stats.length)return '<div class="sub">Добавь результаты анализов — здесь появится динамика каждого показателя.</div>';
  return stats.map(function(s){
    const ref=escapeHtml(s.latest.ref||s.latest.reference||'—');
    const val=escapeHtml(s.latest.value||'—')+' '+escapeHtml(s.unit||'');
    const points=s.rows.slice(-6).map(function(x){
      const n=parseBloodworkNumber(x.value);return n===null?'—':String(n);
    }).join(' → ');
    const encoded=encodeURIComponent(s.key);
    return `<div class="bloodworkDynItem">
      <div class="bloodworkDynTop"><div><div class="name">${escapeHtml(s.name)}</div><div class="meta">${fmt(s.latest.date)} · ${s.rows.length} записей · ${escapeHtml(s.trend)}</div></div><span class="bloodworkRefPill ${s.status.cls}">${s.status.text}</span></div>'
    + '<div class="bloodworkDynValue">${val}</div>'
    + '<div class="bloodworkRefLine"><span>Референс: ${ref}</span><span>${points}</span></div>'
    + '<div class="bloodworkRange"><i style="left:${s.status.pos}%"></i></div>'
    + '<div class="bloodworkDynActions"><button class="btn-sm" onclick="showBloodworkHistory('${encoded}')">История</button><button class="btn-sm btn-red" onclick="deleteBloodworkGroup('${encoded}')">Удалить группу</button></div>
    </div>`;
  }).join('');
}
function renderBloodworkJournal(blood){
  const rows=(blood||[]).slice().sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));

}

function pdfFileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{
      const s=String(r.result||'');
      resolve(s.split(',')[1]||'');
    };
    r.onerror=reject;
    r.readAsDataURL(file);
  });
}

function cleanGeminiJsonText(text){
  return String(text||'')
    .replace(/^```json\s*/i,'')
    .replace(/^```\s*/i,'')
    .replace(/```$/,'')
    .trim();
}

async function geminiExtractBloodworkFromPdf(file){
  const cfg=S.settings.gemini||{};
  const apiKey=(cfg.apiKey||'').trim();
  const model=cfg.model||'gemini-2.5-flash';
  if(!apiKey) throw new Error('Сначала добавь ключ Gemini API в настройках.');
  if(!file) throw new Error('Выбери PDF-файл.');

  const base64=await pdfFileToBase64(file);

  const prompt=`Ты извлекаешь лабораторные анализы крови из PDF.
Верни строго JSON без markdown и без пояснений.
Формат:
{
  "date": "YYYY-MM-DD или пусто",
  "lab": "название лаборатории или пусто",
  "items": [
    {
      "name": "название показателя на русском или как в PDF",
      "value": "значение",
      "unit": "единица измерения",
      "reference": "референсный диапазон, если есть",
      "flag": "normal|high|low|unknown",
      "note": "краткое пояснение, если нужно"
    }
  ]
}
Извлекай только реальные лабораторные показатели. Не выдумывай данные. Если значение не найдено — не добавляй показатель.`;

  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent`,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-goog-api-key':apiKey
    },
    body:JSON.stringify({
      contents:[{
        parts:[
          {text:prompt},
          {inline_data:{mime_type:'application/pdf',data:base64}}
        ]
      }]
    })
  });

  if(!res.ok){
    const txt=await res.text();
    throw new Error('Ошибка Gemini PDF: '+res.status+' '+txt.slice(0,220));
  }

  const data=await res.json();
  const text=data?.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('\n').trim()||'';
  const jsonText=cleanGeminiJsonText(text);
  try{
    return JSON.parse(jsonText);
  }catch(e){
    throw new Error('Gemini вернул невалидный JSON: '+jsonText.slice(0,220));
  }
}

function commitBloodworkPdfImport(){
  const parsed=window._pdfDraft;
  if(!parsed||!Array.isArray(parsed.items)||!parsed.items.length){
    toast('Нет данных для внесения');
    return;
  }
  S.pharma.bloodwork=S.pharma.bloodwork||[];
  const date=parsed.date||today();
  let added=0, skipped=0;
  parsed.items.forEach(x=>{
    const name=x.name||'Показатель';
    const value=x.value||'';
    const unit=x.unit||'';
    const ref=x.reference||x.ref||'';
    const dup=S.pharma.bloodwork.some(v=>String(v.date||'')===date && String(v.name||'').trim().toLowerCase()===String(name).trim().toLowerCase() && String(v.value||'').trim()===String(value).trim() && String(v.unit||'').trim().toLowerCase()===String(unit).trim().toLowerCase());
    if(dup){skipped++;return;}
    S.pharma.bloodwork.push({
      id:id(),
      date,
      name,
      value,
      unit,
      ref,
      flag:x.flag||bloodworkRefStatus(value,ref).cls,
      note:x.note||''
    });
    added++;
  });
  window._pdfDraft=null;
  save();
  renderHealthPanel();
  toast('Анализы внесены: '+added+(skipped?' · дубликатов пропущено: '+skipped:''));
}

function getSupabaseClient(){
  const cfg=ensureSyncSettings();
  if(!cfg.url || !cfg.anonKey) throw new Error('Укажи Supabase URL и Anon Key.');

function syncApplyRemotePayload(payload, updatedAt){
  if(!payload) return;
  const cfg=JSON.parse(JSON.stringify(ensureSyncSettings()));
  S=payload;
  S.settings=S.settings||{};
  S.settings.sync=cfg;
  S.settings.sync.lastSync=updatedAt||new Date().toISOString();
  S.settings.sync.status='Обновлено из Realtime';
  saveLocalOnly();
  R.all();
  renderSyncStatus();
  toast('Данные обновлены из облака');
}

function startRealtimeSync(){
  const cfg=ensureSyncSettings();
  try{
    if(!cfg.enabled || !cfg.url || !cfg.anonKey){
      cfg.status='Realtime выключен: включи автосинхронизацию и сохрани настройки';
      saveLocalOnly();
      renderSyncStatus();
      return;
    }

    const client=getSupabaseClient();

    if(window._prepRealtimeChannel){
      try{client.removeChannel(window._prepRealtimeChannel)}catch(e){}
      window._prepRealtimeChannel=null;
    }

    window._prepRealtimeChannel = client
      .channel('prep_state_'+(cfg.userId||'default'))
      .on(
        'postgres_changes',
        {
          event:'*',
          schema:'public',
          table:'prep_state',
          filter:'user_id=eq.'+(cfg.userId||'default')
        },
        payload=>{
          const row=payload.new;
          if(!row || !row.payload) return;
          const remoteTs = row.updated_at || '';
          const localTs = ensureSyncSettings().lastSync || '';
          if(remoteTs && localTs && remoteTs <= localTs) return;
          syncApplyRemotePayload(row.payload, remoteTs);
        }
      )
      .subscribe(status=>{
        const cfg2=ensureSyncSettings();
        if(status==='SUBSCRIBED'){
          cfg2.status='Realtime подключен';
        }else if(status==='CHANNEL_ERROR'){
          cfg2.status='Ошибка Realtime';
        }else if(status==='TIMED_OUT'){
          cfg2.status='Realtime: тайм-аут';
        }else{
          cfg2.status='Realtime: '+status;
        }
        saveLocalOnly();
        renderSyncStatus();
      });
  }catch(e){
    const cfg3=ensureSyncSettings();
    cfg3.status='Ошибка Realtime: '+(e.message||e);
    saveLocalOnly();
    renderSyncStatus();
  }
}

function stopRealtimeSync(){
  try{
    const cfg=ensureSyncSettings();
    if(window._prepRealtimeChannel && window._prepSupabaseClient){
      window._prepSupabaseClient.removeChannel(window._prepRealtimeChannel);
    }
    window._prepRealtimeChannel=null;
    cfg.status='Realtime отключен';
    saveLocalOnly();
    renderSyncStatus();
    toast('Realtime отключен');
  }catch(e){
    toast('Ошибка отключения Realtime');
  }
}


function fatSecretPdfToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{
      const s=String(r.result||'');
      resolve(s.split(',')[1]||'');
    };
    r.onerror=reject;
    r.readAsDataURL(file);
  });
}
function cleanFatSecretJsonText(text){
  return String(text||'')
    .replace(/^```json\s*/i,'')
    .replace(/^```\s*/i,'')
    .replace(/```$/,'')
    .trim();
}
async function geminiExtractFatSecretPdf(file){

  const prompt=`Ты извлекаешь дневной отчет питания из PDF приложения FatSecret.
Верни строго JSON без markdown и без пояснений.
Нужно извлечь:

Формат:
{
  "source": "FatSecret",
  "days": [
    {
      "date": "YYYY-MM-DD или пусто если дата не найдена",

          "kcal": 0,
          "protein": 0,
          "fat": 0,
          "carbs": 0
        }
      ],
      "note": "кратко: что было найдено"
    }
  ]
}

Правила:
- kcal = калории.
- protein = белок в граммах.
- fat = жиры в граммах.
- carbs = углеводы в граммах.
- sodium = натрий в мг, если есть.
- water = вода в литрах, если есть.
- mealCount = количество приемов пищи, найденных в PDF.
- meals должен содержать реальные приемы пищи, если они явно указаны в отчете.

  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent`,{

function normalizeFatSecretDay(d){
  const meals=Array.isArray(d.meals)?d.meals:[];
  return {
    date: d.date || today(),
    kcal: n(d.kcal),
    p: n(d.protein || d.p),
    f: n(d.fat || d.f),
    c: n(d.carbs || d.c),
    fiber: n(d.fiber),
    sugar: n(d.sugar),
    sodium: n(d.sodium),
    water: n(d.water),
    mealCount: n(d.mealCount || meals.length),
    meals: meals.map((m,i)=>({
      meal: m.meal || ('Прием '+(i+1)),
      name: m.name || m.description || ('FatSecret · прием '+(i+1)),
      kcal: n(m.kcal),
      p: n(m.protein || m.p),
      f: n(m.fat || m.f),
      c: n(m.carbs || m.c)
    })),
    note: d.note || ''
  };
}
function splitFatSecretDayIntoMeals(d,count){
  count=Math.max(1,n(count)||1);
  return Array.from({length:count},(_,i)=>({
    meal:'Прием '+(i+1),
    name:'FatSecret · прием '+(i+1),
    kcal:Math.round((d.kcal/count)*10)/10,
    p:Math.round((d.p/count)*10)/10,
    f:Math.round((d.f/count)*10)/10,
    c:Math.round((d.c/count)*10)/10
  }));
}

function commitFatSecretPdfImport(){
  const draft=S.fatsecretDraft;
  const rawDays=(draft?.days||[]);
  const days=rawDays.map(normalizeFatSecretDay);
  if(!days.length){toast('Нет данных для внесения');return;}

  let totalMeals=0;
  days.forEach((d,di)=>{
    const date=d.date||today();
    let meals=d.meals||[];
    if(!meals.length){
      const countEl=document.getElementById('fatsecretMealCount_'+di);
      const count=n(countEl?.value)||d.mealCount||1;
      meals=splitFatSecretDayIntoMeals(d,count);
    }

    S.meals=S.meals.filter(x=>!(x.date===date && x.source==='FatSecret PDF'));
    meals.forEach((m,i)=>{
      S.meals.push({
        id:id(),
        date,
        meal:m.meal||('Прием '+(i+1)),
        name:m.name||('FatSecret · прием '+(i+1)),
        kcal:n(m.kcal),
        p:n(m.p),
        f:n(m.f),
        c:n(m.c),
        source:'FatSecret PDF',
        fatsecretMealIndex:i+1,
        fatsecretMealCount:meals.length,
        note:d.note||''
      });
      totalMeals++;
    });

    if(d.sodium){
      S.sodium=S.sodium.filter(x=>!(x.date===date && x.source==='FatSecret PDF'));
      S.sodium.push({id:id(),date,value:d.sodium,source:'FatSecret PDF'});
    }
    if(d.water){
      S.water=S.water.filter(x=>!(x.date===date && x.source==='FatSecret PDF'));
      S.water.push({id:id(),date,amount:d.water,source:'FatSecret PDF'});
    }
  });

  if(S.workflow){

// ══════════════════════════════════════════════════════════════
// SMART DAY ENGINE v1.0
// Builds a time-ordered schedule for today and finds current slot
// ══════════════════════════════════════════════════════════════

function timeToMins(t) {
  if (!t || typeof t !== 'string') return 0;
  var parts = t.split(':');
  return parseInt(parts[0]||0)*60 + parseInt(parts[1]||0);
}
function minsToTime(m) {
  m = ((m % 1440) + 1440) % 1440;
  var h = Math.floor(m/60), mm = m%60;
  return (h<10?'0':'')+h+':'+(mm<10?'0':'')+mm;
}
function nowMins() {
  var n = new Date();
  return n.getHours()*60 + n.getMinutes();
}
function todayDow() { return new Date().getDay(); } // 0=Sun

// Build sorted event list for today
// Returns array of: {time:'HH:MM', mins:N, type:'wake'|'sleep'|'meal'|'train'|'pharma'|'supp', label, sub, icon, id?, done?}
function buildDayTimeline() {
  var ds = S.settings.daySchedule || {};
  var isTraining = S.settings.woDays && S.settings.woDays.includes(todayDow());
  var slot = isTraining ? (ds.trainDay || {}) : (ds.restDay || {});
  // If no wake time configured → no tasks, show setup prompt
  if (!slot.wake) return {events:[], isTraining:isTraining, currentIdx:-1};
  // If phases defined: only show tasks if at least one phase has started
  var phases = S.settings.phases || [];
  var t = today();
  if (phases.length > 0) {
    var anyStarted = phases.some(function(p) {
      return p.start && t >= p.start;
    });
    if (!anyStarted) return {events:[], isTraining:isTraining, currentIdx:-1, noPhaseYet:true};
  } else {
    // No phases defined at all → still show tasks (режим дня configured)
  }
  var meals = ds.meals || {};
  var events = [];

  // Wake
  if (slot.wake) events.push({mins:timeToMins(slot.wake), time:slot.wake, type:'wake', icon:'☀️', label:'Подъём', sub:''});

  // Sleep
  if (slot.sleep) events.push({mins:timeToMins(slot.sleep), time:slot.sleep, type:'sleep', icon:'🌙', label:'Отбой', sub:'Сон'});

  // Training
  if (isTraining) {
    var dow = todayDow();
    var woTimes = S.settings.woTimes || {};
    var woTime = woTimes[dow] || '10:00';
    events.push({mins:timeToMins(woTime), time:woTime, type:'train', icon:'🏋️', label:'Тренировка', sub:'Основная сессия'});
  }

  // Meals — auto-calculated from wake/sleep + user offsets
  var mealCount = parseInt(meals.count)||5;
  var wakeOffset  = (meals.wakeOffsetMins  !== undefined) ? parseInt(meals.wakeOffsetMins)  : 30;
  var sleepOffset = (meals.sleepOffsetMins !== undefined) ? parseInt(meals.sleepOffsetMins) : -60;
  var mealFirst = timeToMins(slot.wake||'07:00') + wakeOffset;
  var mealLast  = timeToMins(slot.sleep||'23:00') + sleepOffset;
  // Guard: first must be before last
  if (mealFirst >= mealLast) mealFirst = mealLast - 60 * (mealCount - 1);
  var mealSpan  = mealLast - mealFirst;
  for (var i = 0; i < mealCount; i++) {
    var mealMins = mealCount > 1
      ? Math.round(mealFirst + (mealSpan / (mealCount - 1)) * i)
      : mealFirst;
    events.push({
      mins: mealMins,
      time: minsToTime(mealMins),
      type: 'meal',
      icon: i===0 ? '🥣' : i===mealCount-1 ? '🥛' : '🍽️',
      label: 'Приём ' + (i+1) + '/' + mealCount,
      sub: i===0 ? 'Завтрак' : i===mealCount-1 ? 'Последний' : 'Основной'
    });
  }

  // Blood pressure measurements — auto from wake/sleep offsets
  var bpCfg = ds.bp || {};
  if (bpCfg.enabled !== false) {
    var bpWakeOffset    = (bpCfg.wakeOffsetMins    !== undefined) ? parseInt(bpCfg.wakeOffsetMins)    : 15;
    var bpEveningOffset = (bpCfg.eveningOffsetMins !== undefined) ? parseInt(bpCfg.eveningOffsetMins) : -90;
    var bpMorningMins = timeToMins(slot.wake||'07:00') + bpWakeOffset;
    var bpEveningMins = timeToMins(slot.sleep||'23:00') + bpEveningOffset;
    events.push({
      mins: bpMorningMins,
      time: minsToTime(bpMorningMins),
      type: 'bp', icon: '🩺', label: 'Давление', sub: 'Утренний замер'
    });
    if (bpEveningMins > bpMorningMins + 120) { // only add if meaningfully different
      events.push({
        mins: bpEveningMins,
        time: minsToTime(bpEveningMins),
        type: 'bp', icon: '🩺', label: 'Давление', sub: 'Вечерний замер'
      });
    }
  }

  // Pharma items — from S.pharma.pharma.items + supps.items + meds.items
  var pharmaGroups = [];
  try { if (S.pharma && S.pharma.pharma && S.pharma.pharma.items) pharmaGroups = pharmaGroups.concat(S.pharma.pharma.items.map(function(x){return Object.assign({},x,{_cat:'pharma'})})); } catch(e){}
  try { if (S.pharma && S.pharma.supps && S.pharma.supps.items) pharmaGroups = pharmaGroups.concat(S.pharma.supps.items.map(function(x){return Object.assign({},x,{_cat:'supp'})})); } catch(e){}
  try { if (S.pharma && S.pharma.meds && S.pharma.meds.items) pharmaGroups = pharmaGroups.concat(S.pharma.meds.items.map(function(x){return Object.assign({},x,{_cat:'med'})})); } catch(e){}

  pharmaGroups.forEach(function(item) {
    if (!item.time || !item.name) return; // skip if no time set
    var times = Array.isArray(item.time) ? item.time : [item.time];
    times.forEach(function(t) {
      if (!t) return;
      events.push({
        mins: timeToMins(t),
        time: t,
        type: item._cat === 'pharma' ? 'pharma' : 'supp',
        icon: item._cat === 'pharma' ? '💉' : item._cat === 'med' ? '💊' : '🧴',
        label: item.name,
        sub: (item.dose||'') + (item.form ? ' · ' + item.form : ''),
        itemId: item.id
      });
    });
  });

  // Sort by time
  events.sort(function(a,b){ return a.mins - b.mins; });

  // Mark done / current based on now
  var now = nowMins();
  var currentIdx = -1;
  for (var j = 0; j < events.length; j++) {
    var isLast = j === events.length - 1;
    var nextMins = isLast ? 1440 : events[j+1].mins;
    events[j].done = events[j].mins < now;
    events[j].current = (events[j].mins <= now && now < nextMins);
    if (events[j].current) currentIdx = j;
  }
  // If nothing is current (before first event), mark first as "upcoming"
  if (currentIdx === -1 && events.length > 0) currentIdx = 0;

  return {events: events, currentIdx: currentIdx, isTraining: isTraining};
}

function _schedChip(dow, groupId, label, active, small) {
  var h   = small ? '26px' : '30px';
  var px  = small ? '9px'  : '12px';
  var fs  = small ? '11px' : '12px';
  var r   = small ? '9px'  : '12px';
  return '<button data-dow="'+dow+'" data-group="'+groupId+'" onclick="scheduleToggle(this,'+dow+')"'
    + ' style="height:'+h+';padding:0 '+px+';border-radius:'+r+';border:1px solid '
    + (active?'rgba(79,142,255,.5)':'rgba(255,255,255,.12)')

window.scheduleSelectAllChildren = function(dow, parentId) {
  // Find children from GROUPS definition
  var GROUPS_REF = {
    '__legs__':  ['Квадрицепс','Бицепс бедра'],
    '__delts__': ['Дельты пер.','Дельты ср.','Дельты зад.']
  };
  var children = GROUPS_REF[parentId] || [];
  if (!S.settings.woDayGroups) S.settings.woDayGroups = {};
  var arr = S.settings.woDayGroups[dow] || [];
  var allSelected = children.every(function(c){ return arr.includes(c); });
  if (allSelected) {
    // Deselect all
    S.settings.woDayGroups[dow] = arr.filter(function(x){ return !children.includes(x); });
  } else {
    // Select all missing
    var newArr = arr.slice();
    children.forEach(function(c){ if (!newArr.includes(c)) newArr.push(c); });
    S.settings.woDayGroups[dow] = newArr;
  }
  renderScheduleScreen(document.getElementById('trainScreen'));
};

 todayPharmaList(){
  const date=today(), rows=[];
  for(const type of ['pharma','supps','meds']){
   const prot=S.pharma[type].protocols.find(p=>p.active);
   if(prot) prot.items.forEach(it=>{
    const intakes=Array.isArray(it.intakes)&&it.intakes.length?it.intakes:(Array.isArray(it.days)?it.days.map(d=>({day:d,time:it.time||'—',amount:it.amount,unit:it.unit})):[]);
    intakes.forEach((take,idx)=>{if(Number(take.day)===new Date().getDay()) rows.push({type,name:it.name,dose:`${take.amount||''} ${take.unit||''}`.trim(),time:take.time||'—',note:it.note||'', intakeIndex:idx})});
  });
  }
  if(!rows.length) return '<div class="sub">Нет активных протоколов. Настрой во вкладке «Фарма».</div>';
  var nowH=new Date().getHours();
  function tSlot(t){var h=parseInt((t||'').split(':')[0])||0;if(h>=5&&h<11)return 'Утро';if(h>=11&&h<15)return 'День';if(h>=15&&h<20)return 'Вечер';return 'Ночь';}
  function isCurSlot(t){var h=parseInt((t||'').split(':')[0])||0;return Math.abs(h-nowH)<=2;}
  var grouped={};
  rows.forEach(function(x){var s=x.time&&x.time!=='—'?tSlot(x.time):'День';if(!grouped[s])grouped[s]=[];grouped[s].push(x);});
  var slotOrder=['Утро','День','Вечер','Ночь'];
  return slotOrder.filter(function(s){return grouped[s];}).map(function(s){
    var isCur=grouped[s].some(function(x){return isCurSlot(x.time);});

// Live preview for day schedule settings
function sdPreview(){
  try {
    // Support both new (s2TrainWake) and old (sdTrainWake) IDs
    var g = function(id){ var el=document.getElementById(id); return el?el.value:''; };
    var gv = function(newId, oldId){ return g(newId) || g(oldId); };
    var tmins = function(t){ if(!t) return 0; var p=t.split(':'); return parseInt(p[0]||0)*60+parseInt(p[1]||0); };
    var tfmt  = function(m){ m=((m%1440)+1440)%1440; var h=Math.floor(m/60),mm=m%60; return (h<10?'0':'')+h+':'+(mm<10?'0':'')+mm; };

    var trainWake  = gv('s2TrainWake','sdTrainWake');
    var trainSleep = gv('s2TrainSleep','sdTrainSleep');
    var restWake   = gv('s2RestWake','sdRestWake');
    var restSleep  = gv('s2RestSleep','sdRestSleep');

    var days = [
      {label:'Тренировочный', wake:trainWake, sleep:trainSleep},
      {label:'Отдых',         wake:restWake,  sleep:restSleep}
    ];
    var count  = parseInt(g('sdMealCount'))||5;
    var wOff   = parseInt(g('sdMealWakeOff'))||30;
    var sOff   = -(parseInt(g('sdMealSleepOff'))||60);
    var bpWOff = parseInt(g('sdBpWakeOff'))||15;
    var bpEOff = -(parseInt(g('sdBpEveOff'))||90);

    var mealHtml = '';
    var bpHtml   = '';

    days.forEach(function(day){
      if(!day.wake || !day.sleep) return;
      var wMins = tmins(day.wake);
      var sMins = tmins(day.sleep);
      var first = wMins + wOff;
      var last  = sMins + sOff;
      if(first >= last) last = first + 60;
      var span  = last - first;
      var times = [];
      for(var i=0;i<count;i++){
        times.push(tfmt(count>1 ? Math.round(first + span/(count-1)*i) : first));
      }
      mealHtml += '<div style="margin-bottom:6px"><span style="color:rgba(200,205,230,.50);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">' + day.label + '</span>'
        + ' <span style="color:#f2f4ff;font-size:12px">' + times.join(' · ') + '</span></div>';

      var bpMorn = tfmt(wMins + bpWOff);
      var bpEve  = tfmt(sMins + bpEOff);
      bpHtml += '<div style="margin-bottom:4px"><span style="color:rgba(200,205,230,.50);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">' + day.label + '</span>'
        + ' <span style="color:#f2f4ff;font-size:12px">🩺 ' + bpMorn + ' · ' + bpEve + '</span></div>';
    });

    var mp = document.getElementById('sdMealPreview');
    var bp = document.getElementById('sdBpPreview');
    if(mp) mp.innerHTML = mealHtml;
    if(bp) bp.innerHTML = bpHtml;
  } catch(e){ console.warn('sdPreview error:', e); }
}

    : 'база упражнений пуста';

    ? Math.max(0, Math.round((new Date(compDate) - new Date()) / 86400000))
    : null;

  const prompt = 'Составь сплит для IFBB. Ответь ТОЛЬКО JSON, без markdown, без пояснений.\n' + 'Дни: ' + daysStr + ' (' + woDays.length + ' дн.)\n' + 'Фаза: ' + (phase || 'подготовка') + (daysToComp !== null ? ', ' + daysToComp + 'д до старта' : '') + '\n' + 'База упражнений: ' + libStr + '\n' + 'Формат: {"split":[{"dow":1,"groups":["Грудь"],"templateName":"Грудь","exercises":[{"name":"...","sets":4,"reps":"8-12","weight":40}]}]}\n' + 'Правила: dow=0-6(0=Вс), включи только дни [' + woDays.join(',') + '], 4-5 упр на день строго из базы, каждую группу 1 раз в неделю.';

  if (btn) { btn.disabled = true; btn.textContent = '⏳ Генерирую...'; }
  out.innerHTML = '<div class="sub" style="padding:10px">AI анализирует твою базу и составляет сплит...</div>';

  try {
    const raw = await callAiProvider(prompt, '');
    // Strip markdown fences
    let text = raw.trim().replace(/^```json\s*/,'').replace(/\s*```\s*$/,'');
    // Try to repair truncated JSON — find last complete array element
    let data;
    try {
      data = JSON.parse(text);
    } catch(parseErr) {
      // Try to close truncated JSON: find last complete {...} in split array
      const lastComplete = text.lastIndexOf('},');
      if (lastComplete > 0) {
        const repaired = text.slice(0, lastComplete + 1) + ']}';
        try { data = JSON.parse(repaired); } catch(e2) { throw parseErr; }
      } else {
        throw new Error('AI вернул неполный ответ. Попробуй ещё раз или уменьши базу упражнений.');
      }
    }

    if (!data.split || !Array.isArray(data.split)) throw new Error('Неверный формат ответа AI');
    if (!data.split.length) throw new Error('AI не вернул ни одного дня. Попробуй ещё раз.');

    // Render editable preview
    renderSplitPreview(data.split, out);

  } catch(e) {
    out.innerHTML = '<div class="errCard">' + escapeHtml(e.message || String(e)) + '</div>';
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '✨ Сгенерировать сплит'; }
  }
}

function renderSplitPreview(splitData, container) {
  const dowNames = {0:'Воскресенье',1:'Понедельник',2:'Вторник',3:'Среда',4:'Четверг',5:'Пятница',6:'Суббота'};
  let html = '<div class="splitPreviewList">';
  splitData.forEach(function(day) {
    html += '<div class="splitDayCard" data-dow="' + day.dow + '">'
      + '<div class="splitDayHead">'
      +   '<div class="splitDayName">' + (dowNames[day.dow] || 'День') + '</div>'
      +   '<div class="splitDayGroups" id="splitGroups_' + day.dow + '">' + escapeHtml((day.groups||[]).join(' + ')) + '</div>'
      + '</div>'
      + '<div class="splitExList">';
    (day.exercises || []).forEach(function(ex, i) {
      html += '<div class="splitExRow" data-idx="' + i + '" data-dow="' + day.dow + '">'
        + '<span class="splitExName">' + escapeHtml(ex.name) + '</span>'
        + '<span class="splitExMeta">' + ex.sets + '×' + ex.reps + ' · ' + ex.weight + 'кг</span>'
        + '</div>';
    });
    html += '</div></div>';
  });
  html += '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">'
    + '<button class="btn btn-p" onclick="applySplitToTemplates(window._aiSplitData)">💾 Применить и сохранить</button>'
    + '<button class="btn btn-g" onclick="generateAISplit()">↺ Перегенерировать</button>'
    + '</div>';

  window._aiSplitData = splitData;
  container.innerHTML = html;
}

function applySplitToTemplates(splitData) {
  if (!splitData) return;
  if (!S.settings.woTemplates) S.settings.woTemplates = {};
  if (!S.settings.woDayGroups) S.settings.woDayGroups = {};
  if (!S.training.templates) S.training.templates = [];

  splitData.forEach(function(day) {
    // Find exercises from lib by name
    const exercises = (day.exercises || []).map(function(ex) {
      const libEx = S.training.lib.find(function(e) {
        return e.name.toLowerCase() === ex.name.toLowerCase();
      });
      if (!libEx) return null;
      return {
        exId: libEx.id,
        name: libEx.name,
        group: libEx.group,
        sets: ex.sets || 4,
        reps: ex.reps || libEx.reps,
        weight: ex.weight || libEx.weight
      };
    }).filter(Boolean);

    const tplId = id();
    const tpl = {
      id: tplId,
      name: day.templateName || (day.groups || []).join(' + '),
      type: (day.groups || [])[0] || 'Микс',
      groups: day.groups || [],
      woDays: [day.dow],
      exercises: exercises
    };

    // Remove old template for this day if exists
    const oldId = S.settings.woTemplates[day.dow];
    if (oldId) {
      S.training.templates = S.training.templates.filter(function(t) { return t.id !== oldId; });
    }

    S.training.templates.push(tpl);
    S.settings.woTemplates[day.dow] = tplId;
    S.settings.woDayGroups[day.dow] = day.groups || [];
  });

  save();
  toast('Сплит сохранён — ' + splitData.length + ' шаблонов создано');
  S.training.screen = 'templates';
  R.training();
}

var _twTimer = null;
var _twEvent = null;
var _twDeadline = null;

// Таймаут по типу задачи (в секундах)
var TW_TIMEOUT = { weight: 300, bp: 300, meal: 600, pharma: 900, supp: 900, med: 900, train: 600, sleep: 300, wake: 300 };

function twShow(ev) {
  if (!ev) return;
  _twEvent = ev;

  var root = document.getElementById('taskWidgetRoot');
  if (!root) return;

  var timeout = (TW_TIMEOUT[ev.type] || 300) * 1000;
  _twDeadline = Date.now() + timeout;

  root.innerHTML = twBuildHTML(ev);
  root.classList.add('twVisible');

  // Запуск таймера обратного отсчёта
  clearInterval(_twTimer);
  _twTimer = setInterval(function() {
    var remaining = Math.max(0, _twDeadline - Date.now());
    var el = document.getElementById('twCountdown');
    if (el) {
      var mins = Math.floor(remaining / 60000);
      var secs = Math.floor((remaining % 60000) / 1000);
      el.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
    }
    var bar = document.getElementById('twTimerBar');
    var orig = TW_TIMEOUT[ev.type] || 300;
    if (bar) bar.style.width = (remaining / (orig * 1000) * 100) + '%';

    if (remaining <= 0) {
      clearInterval(_twTimer);
      twExpire();
    }
  }, 500);
}

function twHide() {
  clearInterval(_twTimer);
  _twEvent = null;
  var root = document.getElementById('taskWidgetRoot');
  if (root) root.classList.remove('twVisible');
}

function twExpire() {
  // Задача истекла — помечаем просроченной, закрываем виджет
  if (_twEvent) markTaskDone && markTaskDone(_twEvent.id, _twEvent.mins - 1); // -1 чтобы = done_late или overdue

  var root = document.getElementById('todayRoot');

// SPARKLINE: weight mini-chart (7 days)
// ══════════════════════════════════════════════════════

function buildWeightSparkline() {
  var weights = (S.weights || []).slice(-14); // last 14, show 7
  if (weights.length < 2) return '';

  // Get last 7 values
  var data = weights.slice(-7).map(function(w){ return Number(w.value); });
  if (data.length < 2) return '';

  var min = Math.min.apply(null, data);
  var max = Math.max.apply(null, data);
  var range = max - min || 0.5;

  var W = 200, H = 40, pad = 4;
  var points = data.map(function(v, i) {
    var x = pad + (i / (data.length - 1)) * (W - pad * 2);
    var y = H - pad - ((v - min) / range) * (H - pad * 2);
    return x.toFixed(1) + ',' + y.toFixed(1);
  });

  // Trend: compare first half avg vs second half avg
  var half = Math.floor(data.length / 2);
  var avgFirst = data.slice(0, half).reduce(function(a,b){return a+b;},0) / half;
  var avgLast  = data.slice(-half).reduce(function(a,b){return a+b;},0) / half;
  var delta = data[data.length-1] - data[0];
  var trend = delta > 0.05 ? '↗' : delta < -0.05 ? '↘' : '→';

  // Phase target rate
  var phase = (S.settings.phases||[]).find(function(p){return p.current;});
  var phaseName = phase ? phase.name : (S.settings.manualPhase||'');
  var targetLabel = '';
  if (/реком|recomp/i.test(phaseName)) targetLabel = 'цель ±0';
  else if (/масс|mass/i.test(phaseName)) targetLabel = 'цель +0.3/нед';
  else if (/суш|cut/i.test(phaseName))  targetLabel = 'цель -0.7/нед';
  else if (/пик|peak/i.test(phaseName)) targetLabel = 'цель -0.5/нед';

  var trendColor = delta > 0.1 ? '#ffb020' : delta < -0.1 ? '#4d8fff' : '#28d97a';
  var lastVal = data[data.length-1].toFixed(1);

  // SVG sparkline path
  var pathD = 'M' + points.join(' L');
  // Fill area
  var fillD = 'M' + pad + ',' + H + ' L' + points.join(' L') + ' L' + (W-pad) + ',' + H + ' Z';

  return '<div class="sdSparkCard">'
    + '<div class="sdSparkHeader">'
    +   '<div class="sdSparkLabel">Вес · 7 дней</div>'
    +   '<div class="sdSparkStats">'
    +     '<span class="sdSparkTrend" style="color:' + trendColor + '">' + trend + ' ' + (delta >= 0 ? '+' : '') + delta.toFixed(2) + ' кг</span>'
    +     (targetLabel ? '<span class="sdSparkTarget">' + targetLabel + '</span>' : '')
    +   '</div>'
    + '</div>'
    + '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:44px;display:block">'
    +   '<defs><linearGradient id="spGrad" x1="0" y1="0" x2="0" y2="1">'
    +     '<stop offset="0%" stop-color="' + trendColor + '" stop-opacity="0.25"/>'
    +     '<stop offset="100%" stop-color="' + trendColor + '" stop-opacity="0.02"/>'
    +   '</linearGradient></defs>'
    +   '<path d="' + fillD + '" fill="url(#spGrad)"/>'
    +   '<path d="' + pathD + '" fill="none" stroke="' + trendColor + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
    // Dots on each point
    + data.map(function(v, i) {
        var x = pad + (i / (data.length - 1)) * (W - pad * 2);
        var y = H - pad - ((v - min) / range) * (H - pad * 2);
        return '<circle cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="2.5" fill="' + trendColor + '" opacity="0.8"/>';
      }).join('')
    // Last value label
    + '<text x="' + points[points.length-1].split(',')[0] + '" y="' + (parseFloat(points[points.length-1].split(',')[1]) - 6) + '" text-anchor="middle" font-size="9" fill="' + trendColor + '" font-weight="600">' + lastVal + '</text>'
    + '</svg>'
    + '</div>';
}

// ══════════════════════════════════════════════════════

function buildDailyPhrasePrompt() {
  var w = (S.weights||[]).slice(-7);
  var wLast = w.length ? Number(w[w.length-1].value).toFixed(1) : null;
  var wDelta = w.length >= 2 ? (Number(w[w.length-1].value) - Number(w[0].value)).toFixed(2) : null;
  var phase = (S.settings.phases||[]).find(function(p){return p.current;});
  var phaseName = phase ? phase.name : (S.settings.manualPhase||'');
  var trainDone = (S.training.history||[]).filter(function(x){
    var d = new Date(); d.setDate(d.getDate()-7);
    return x.date >= d.toISOString().slice(0,10);
  }).length;
  var trainPlan = (S.settings.woDays||[]).length;
  var daysToComp = S.settings.compDate
    ? Math.max(0, Math.round((new Date(S.settings.compDate)-new Date())/86400000))
    : null;
  var bpLast = null;
  try {
    var bph = (S.pharma.health||[]);
    if (bph.length) bpLast = bph[bph.length-1];
  } catch(e){}

  return 'Ты тренер IFBB-атлета. Дай ОДНУ короткую фразу-оценку текущего состояния подготовки. '
    + 'Максимум 12 слов. Только факты, никакой мотивации. Только текст, без смайлов и кавычек.\n'
    + 'Данные: фаза=' + (phaseName||'н/д')
    + (daysToComp!==null ? ', до старта ' + daysToComp + ' дн' : '')
    + (wLast ? ', вес ' + wLast + ' кг' : '')
    + (wDelta !== null ? ', за неделю ' + (wDelta>=0?'+':'') + wDelta + ' кг' : '')
    + ', тренировок за неделю ' + trainDone + '/' + trainPlan
    + (bpLast ? ', АД ' + (bpLast.sys||bpLast.systolic) + '/' + (bpLast.dia||bpLast.diastolic) : '')
    + '.';
}

async function refreshDailyPhrase() {
  var cached = getAiCache('dailyPhrase');
  if (cached && cached.date === today()) return; // already fresh today
  try {
    var text = await callAiProvider(buildDailyPhrasePrompt(), '');
    var phrase = text.trim().replace(/^["«»]+|["«»]+$/g,'').slice(0,100);
    setAiCache('dailyPhrase', phrase);
    save();
    // Update in DOM if visible
    var el = document.getElementById('sdDailyPhrase');
    if (el) el.textContent = phrase;
  } catch(e) { /* silent fail */ }
}

function getDailyPhrase() {
  var cached = getAiCache('dailyPhrase');
  if (cached && cached.date === today()) return cached.text || cached;
  // Trigger async refresh (don't await)
  if (typeof geminiGenerateContent === 'function') {
    var cfg = S.settings && S.settings.gemini;
    if (cfg && cfg.apiKey) setTimeout(refreshDailyPhrase, 1500);
  }
  return cached ? (cached.text || cached) : '';
}

  var activeTab = document.querySelector('#nav .nb.active');
  var curTab = activeTab ? (activeTab.getAttribute('data-tab')||'') : '';
  if (curTab === 'today' && typeof R !== 'undefined') {
    R.today();
  } else {
    renderWellbeingSection();
  }
  // Check if all filled - show completion toast
  var wbKeys = ['energy','mood','libido','joints','sleep'];
  var filled = wbKeys.filter(function(k){ return S.wellbeing[d][k]; }).length;
  if (filled === wbKeys.length) {
    toast('✅ Самочувствие за сегодня записано!');
  } else {
    toast('✓ Сохранено · ' + filled + '/5');
  }
}

function wbGetToday() {
  return (S.wellbeing && S.wellbeing[today()]) || {};
}

function wbGetLast(days) {
  var result = [];
  var now = new Date();
  for (var i = 0; i < days; i++) {
    var d = new Date(now); d.setDate(now.getDate() - i);
    var key = d.getFullYear() + '-' + (d.getMonth()<9?'0':'') + (d.getMonth()+1) + '-' + (d.getDate()<10?'0':'') + d.getDate();
    result.push({ date: key, data: (S.wellbeing && S.wellbeing[key]) || null });
  }
  return result.reverse();
}

function wbScoreColor(v) {
  if (!v) return 'rgba(200,205,230,.20)';
  if (v <= 2) return '#ff4444';
  if (v === 3) return '#ffb020';
  return '#28d97a';
}

function wbRatingHTML(metric, todayData) {
  var current = todayData[metric] || 0;
  var html = '<div class="wbMetricRow">'
    + '<div class="wbMetricLabel">' + WB_METRICS.find(function(m){return m.key===metric;}).icon + ' ' + WB_METRICS.find(function(m){return m.key===metric;}).label + '</div>'
    + '<div class="wbDots">';
  for (var i = 1; i <= 5; i++) {
    var sel = i <= current;
    html += '<button class="wbDot' + (sel ? ' wbDotSel' : '') + '" '
      + 'style="background:' + (sel ? wbScoreColor(current) : 'rgba(255,255,255,.10)') + '" '
      + 'onclick="wbSave(\'' + metric + '\',' + i + ')">'
      + '</button>';
  }
  html += '</div>'
    + '<div class="wbMetricVal" style="color:' + wbScoreColor(current) + '">' + (current || '—') + '</div>'
    + '</div>';
  return html;
}

function wbTrendMini(days) {
  var entries = wbGetLast(days).filter(function(e){ return e.data; });
  if (entries.length < 2) return '';
  var html = '<div class="wbTrendGrid">';
  entries.forEach(function(e) {
    var total = 0, count = 0;
    WB_METRICS.forEach(function(m) { if (e.data[m.key]) { total += e.data[m.key]; count++; } });
    var avg = count ? total / count : 0;
    var d = new Date(e.date);
    var dayLabel = ['вс','пн','вт','ср','чт','пт','сб'][d.getDay()];
    html += '<div class="wbTrendDay">'
      + '<div class="wbTrendBar" style="height:' + Math.round(avg/5*36) + 'px;background:' + wbScoreColor(Math.round(avg)) + '"></div>'
      + '<div class="wbTrendLabel">' + dayLabel + '</div>'
      + '</div>';
  });
  html += '</div>';
  return html;
}

function renderWellbeingSection() {
  var root = document.getElementById('wellbeingRoot');
  if (!root) return;

  var todayData = wbGetToday();
  var filledToday = WB_METRICS.filter(function(m){ return todayData[m.key]; }).length;
  var allFilled = filledToday === WB_METRICS.length;

  var html = '<div class="card">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
    +   '<div class="ctitle" style="margin:0">Самочувствие сегодня</div>'
    +   (allFilled ? '<span class="badge green">✓ Заполнено</span>' : '<span class="badge">' + filledToday + '/5</span>')
    + '</div>'
    + WB_METRICS.map(function(m){ return wbRatingHTML(m.key, todayData); }).join('')
    + (todayData.note !== undefined ? '' :
        '<div class="field" style="margin-top:10px">'
        + '<label>Заметка (необязательно)</label>'
        + '<input id="wbNoteInput" type="text" placeholder="Как себя чувствуешь..." value="' + (todayData.note||'') + '">'
        + '<button class="btn btn-g" style="margin-top:6px" onclick="wbSaveNote()">Сохранить заметку</button>'
        + '</div>')
    + '</div>';

  // 7-day trend
  var trend = wbTrendMini(7);
  if (trend) {
    html += '<div class="card"><div class="ctitle">Динамика 7 дней</div>' + trend + '</div>';
  }

  // AI analysis button
  html += '<div class="card aiSplitCard" style="border-color:rgba(160,96,255,.22)">'
    + '<div class="ctitle">🧠 AI Анализ самочувствия</div>'
    + '<div class="sub" style="margin-bottom:10px">Выявляет паттерны и корреляции с протоколом, тренингом и анализами.</div>'
    + ''
    + '<button class="btn btn-p" style="background:rgba(160,96,255,.16);border-color:rgba(160,96,255,.30);color:#c4a0ff" onclick="runWellbeingAi()">🧠 Анализировать</button>'
    + '<div id="wellbeingAiOutput" class="aiCardOutput"></div>'
    + '</div>';

  root.innerHTML = html;
}

window.wbSaveNote = function() {
  var val = document.getElementById('wbNoteInput');
  if (!val) return;
  var d = today();
  if (!S.wellbeing) S.wellbeing = {};
  if (!S.wellbeing[d]) S.wellbeing[d] = {};
  S.wellbeing[d].note = val.value;
  save(); toast('Заметка сохранена');
};

// AI analysis of wellbeing patterns
async function runWellbeingAi() {
  var box = document.getElementById('wellbeingAiOutput');
  if (!box) return;
  box.textContent = 'Анализирую паттерны...';

  var entries = wbGetLast(14).filter(function(e){ return e.data; });
  if (entries.length < 3) { box.textContent = 'Нужно минимум 3 дня данных.'; return; }

  var rows = entries.map(function(e) {
    var parts = WB_METRICS.map(function(m){ return m.label + ':' + (e.data[m.key]||'—'); });
    return e.date + ' ' + parts.join(',') + (e.data.note?' ('+e.data.note+')':'');
  }).join('\n');

  var pharmaList = [];
  try { (S.pharma.pharma.items||[]).forEach(function(x){if(x.name)pharmaList.push(x.name+(x.dose?' '+x.dose:''));}); } catch(e){}

  var phase = (S.settings.phases||[]).find(function(p){return p.current;});

  var prompt = 'Ты спортивный эндокринолог. Проанализируй дневник самочувствия IFBB-атлета. Отвечай на русском.\n\n'
    + 'Фаза: ' + (phase?phase.name:S.settings.manualPhase||'н/д') + '\n'
    + 'Протокол: ' + (pharmaList.join(', ')||'не указан') + '\n\n'
    + 'ДАННЫЕ (энергия/настроение/либидо/суставы/сон по шкале 1-5):\n' + rows + '\n\n'
    + 'Задача: 1) Выяви паттерны и тренды. '
    + '2) Найди корреляции (напр. низкое либидо + низкое настроение → избыток E2). '
    + '3) Что настораживает. '
    + '4) Конкретные рекомендации. Максимум 200 слов.';

  try {
    var text = await callAiProvider(prompt, getAiUserContext('wellbeingAiCtx'));

}

function isPeakWeek() {
  var compDate = S.settings && S.settings.compDate;
  if (!compDate) return false;
  var days = Math.round((new Date(compDate) - new Date()) / 86400000);
  return days >= 0 && days <= 7;
}

function daysToComp() {
  var compDate = S.settings && S.settings.compDate;
  if (!compDate) return null;
  return Math.max(0, Math.round((new Date(compDate) - new Date()) / 86400000));
}

// Day plan template by day number (7=first day, 1=comp day)

  6: { carbs: 'истощение',  water: 'норма',    sodium: 'снизить', training: 'лёгкая',   notes: 'Продолжение истощения. Снижение натрия.' },
  5: { carbs: 'истощение',  water: 'снизить',  sodium: 'снизить', training: 'лёгкая',   notes: 'Начало снижения воды. Тренировка лёгкая.' },

function renderPeakWeek(container) {

      + '<div class="pwTimelineDayNum">' + (8-d) + '</div>'

      + '<div class="pwTimelineLabel">' + p.carbs + '</div>'

  html += '</div></div>';

  // AI personalized peak week plan
  html += '<div class="card aiSplitCard" style="border-color:rgba(255,176,32,.22)">'
    + '<div class="ctitle">🏆 AI Персональный Peak Week план</div>'
    + '<div class="sub" style="margin-bottom:10px">AI составит точный план по воде, натрию, углеводам и кардио под твои биомаркеры и историю веса.</div>'
    + ''
    + '<button class="btn btn-p" style="background:rgba(255,176,32,.18);border-color:rgba(255,176,32,.35);color:#ffd06e" onclick="runPeakWeekAi()">🏆 Сгенерировать план</button>'

function pwCell(label, val, wide) {

    + 'Биомаркеры: ' + (markers||'нет данных') + '\n'
    + 'Протокол: ' + (pharmaList.join(', ')||'нет') + '\n'
    + (wbLast ? 'Самочувствие 3 дня: ' + wbLast + '\n' : '')
    + '\nСоставь план на ' + dtc + ' дней с указанием для каждого дня:\n'

// HERO BLOCK — персонализированная шапка стартового экрана
// ══════════════════════════════════════════════════════════════

function buildHeroBlock() {
  var name    = (S.settings && S.settings.name) || '';
  var compName = (S.settings && S.settings.compName) || '';
  var compDate = (S.settings && S.settings.compDate) || '';
  var compCity = (S.settings && S.settings.compCity) || '';

  // Greeting by time of day
  var h = new Date().getHours();
  var greeting = h < 6  ? 'Доброй ночи' :
                 h < 12 ? 'Доброе утро' :
                 h < 17 ? 'Добрый день' :
                 h < 22 ? 'Добрый вечер' : 'Доброй ночи';
  var displayName = name ? ', ' + name : '';

  // Days to comp + progress ring
  var dtc = null, ringHTML = '';
  if (compDate) {
    dtc = Math.max(0, Math.round((new Date(compDate) - new Date()) / 86400000));
    // Phase total days for ring progress
    var totalDays = 365; // default
    var phases = S.settings && S.settings.phases;
    if (phases && phases.length) {
      var activePh = phases.find(function(p){ return p.current; });
      if (activePh && activePh.start && activePh.end) {
        totalDays = Math.max(1, Math.round((new Date(activePh.end) - new Date(activePh.start)) / 86400000));
      }
    }
    var progress = Math.max(0, Math.min(1, 1 - dtc / Math.max(totalDays, dtc)));
    var r = 46, cx = 60, cy = 60;
    var circ = 2 * Math.PI * r;
    var dash = circ * progress;
    var ringColor = dtc <= 30 ? '#ff4444' : dtc <= 90 ? '#ffb020' : '#4d8fff';
    ringHTML = '<svg width="120" height="120" viewBox="0 0 120 120" style="flex-shrink:0">'
      + '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="rgba(255,255,255,.13)" stroke-width="11"/>'
      + '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + ringColor + '" stroke-width="11"'
      + ' stroke-linecap="round"'
      + ' stroke-dasharray="' + dash.toFixed(1) + ' ' + circ.toFixed(1) + '"'
      + ' transform="rotate(-90 ' + cx + ' ' + cy + ')"/>'
      + '<text x="' + cx + '" y="' + (cy + 3) + '" text-anchor="middle" dominant-baseline="middle" font-size="32" font-weight="900" fill="#f2f4ff" letter-spacing="-2">' + dtc + '</text>'
      + '<text x="' + cx + '" y="' + (cy + 22) + '" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(200,205,230,.45)" letter-spacing="3">ДНЕЙ</text>'
      + '</svg>';
  }

  // Active phase badge
  var phaseBadgeHTML = '';
  var phaseName = '';
  var phaseProgress = '';
  try {
    var phases2 = S.settings.phases || [];
    var active = phases2.find(function(p){ return p.current; });
    if (active) {
      phaseName = active.name || active.key || '';
      // Week progress
      if (active.start && active.end) {
        var totalW = Math.max(1, Math.round((new Date(active.end) - new Date(active.start)) / 604800000));
        var doneW  = Math.max(0, Math.round((new Date() - new Date(active.start)) / 604800000));
        phaseProgress = Math.min(doneW, totalW) + '/' + totalW + ' нед';
      }
      var phColor = /реком|recomp/i.test(phaseName) ? '#22d4f5' :
                    /масс|mass/i.test(phaseName)     ? '#28d97a' :
                    /суш|cut/i.test(phaseName)       ? '#ff6b6b' :
                    /пик|peak/i.test(phaseName)      ? '#ffb020' : '#4d8fff';
      phaseBadgeHTML = '<div class="heroPhaseBadge" style="background:' + phColor + '22;border-color:' + phColor + '44;color:' + phColor + '">'
        + '<span class="heroPhaseDot" style="background:' + phColor + '"></span>'
        + phaseName.toUpperCase() + (phaseProgress ? ' · ' + phaseProgress : '')
        + '</div>';
    } else if (S.settings.manualPhase) {
      phaseName = {recomp:'Рекомп',mass:'Массонабор',cut:'Сушка',peak:'Пик-неделя'}[S.settings.manualPhase] || S.settings.manualPhase;
      var phColor2 = /реком|recomp/i.test(phaseName) ? '#22d4f5' :
                     /масс|mass/i.test(phaseName)    ? '#28d97a' :
                     /суш|cut|реком/i.test(S.settings.manualPhase) ? '#ff6b6b' : '#4d8fff';
      phaseBadgeHTML = '<div class="heroPhaseBadge" style="background:' + phColor2 + '22;border-color:' + phColor2 + '44;color:' + phColor2 + '">'
        + '<span class="heroPhaseDot" style="background:' + phColor2 + '"></span>'
        + phaseName.toUpperCase()
        + '</div>';
    }
  } catch(e){}

  // Last weight + waist measurement
  var statsHTML = '';
  try {
    var wArr = S.weights || [];
    var wLast = wArr.length ? wArr[wArr.length-1] : null;
    var wPrev = wArr.length > 7 ? wArr[wArr.length-8] : (wArr.length > 1 ? wArr[0] : null);
    var wDelta = (wLast && wPrev) ? (Number(wLast.value) - Number(wPrev.value)).toFixed(2) : null;

    var waist = null;
    var mArr = (S.progress && S.progress.measurements) || [];
    if (mArr.length) {
      var lastM = mArr[mArr.length-1];
      waist = lastM.waist || lastM.талия || lastM['талия'] || null;
    }

    if (wLast) {
      statsHTML += '<div class="heroStatCell">'
        + '<span class="heroStatVal">' + Number(wLast.value).toFixed(1) + '</span>'
        + '<span class="heroStatUnit"> кг</span>'
        + (wDelta !== null ? '<span class="heroStatDelta" style="color:' + (wDelta > 0 ? '#ffb020' : wDelta < 0 ? '#28d97a' : '#888') + '">'
          + (wDelta >= 0 ? ' +' : ' ') + wDelta + '/нед</span>' : '')
        + '<div class="heroStatLabel">вес</div>'
        + '</div>';
    }
    if (waist) {
      statsHTML += '<div class="heroStatCell">'
        + '<span class="heroStatVal">' + waist + '</span>'
        + '<span class="heroStatUnit"> см</span>'
        + '<div class="heroStatLabel">талия</div>'
        + '</div>';
    }
  } catch(e){}

  // Waist (last measurement)
  try {
    var mArr2 = (S.progress && S.progress.measurements) || [];
    if (!mArr2.length) mArr2 = S.measurements || [];
    var lastM2 = mArr2.length ? mArr2[mArr2.length-1] : null;
    var waist2 = lastM2 && (lastM2.waist || lastM2.талия || lastM2['талия']) || null;
    if (waist2) {
      statsHTML += '<div class="heroStatCell">'
        + '<span class="heroStatVal">' + waist2 + '</span>'
        + '<span class="heroStatUnit"> см</span>'
