/* ═══════════════════════════════════════════════════════════════
   PHARMACOKINETICS CALCULATOR v1.0
   Полужизни основных эфиров + мини-график концентрации
═══════════════════════════════════════════════════════════════ */

// Half-life in hours for common esters
const PK_HALFLIFE = {
  'Пропионат':       20,
  'Ацетат':          20,
  'Энантат':        120,  // 5 days
  'Ципионат':       132,  // 5.5 days
  'Деканоат':       360,  // 15 days
  'Ундеканоат':     576,  // 24 days
  'Изокапроат':      96,
  'Фенилпропионат':  36,
  'Гексагидробензилкарбонат': 168,
  'Суспензия':        2,
  'Кристаллы':        4,
  // GH
  'GH (SC)':          4,
  'IGF-1':            8,
  // Others
  'Нандролон деканоат': 360,
  'Нандролон фенилпропионат': 36,
  'Болденон ундеклинат': 336,
  'Мастерон пропионат': 20,
  'Тренболон ацетат': 20,
  'Тренболон энантат': 120,
  'Станозолол': 9,
};

function detectHalfLife(drugName) {
  if (!drugName) return 24;
  const lower = drugName.toLowerCase();
  for (const [key, hl] of Object.entries(PK_HALFLIFE)) {
    if (lower.includes(key.toLowerCase())) return hl;
  }
  // Try to detect ester from name
  if (lower.includes('пропионат') || lower.includes('propionate') || lower.includes('ацетат')) return 20;
  if (lower.includes('энантат') || lower.includes('enanthate')) return 120;
  if (lower.includes('ципионат') || lower.includes('cypionate')) return 132;
  if (lower.includes('деканоат') || lower.includes('decanoate')) return 360;
  return 72; // default unknown
}

function buildPkCurve(injections, hoursRange) {
  // injections: [{dateTime: ISO, dose: mg, drugName: str}]
  // Returns {times: [hours from now], concentrations: [0..1], points: [{label,x,y}]}
  const now = Date.now();
  const points = [];
  const step = 2; // 2-hour resolution
  const steps = Math.ceil(hoursRange / step);

  for (let i = 0; i < steps; i++) {
    const t = i * step;
    const tMs = now + (t - hoursRange / 2) * 3600000;
    let conc = 0;
    injections.forEach(function(inj) {
      const hl = detectHalfLife(inj.drugName || inj.name || '');
      const injTime = new Date(inj.dateTime || inj.date || inj.ts || Date.now()).getTime();
      const hoursAgo = (now - injTime) / 3600000;
      if (hoursAgo < 0) return; // future injection
      const k = Math.LN2 / hl;
      const peak = (inj.dose || 100) / 100; // normalized
      conc += peak * Math.exp(-k * (hoursAgo + (t - hoursRange / 2)));
    });
    points.push({ t, conc: Math.max(0, conc) });
  }
  return points;
}

function renderPkChart(canvasId, injections) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.offsetWidth || 300;
  var H = 180;
  canvas.width = W;
  canvas.height = H;

  ctx.clearRect(0, 0, W, H);

  const hoursRange = 14 * 24; // 14 days window
  const now = Date.now();
  const points = [];
  const stepH = 6;
  const steps = Math.ceil(hoursRange / stepH);

  // Colors per drug
  const DRUG_COLORS = ['#4d8fff','#ff6b6b','#28d97a','#ffb020','#a060ff','#22d4f5'];

  // Build per-drug curves
  const curves = injections.map(function(inj, drugIdx) {
    const color = DRUG_COLORS[drugIdx % DRUG_COLORS.length];
    const hl = detectHalfLife(inj.name || '');
    const pts = [];
    for (let i = 0; i <= steps; i++) {
      const t = -7 * 24 + i * stepH; // -7 days to +7 days from now
      const tMs = now + t * 3600000;
      let conc = 0;
      const logs = inj.logs || [];
      logs.forEach(function(log) {
        const injMs = new Date(log.dateTime || log.date || log.ts).getTime();
        const hoursFromNow = (tMs - injMs) / 3600000;
        if (hoursFromNow < 0) return;
        const k = Math.LN2 / hl;
        const dose = parseFloat(log.dose) || 100;
        conc += dose * Math.exp(-k * hoursFromNow);
      });
      pts.push({ t, conc });
    }
    return { name: inj.name, color, pts, hl };
  });

  // Find max conc for scale
  let maxConc = 1;
  curves.forEach(c => c.pts.forEach(p => { if (p.conc > maxConc) maxConc = p.conc; }));

  const pad = { l: 8, r: 8, t: 12, b: 24 };
  const gW = W - pad.l - pad.r;
  const gH = H - pad.t - pad.b;

  // Background grid
  ctx.strokeStyle = 'rgba(255,255,255,.07)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (gH * i) / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + gW, y); ctx.stroke();
  }

  // "Now" vertical line
  const nowX = pad.l + gW / 2;
  ctx.strokeStyle = 'rgba(255,255,255,.22)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(nowX, pad.t); ctx.lineTo(nowX, pad.t + gH); ctx.stroke();
  ctx.setLineDash([]);

  // Draw curves
  curves.forEach(function(curve) {
    if (!curve.pts.length) return;
    ctx.strokeStyle = curve.color;
    ctx.lineWidth = 2;
    ctx.shadowColor = curve.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    curve.pts.forEach(function(p, i) {
      const x = pad.l + ((p.t + 7 * 24) / (14 * 24)) * gW;
      const y = pad.t + gH - (p.conc / maxConc) * gH * 0.9;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.shadowBlur = 0;
  });

  // Labels
  ctx.fillStyle = 'rgba(200,205,230,.40)';
  ctx.font = '9px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('−7д', pad.l, pad.t + gH + 16);
  ctx.fillText('Сейчас', nowX, pad.t + gH + 16);
  ctx.fillText('+7д', pad.l + gW, pad.t + gH + 16);

  // "Now" label
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  ctx.fillText('▼', nowX, pad.t + 9);
}

// Build PK card HTML and render
function buildPkCard() {
  const cfg = S.settings.gemini || {};
  const injLog = (S.pharma && S.pharma.injLog) || [];
  const pharmaItems = (S.pharma && S.pharma.pharma && S.pharma.pharma.items) || [];

  // Group injection logs by drug name
  const byDrug = {};
  injLog.forEach(function(log) {
    const name = log.drug || log.name || 'Неизвестно';
    if (!byDrug[name]) byDrug[name] = { name, logs: [] };
    byDrug[name].logs.push(log);
  });

  const drugCurves = Object.values(byDrug);

  // If no injection logs, use pharma items as placeholder
  if (!drugCurves.length && pharmaItems.length) {
    pharmaItems.filter(i => i.form === 'IM').forEach(function(item) {
      byDrug[item.name] = { name: item.name, logs: [{ dateTime: new Date().toISOString(), dose: parseFloat(item.dose) || 100 }] };
    });

/* ═══════════════════════════════════════════════════════════════
   SPLIT-SCREEN PHOTO COMPARISON v2.0
   Split-view + stats table for selected dates
═══════════════════════════════════════════════════════════════ */

function buildSplitCompareHTML() {
  var sc = S._splitCompare || { dateA: '', dateB: today(), pos: 'front' };

  // Available photo dates
  var photoDates = Array.from(new Set((S.photos || []).map(p => p.date))).sort().reverse();
  var dateOpts = photoDates.map(d => `<option value="${d}" ${d === sc.dateA ? 'selected' : ''}>${fmt(d)}</option>`).join('');
  var dateOptsB = photoDates.map(d => `<option value="${d}" ${d === sc.dateB ? 'selected' : ''}>${fmt(d)}</option>`).join('');

  // Find photos for selected dates
  function findPhoto(date, pos) {
    if (!date) return null;
    return (S.photos || []).find(p => p.date === date && p.pos === pos);
  }

  const posMap = { front: 'Фронт', side: 'Бок', back: 'Спина' };
  const posOpts = ['front','side','back'].map(p => `<button onclick="setSplitPos('${p}')" style="height:28px;border-radius:8px;border:1px solid ${sc.pos===p?'rgba(236,72,153,.55)':'rgba(255,255,255,.10)'};background:${sc.pos===p?'rgba(236,72,153,.18)':'transparent'};color:${sc.pos===p?'#ec4899':'rgba(200,205,230,.55)'};font-size:11px;font-weight:700;padding:0 10px;cursor:pointer;">${posMap[p]}</button>`).join('');

  const photoA = findPhoto(sc.dateA, sc.pos || 'front');
  const photoB = findPhoto(sc.dateB, sc.pos || 'front');

  // Stats comparison
  function statsForDate(date) {
    if (!date) return {};
    var w = (S.weights || []).find(x => x.date === date);
    var m = (S.measurements || []).find(x => x.date === date);
    var nutrition = typeof sumMeals === 'function' ? sumMeals(date) : {};
    var form = (S.dailyForm || []).find(x => x.date === date);
    return {
      weight: w ? w.value : null,
      waist: m ? m.waist : null,
      kcal: nutrition.kcal ? Math.round(nutrition.kcal) : null,
      recovery: form ? (form.recovery || form.energy || null) : null,
    };
  }

  const statsA = statsForDate(sc.dateA);
  const statsB = statsForDate(sc.dateB);

  function statRow(label, valA, valB, unit, lowerIsBetter) {
    if (valA === null && valB === null) return '';
    const a = parseFloat(valA);
    const b = parseFloat(valB);
    let deltaHTML = '—';
    if (!isNaN(a) && !isNaN(b) && valA !== null && valB !== null) {
      const d = b - a;
      const dir = d > 0 ? 'pos' : 'neg';
      const realDir = lowerIsBetter ? (d < 0 ? 'neg' : 'pos') : dir;
      deltaHTML = `<span class="splitStatsDelta ${realDir}">${d > 0 ? '+' : ''}${d.toFixed(1)}${unit}</span>`;
    }
    return `<div class="splitCompareStatsRow">
      <div class="splitStatsLabel">${label}</div>
      <div class="splitStatsVal">${valA !== null ? valA + unit : '—'}</div>
      <div class="splitStatsVal">${valB !== null ? valB + unit : '—'}</div>
      ${deltaHTML}
    </div>`;
  }

  const statsRows = [
    statRow('Вес', statsA.weight, statsB.weight, 'кг', true),
    statRow('Талия', statsA.waist, statsB.waist, 'см', true),
    statRow('Ккал', statsA.kcal, statsB.kcal, '', false),
    statRow('Восстановление', statsA.recovery, statsB.recovery, '/10', false),
  ].filter(Boolean).join('');

  return `<div class="card splitCompareCard">
    <div class="ctitle">📸 Сравнение формы: Разбивка по датам</div>

    <div class="splitCompareGrid" style="margin-bottom:10px">
      <div class="splitComparePicker">
        <div class="splitCompareDateLabel">Дата A</div>
        <select class="splitCompareDateInput" onchange="setSplitDateA(this.value)">${dateOpts || '<option value="">Нет фото</option>'}</select>
      </div>
      <div class="splitComparePicker">
        <div class="splitCompareDateLabel">Дата B</div>
        <select class="splitCompareDateInput" onchange="setSplitDateB(this.value)">${dateOptsB || '<option value="">Нет фото</option>'}</select>
      </div>
    </div>

    <div style="display:flex;gap:6px;margin-bottom:10px">${posOpts}</div>

    <div class="splitCompareGrid">
      <div class="splitComparePhoto">
        ${photoA ? `<img src="${photoA.data}"><div class="splitCompareDateBadge">${sc.dateA ? fmt(sc.dateA) : 'A'}</div>` : `<span>Нет фото</span>`}
      </div>
      <div class="splitComparePhoto">
        ${photoB ? `<img src="${photoB.data}"><div class="splitCompareDateBadge">${sc.dateB ? fmt(sc.dateB) : 'B'} (сейчас)</div>` : `<span>Нет фото</span>`}
      </div>
    </div>

    ${statsRows ? `
    <div class="splitCompareStatsTable">
      <div class="splitCompareStatsRow" style="font-size:10px;font-weight:700;color:rgba(200,205,230,.40);text-transform:uppercase;letter-spacing:.06em;">
        <div>Показатель</div><div style="text-align:center">A</div><div style="text-align:center">B</div><div style="text-align:right">Δ</div>
      </div>
      ${statsRows}
    </div>` : '<div style="font-size:11px;color:rgba(200,205,230,.35);margin-top:10px;text-align:center">Выбери даты с данными для сравнения</div>'}
  </div>`;
}

window.setSplitDateA = function(d) { S._splitCompare = S._splitCompare || {}; S._splitCompare.dateA = d; save(); refreshSplitCompare(); };
window.setSplitDateB = function(d) { S._splitCompare = S._splitCompare || {}; S._splitCompare.dateB = d; save(); refreshSplitCompare(); };
window.setSplitPos   = function(p) { S._splitCompare = S._splitCompare || {}; S._splitCompare.pos = p; save(); refreshSplitCompare(); };

function refreshSplitCompare() {
  var el = document.getElementById('splitCompareBlock');
  if (el) el.innerHTML = buildSplitCompareHTML();
}

// Hook split compare into progress panel
(function hookSplitCompareToProgress() {
  function tryHook() {
    if (typeof R === 'undefined' || !R.progress) { setTimeout(tryHook, 300); return; }
    var origProgress = R.progress.bind(R);
    R.progress = function() {
      origProgress();
      setTimeout(function() {
        var root = document.getElementById('progressRoot');
        if (!root) return;
        var el = document.getElementById('splitCompareBlock');
        if (!el) {
          el = document.createElement('div');
          el.id = 'splitCompareBlock';
          root.appendChild(el);
        }
        el.innerHTML = buildSplitCompareHTML();
      }, 180);
    };
  }
  tryHook();
})();

</script>

    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);

    keysToDelete.forEach(k => localStorage.removeItem(k));

// Expose post-workout meal time helper to AI context builder
window.getPostWorkoutMealTime = function() {
  const ds = S.settings.daySchedule || {};
  const woTime = S.settings.defaultWoTime || S.settings.woTimes?.[new Date().getDay()] || '10:00';
  const offsetMins = ds.trainDay?.postWorkoutOffsetMins ?? 30;
  const durationMins = ds.trainDay?.durationMins ?? 90;
  // Post-workout = workout start + duration + offset
  const parts = woTime.split(':');
  const woMins = parseInt(parts[0]||0)*60 + parseInt(parts[1]||0);
  const totalMins = ((woMins + durationMins + offsetMins) % 1440 + 1440) % 1440;
  const h = Math.floor(totalMins/60), m = totalMins%60;
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
};

<!-- ═══════════════════════════════════════════════════════════════
     AI COACH ENGINE v1.0
     Персональный AI-тренер: планы тренировок, питания, фармы,
     еженедельный разбор, корректировка, чат-интерфейс.
═══════════════════════════════════════════════════════════════ -->
<script id="aiCoachScript">
(function() {
'use strict';

/* ──────────────────────────────────────────────
   STATE MIGRATION
────────────────────────────────────────────── */
function initCoachState() {
  if (!S.aiCoach) S.aiCoach = {};
  const c = S.aiCoach;
  if (!c.plan)          c.plan = null;
  if (!c.weeklyReviews) c.weeklyReviews = [];
  if (!c.chatHistory)   c.chatHistory = [];
  if (!c.dailyBriefing) c.dailyBriefing = null;
  if (!c.lastPlanDate)  c.lastPlanDate = '';
  if (!c.goals) c.goals = { focus: 'recomp', compWeeks: null, priorityMuscles: '', weakPoints: '', injuries: '', notes: '' };
  return c;
}

/* ──────────────────────────────────────────────
   CONTEXT BUILDER — feeds AI with all data
────────────────────────────────────────────── */
function buildCoachContext() {
  const t = typeof today === 'function' ? today() : new Date().toISOString().slice(0,10);
  const ph = typeof phase === 'function' ? phase() : (S.settings?.manualPhase || 'cut');
  const dl = typeof daysLeft === 'function' ? daysLeft() : null;
  const lastW = typeof last === 'function' ? last(S.weights, 'value') : null;
  const lastM = typeof last === 'function' ? last(S.measurements, 'waist') : null;

  // 14-day snapshot
  const days14 = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    const w = (S.weights || []).find(x => x.date === ds);
    const m = (S.measurements || []).find(x => x.date === ds);
    const meal = typeof sumMeals === 'function' ? sumMeals(ds) : {};
    const sess = (S.training?.sessions || []).filter(x => x.date === ds);
    const wl = typeof waterTotal === 'function' ? waterTotal(ds) : null;
    const form = (S.dailyForm || []).find(x => x.date === ds);
    days14.push({
      date: ds,
      weight: w ? w.value : null,
      waist: m ? m.waist : null,
      kcal: meal.kcal ? Math.round(meal.kcal) : null,
      prot: meal.p ? Math.round(meal.p) : null,
      fat: meal.f ? Math.round(meal.f) : null,
      carbs: meal.c ? Math.round(meal.c) : null,
      water: wl,
      trained: sess.length > 0,
      trainName: sess.map(s => s.name).join(', ') || null,
      recovery: form ? (form.recovery || null) : null,
      energy: form ? (form.energy || null) : null,
      sleep: form ? (form.sleep || null) : null
    });
  }

  // Recent sessions (last 5)
  const recentSessions = (S.training?.sessions || [])
    .slice(-5).map(s => ({
      date: s.date, name: s.name,
      exercises: (s.exercises || []).map(e => ({
        name: e.name, group: e.group,
        sets: (e.sets || []).length,
        topWeight: Math.max(...(e.sets || []).map(st => parseFloat(st.weight) || 0), 0)
      }))
    }));

  // Pharma protocol — USE ACTIVE PROTOCOL, not base items
  const activeProto = (S.pharma?.pharma?.protocols || []).find(p => p.active);
  const activeSuppsProto = (S.pharma?.supps?.protocols || []).find(p => p.active);
  const activeMedsProto = (S.pharma?.meds?.protocols || []).find(p => p.active);

  // Build drug list from ACTIVE protocol items
  const pharmaItemsFromProto = activeProto
    ? (activeProto.items || []).map(i => {
        const baseItem = (S.pharma?.pharma?.items || []).find(b => b.id === i.itemId);
        const name = baseItem?.name || i.name || 'Неизвестно';
        const schedules = (i.intakes || []).map(s => `${['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][s.day]||'?'} ${s.time} ${s.amount}${s.unit}`).join(', ');
        return `${name}: ${schedules || (i.dose||'доза не указана')} ${i.note||''}`.trim();
      })
    : [];

  const suppItemsFromProto = activeSuppsProto
    ? (activeSuppsProto.items || []).map(i => {
        const base = (S.pharma?.supps?.items || []).find(b => b.id === i.itemId);

      })

  // Latest health metrics
  const latestHealth = (S.pharma?.health || []).sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0,3);
  const latestBW = (S.pharma?.bloodwork || []).sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0,1)[0];

  // Goals
  const goals = S.settings?.goals || {};
  const coachGoals = S.aiCoach?.goals || {};
  const sp = S.settings || {};

  const ctx = {
    today: t,
    athlete: {
      name: sp.name || 'Атлет',
      compName: sp.compName || null,
      compDate: sp.compDate || null,
      daysToComp: dl,
      currentWeight: lastW?.value || null,
      currentWaist: lastM?.waist || null,
      bodyweight: lastW?.value || null
    },
    phase: ph,
    coachGoals: {
      focus: coachGoals.focus || ph,
      priorityMuscles: coachGoals.priorityMuscles || '',
      weakPoints: coachGoals.weakPoints || '',
      injuries: coachGoals.injuries || '',
      notes: coachGoals.notes || ''
    },
    nutritionTargets: {
      trainDay: goals.train || {},
      restDay: goals.rest || {}
    },
    pharma: {
      activeProtocolName: activeProto?.name || null,
      activeProtocolDates: activeProto ? `${activeProto.start||'?'} → ${activeProto.end||'?'}` : null,
      aas: pharmaItemsFromProto,
      supps: suppItemsFromProto,
      meds: medsItemsFromProto,
      activeProtocols: [activeProto, activeSuppsProto, activeMedsProto].filter(Boolean).length
    },
    healthMetrics: latestHealth.map(h => ({ date: h.date, sys: h.sys, dia: h.dia, pulse: h.pulse })),
    bloodwork: latestBW ? { date: latestBW.date, markers: latestBW.markers || [] } : null,
    last14days: days14,
    recentSessions,
    trainingTemplates: (S.training?.templates || []).slice(0, 8).map(t => ({ name: t.name, exercises: (t.exercises || []).length })),
    inbody: (S.inbody || []).slice(-2).map(i => ({ date: i.date, weight: i.weight, bf: i.bf, smm: i.smm }))
  };

  return JSON.stringify(ctx, null, 2);
}

function applyTrainingPlan(plan) {
  if (!plan?.training?.days) { toast('Нет данных тренинга в плане'); return; }
  const days = plan.training.days.filter(d => d.type === 'training');
  const woDays = days.map(d => d.dayOfWeek === 7 ? 0 : d.dayOfWeek); // convert Sun
  S.settings.woDays = woDays;

  // Create templates for each training day
  days.forEach(day => {
    if (!day.exercises?.length) return;
    const tpl = {
      id: typeof id === 'function' ? id() : Date.now().toString(36),
      name: day.name || `День ${day.dayOfWeek}`,
      aiGenerated: true,
      dayOfWeek: day.dayOfWeek,
      exercises: day.exercises.map(e => ({
        id: typeof id === 'function' ? id() : Date.now().toString(36),
        name: e.name, group: e.group || '',
        sets: e.sets || 4, reps: e.reps || '8-12',
        weight: e.weight || 0, note: e.note || '',
        rest: e.rest || 90
      }))
    };
    // Remove old AI-generated templates for same day
    S.training.templates = (S.training.templates || []).filter(t => !(t.aiGenerated && t.dayOfWeek === day.dayOfWeek));
    S.training.templates.push(tpl);
  });

  save();
  haptic([20, 30, 20]);
  toast(`✅ Тренировочный план применён: ${days.length} тренировочных дней`);
  if (typeof R !== 'undefined' && R.training) setTimeout(() => R.training(), 100);
}

  if (!plan?.nutrition) { toast('Нет данных питания в плане'); return; }

  if (!S.settings.goals) S.settings.goals = {};

/* ──────────────────────────────────────────────
   HELPER: Parse JSON from AI response
────────────────────────────────────────────── */
function parseJsonFromAi(raw) {
  // Try to find JSON block
  const match = raw.match(/```json\s*([\s\S]*?)```/i) || raw.match(/```\s*([\s\S]*?)```/);
  if (match) {
    try { return JSON.parse(match[1].trim()); } catch(e) {}
  }
  // Try raw
  const start = raw.indexOf('{'), end = raw.lastIndexOf('}');
  if (start !== -1 && end !== -1) {
    try { return JSON.parse(raw.slice(start, end + 1)); } catch(e) {}
  }
  throw new Error('Не удалось разобрать JSON из ответа AI');
}

────────────────────────────────────────────── */
window.coachHandleSend = async function() {
  const field = document.getElementById('coachChatInputField');
  const btn = document.getElementById('coachChatSendBtn');
  if (!field) return;
  const text = field.value.trim();
  if (!text) return;
  field.value = '';
  field.style.height = 'auto';
  if (btn) btn.disabled = true;
  haptic([15]);
  await coachSendMessage(text);
  if (btn) btn.disabled = false;
};

window.coachQuickAsk = async function(text) {
  haptic([15]);
  const field = document.getElementById('coachChatInputField');
  if (field) { field.value = ''; field.style.height = 'auto'; }
  const btn = document.getElementById('coachChatSendBtn');
  if (btn) btn.disabled = true;
  await coachSendMessage(text);
  if (btn) btn.disabled = false;
};

  initCoachState();
  S.aiCoach.chatHistory = [];

};

${ctx}

})();

function addCompoundToBase(cpd) {
  if (!S.pharma) return;
  const type = cpd.cat === 'AAS' || cpd.cat === 'GH/пептиды' || cpd.cat === 'AI' || cpd.cat === 'анти-пролактин' || cpd.cat === 'SERM' ? 'pharma' : cpd.cat === 'мед' ? 'meds' : 'supps';
  const existing = (S.pharma[type]?.items || []).find(x => x.name === cpd.name);
  if (existing) { toast(`${cpd.name} уже в базе`); return; }
  const item = {
    id: typeof id === 'function' ? id() : Date.now().toString(36),
    name: cpd.name,
    cat: cpd.cat,
    form: cpd.class === 'Peptide' || ['AAS','19-nor','DHT-derived','Estrogen-derived'].includes(cpd.class) ? 'IM' : 'PO',
    dose: '',
    note: cpd.notes?.slice(0, 80) || ''
  };
  S.pharma[type].items = S.pharma[type].items || [];
  S.pharma[type].items.push(item);
  save(); haptic([20, 15]);
  toast(`✅ ${cpd.name} добавлен в базу`);
}

function addSuppToBase(supp) {
  if (!S.pharma?.supps?.items) return;
  const existing = (S.pharma.supps.items || []).find(x => x.name === supp.name);
  if (existing) { toast(`${supp.name} уже в базе`); return; }
  S.pharma.supps.items.push({
    id: typeof id === 'function' ? id() : Date.now().toString(36),
    name: supp.name, cat: 'спортпит', form: 'PO', dose: supp.dose, note: supp.timing || ''
  });
  save(); haptic([15]);
  toast(`✅ ${supp.name} добавлен в БАДы`);
}

function renderCompoundSearchBlock(query) {
  const q = (query || '').toLowerCase();
  const filtered = q ? COMPOUND_DB.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.cat.toLowerCase().includes(q) ||
    (c.class||'').toLowerCase().includes(q)
  ) : COMPOUND_DB;

  return `<div class="card" style="border-color:rgba(255,92,92,.18)">
    <div class="ctitle">📖 Энциклопедия соединений</div>

  </div>`;

function renderCompoundChip(c) {
  const id_safe = btoa(encodeURIComponent(c.name)).replace(/[^a-z0-9]/gi,'').slice(0,12);
  return `<div class="cpdChip" onclick="showCompoundCard('${escapeHtml(c.name).replace(/'/g,"\\'")}')">
    <span style="font-size:18px">${c.icon||'💊'}</span>

    c.cat.toLowerCase().includes(q.toLowerCase()) ||
    (c.class||'').toLowerCase().includes(q.toLowerCase())

window.handleInbodyImport = async function(input) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('inbodyPreview');

  const ext = file.name.split('.').pop().toLowerCase();
  let content = '';

  try {
    if (ext === 'pdf') {
      // Send to AI for parsing
      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64 = e.target.result.split(',')[1];
        await parseInbodyWithAI(base64, file.name, 'pdf');
      };
      reader.readAsDataURL(file);
      toast('Отправляю PDF в AI для распознавания...');
      return;
    } else {
      content = await file.text();
    }
    parseInbodyCSV(content, file.name);
  } catch(e) {
    toast('Ошибка чтения файла: ' + e.message, 3000, 'error');
  }
};

async function parseInbodyWithAI(base64data, filename, type) {
  const prompt = `Ты — эксперт по анализу биоимпедансных данных InBody.
Из данного файла InBody-отчёта извлеки ТОЛЬКО следующие показатели и верни строго в JSON:

\`\`\`json
{
  "date": "YYYY-MM-DD",
  "weight": 92.5,
  "height": 178,
  "bf_pct": 12.3,
  "bf_kg": 11.4,
  "smm_kg": 44.2,
  "ffm_kg": 81.1,
  "tbw_kg": 56.3,
  "icw_kg": 37.1,
  "ecw_kg": 19.2,
  "ecw_tbw_ratio": 0.341,
  "visceral_fat_level": 4,
  "bmi": 22.1,
  "inbody_score": 78,
  "basal_metabolic_rate": 1980,
  "segments": {

    "left_arm_muscle": 3.1,

    "right_leg_muscle": 9.8,
    "left_leg_muscle": 9.7
  },
  "raw_text_summary": "краткое резюме в 1-2 предложения"
}
\`\`\`

Если поле не найдено — ставь null.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64data } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });
    const data = await resp.json();
    const text = (data.content || []).map(c => c.text || '').join('');
    const m = text.match(/```json\s*([\s\S]*?)```/i) || text.match(/\{[\s\S]*\}/);
    const parsed = JSON.parse(m ? (m[1]||m[0]).trim() : text);
    saveInbodyRecord(parsed, filename);
  } catch(e) {

  }
}

function parseInbodyCSV(content, filename) {
  // Generic CSV parser for common InBody export formats
  const lines = content.split('\n');
  const record = { date: today(), _source: 'inbody', _filename: filename };

  const fieldMap = {
    'weight': ['weight','вес','body weight','масса тела'],
    'bf_pct': ['pbn','body fat','% жира','fat(%)','жировая масса %','bf%'],
    'smm_kg': ['smm','skeletal muscle mass','масса скелетных мышц'],
    'ffm_kg': ['ffm','lean body mass','безжировая масса'],
    'tbw_kg': ['tbw','total body water','общая жидкость'],
    'bmi': ['bmi','имт'],
    'inbody_score': ['inbody score','балл inbody','score'],
    'visceral_fat_level': ['visceral fat','висцеральный жир','vfl']
  };

  lines.forEach(function(line) {
    const parts = line.split(',');
    if (parts.length < 2) return;
    const key = (parts[0]||'').toLowerCase().trim();
    const val = parseFloat((parts[1]||'').trim());
    if (isNaN(val)) return;
    for (const [field, aliases] of Object.entries(fieldMap)) {
      if (aliases.some(a => key.includes(a))) { record[field] = val; break; }
    }
    // Try to find date
    if (key.includes('date') || key.includes('дата')) {
      record.date = (parts[1]||'').trim().slice(0,10) || today();
    }
  });

  saveInbodyRecord(record, filename);
}

function saveInbodyRecord(record, filename) {
  if (!S.inbody) S.inbody = [];
  record._importedAt = new Date().toISOString();
  record._filename = filename;
  record._source = 'inbody';
  // Avoid duplicates by date
  S.inbody = S.inbody.filter(r => r.date !== record.date);
  S.inbody.push(record);
  S.inbody.sort((a,b) => (a.date||'').localeCompare(b.date||''));
  save(); haptic([20,30,20]);
  toast(`✅ InBody от ${record.date} импортирован`);
  progressSwitchTab('imports');
}

function parseFatSecretCSV(content) {
  const lines = content.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) { toast('Файл пустой', 2000, 'error'); return; }

  const header = lines[0].toLowerCase().split(',');
  // FatSecret column indices
  const dateIdx    = header.findIndex(h => h.includes('date') || h.includes('дата'));
  const kcalIdx    = header.findIndex(h => h.includes('calories') || h.includes('ккал') || h.includes('калори'));
  const protIdx    = header.findIndex(h => h.includes('protein') || h.includes('белок'));
  const fatIdx     = header.findIndex(h => h.includes('fat') || h.includes('жиры') || h.includes('жир'));
  const carbIdx    = header.findIndex(h => h.includes('carb') || h.includes('углев'));
  const fiberIdx   = header.findIndex(h => h.includes('fiber') || h.includes('клет'));
  const sodiumIdx  = header.findIndex(h => h.includes('sodium') || h.includes('натрий'));

  let imported = 0;
  const records = [];

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    const date = dateIdx >= 0 ? (cols[dateIdx]||'').trim().slice(0,10) : null;
    if (!date || !date.match(/\d{4}-\d{2}-\d{2}/)) continue;

    const record = {
      date,
      _source: 'fatsecret',
      kcal:   parseFloat(cols[kcalIdx])||0,
      p:      parseFloat(cols[protIdx])||0,
      f:      parseFloat(cols[fatIdx])||0,
      c:      parseFloat(cols[carbIdx])||0,
      fiber:  fiberIdx >= 0 ? parseFloat(cols[fiberIdx])||0 : null,
      sodium: sodiumIdx >= 0 ? parseFloat(cols[sodiumIdx])||0 : null,
      name:   'FatSecret импорт',
      id:     'fs_' + date
    };
    records.push(record);
    imported++;
  }

  if (!imported) {
    // Try AI parsing as fallback
    parseFatSecretWithAI(content);
    return;
  }

  // Merge into S.meals — one record per day (summary)
  records.forEach(r => {
    S.meals = (S.meals||[]).filter(m => !(m.date === r.date && m._source === 'fatsecret'));
    S.meals.push(r);
  });
  save(); haptic([20,30,20]);
  toast(`✅ FatSecret: импортировано ${imported} дней`);
  progressSwitchTab('imports');
}

async function parseFatSecretWithAI(content) {
  toast('CSV нестандартный — передаю AI...');
  const prompt = `Распарси данный экспорт FatSecret и верни JSON-массив:
\`\`\`json
[{"date":"YYYY-MM-DD","kcal":2800,"p":220,"f":80,"c":300},...]
\`\`\`
Данные:\n${content.slice(0,3000)}`;

  try {
    const raw = await callAiProvider(prompt, '');
    const m = raw.match(/```json\s*([\s\S]*?)```/i) || raw.match(/\[[\s\S]*\]/);
    const arr = JSON.parse(m ? (m[1]||m[0]).trim() : raw);
    arr.forEach(r => {
      r._source = 'fatsecret';
      r.id = 'fs_' + r.date;
      S.meals = (S.meals||[]).filter(m => !(m.date === r.date && m._source === 'fatsecret'));
      S.meals.push(r);
    });
    save(); haptic([20,15]);
    toast(`✅ AI импортировал ${arr.length} записей`);
    progressSwitchTab('imports');
  } catch(e) {
    toast('Не удалось разобрать файл', 3000, 'error');
  }
}

window.clearFatSecretImports = function() {
  S.meals = (S.meals||[]).filter(m => m._source !== 'fatsecret');
  save(); toast('FatSecret данные очищены');
  progressSwitchTab('imports');
};

/* ──────────────────────────────────────────────

────────────────────────────────────────────── */
window.handleLabImport = async function(input) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('labImportStatus');
  if (statusEl) statusEl.textContent = 'Читаю файл...';

  const ext = file.name.split('.').pop().toLowerCase();

  try {
    if (ext === 'pdf') {
      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64 = e.target.result.split(',')[1];
        if (statusEl) statusEl.textContent = 'AI распознаёт PDF...';
        await parseLabPDFWithAI(base64, file.name);
      };
      reader.readAsDataURL(file);
    } else {
      const text = await file.text();
      await parseLabTextWithAI(text, file.name);
    }
  } catch(e) {
    if (statusEl) statusEl.textContent = 'Ошибка: ' + e.message;
    toast('Ошибка импорта анализов', 3000, 'error');
  }
};

async function parseLabPDFWithAI(base64data, filename) {
  const prompt = buildLabParsePrompt();
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64data } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });
    const data = await resp.json();
    const text = (data.content || []).map(c => c.text || '').join('');
    saveLabResults(text, filename);
  } catch(e) {
    toast('AI не смог прочитать PDF — введи вручную', 3000, 'error');
  }
}

async function parseLabTextWithAI(content, filename) {
  const prompt = buildLabParsePrompt() + '\n\nДанные лаборатории:\n' + content.slice(0, 4000);
  try {
    const raw = await callAiProvider(prompt, '');
    saveLabResults(raw, filename);
  } catch(e) {
    toast('Ошибка AI: ' + e.message, 3000, 'error');
  }
}

function saveLabResults(rawText, filename) {
  try {
    const m = rawText.match(/```json\s*([\s\S]*?)```/i) || rawText.match(/\{[\s\S]*\}/);
    const parsed = JSON.parse(m ? (m[1]||m[0]).trim() : rawText);
    parsed._source = 'import';
    parsed._filename = filename;
    parsed._importedAt = new Date().toISOString();
    if (!S.pharma) S.pharma = {};
    if (!S.pharma.bloodwork) S.pharma.bloodwork = [];
    S.pharma.bloodwork = S.pharma.bloodwork.filter(r => r.date !== parsed.date);
    S.pharma.bloodwork.push(parsed);
    S.pharma.bloodwork.sort((a,b) => (a.date||'').localeCompare(b.date||''));
    save(); haptic([20,30,20]);
    const alerts = parsed.alerts || [];
    toast(`✅ Анализы от ${parsed.date} импортированы${alerts.length ? ' · ' + alerts.length + ' отклонений' : ''}`);
    const statusEl = document.getElementById('labImportStatus');
    if (statusEl) statusEl.innerHTML = `<span style="color:#28d97a">✅ Импортировано ${parsed.date}</span>${alerts.length ? '<br>⚠️ ' + alerts.map(escapeHtml).join('<br>⚠️ ') : ''}`;
    progressSwitchTab('imports');
  } catch(e) {
    const statusEl = document.getElementById('labImportStatus');
    if (statusEl) statusEl.textContent = 'Не удалось разобрать: ' + e.message;
    toast('Ошибка разбора анализов', 3000, 'error');
  }
}

window.saveLabManual = function() {
  var gn = id => { const el=document.getElementById(id); return el&&el.value?parseFloat(el.value):null; };
  var gs = id => { const el=document.getElementById(id); return el?el.value:''; };
  const markers = {};
  const add = (key, id, unit) => { const v=gn(id); if(v!==null) markers[key]={value:v,unit}; };
  add('testosterone_total','lab_test','нмоль/л');
  add('estradiol_e2','lab_e2','пмоль/л');
  add('prolactin','lab_prl','мЕд/л');
  add('igf1','lab_igf1','нг/мл');
  add('tsh','lab_tsh','мЕд/л');
  add('shbg','lab_shbg','нмоль/л');
  add('alt','lab_alt','Ед/л');
  add('ast','lab_ast','Ед/л');
  add('ggt','lab_ggt','Ед/л');
  add('glucose','lab_glucose','ммоль/л');
  add('insulin','lab_insulin','мкЕД/мл');
  add('cholesterol_total','lab_chol','ммоль/л');
  add('hematocrit','lab_hct','%');
  add('hemoglobin','lab_hb','г/л');
  add('platelets','lab_plt','10^9/л');

  const record = {
    date: gs('lab_date') || today(),
    lab: gs('lab_name') || 'Вручную',
    markers,
    _source: 'manual'
  };
  UI.close();
  saveLabResults(JSON.stringify(record), 'manual');
};
